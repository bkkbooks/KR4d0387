  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0387_WYG_009-1a, image: WYG1187/WYG1187-0592a.png}
body:
  text: 蛟峯外集巻一宋方中續輯賜改名勅黄尚書省牒九月八日宰執面奉御筆勅賜進士及第方夢魁可改賜名逢辰仍換給勅牒鄉貢進士方逢辰牒奉勅宜賜進士及第牒至准勅故牒淳祐十年九月八日牒賜聞喜宴詩肆予臨御九賔興藹藹盈廷俊乂升喜賴讜言條八事欲乗景運進三登攄忠社稷惟名節濟用邦家必器能豐芑涵濡盛今日勉思徳意共欽承初補承事郎授平江僉判誥勅賜進士及第方逢辰朕勅天之命夙夜祇懼兹親䇿多士於庭爾以正對發明時幾之義深契朕心擢冠羣英僉言惟允授爾京秩贊畫輔藩往欽初命益務培養器業將於此乎觀可補承事郎特差僉書平江軍節度判官㕔公事替范炳闕奉勅如右牒到奉行淳祐十一年二月十三日除正字誥勅承事郎方逢辰朕庚戌親䇿有以時幾對居第一敷陳鯁亮羣經生學士所不能到非爾乎爾學本乎理義氣充乎議論廷唱間僉謂朕得晁董流矣試之賔畫而幕府振蓬萊道山往正芸簡此我朝待倫魁彞典也志於事業則官爵不足道宜益培清望以須之可依前承事郎特授守祕書省正字奉勅如右牒到奉行寶祐元年八月一日除校書郎誥勅承事郎守祕書省正字方逢辰中興掄魁以九成十朋為稱首蓋其立朝有敢言之氣節詞章其次也爾冠廷唱學有源委士論歸焉晉班冊府慷慨能言凛然有九成十朋之氣朕甚嘉之就升讎校不特儲養清望他日館閣言事於爾有屬可依前承事郎特授守祕書省校書郎奉勅如右牒到奉行寶祐二年四月三日牒兼國史實録院校勘勅黄尚書省牒承事郎守祕書省校書郎方逢辰牒奉勅宜兼國史實録院校勘速為譔述輿服志牒至准勅故牒寶祐二年五月某日牒轉宣教郎誥勅承事郎守祕書省校書郎兼國史實録院校勘方逢辰朕順考古道率由舊章聖繼聖明繼明共仰四宗謨烈之美疑傳疑信傳信尚稽諸儒論譔之功固知放失之多蓋亦顯承之缺是在武丁之孫子任亦匪輕迺資叔向之春秋言皆有考成功惟允褒律宜優爾學有淵源詞尚體要老氏藏室聮輝奎璧之間魯史䇿書補藝炎興而下十志鋪張而不詭諸儒褒貶以惟公比及三年可傳百世有晉王虞宋徐沈之善無闕荀袁家政駿之譏卓識所資凛著一王之法奏篇既訖聿嚴六閣之藏論賞詔功陟明有典爰霈丹宸之渥申躋文石之階揚鴻烈而章緝熙既藉發揮之力率純徳以勵忠孝尚堅報稱之心可特授宣教郎依前祕書省校書郎兼國史實録院校勘奉勅如右牒到奉行除祕書郎誥勅奉議郎祕書省校書郎兼國史實録院校勘方逢辰漢之藏書天禄東觀命馬融劉向為郎至唐則掌四部圖籍有三人焉非第一流曷稱兹選爾以經術之淵源負倫魁之聲望曳裾冊府校讐甚優秉筆史筵討論靡倦爰命進典中祕以倡斯文異時玉堂承明皆權輿乎此可依前奉議郎特授祕書郎兼國史實録院校勘奉勅如右牒到奉行寶祐三年二月十六日兼莊文府教授勅黄尚書省牒奉議郎祕書郎兼國史實録院校勘方逢辰牒奉勅宜兼莊文府教授牒至准勅寶祐三年十一月某日牒除著作郎誥勅朝奉郎方逢辰等承明金馬漢家著作之所也紬千古書公萬世筆非學通源奥文貫紘維不足與兹選爾逢辰昕廷魁傑爾持垕爾坦璧水翹英或寤寐於澗阿或翺翔於幕府或淹恤於欒棘皆一時清望也兹命逢辰為郎於著庭而以持垕坦佐之以共掌東觀陽秋之重朕之遴選甚不輕也昔劉子元謂史有三長爾三人者何愧乎朕於是知汗青之有日也勉哉可依前件奉勅如右牒到奉行景定元年正月十八日下差知瑞州勅尚書省牒朝奉郎主管成都府玉局觀方逢辰牒奉勅宜差權知瑞州軍兼管内勸農營田事填趙若來不赴闕仍借紫候迴日却依舊服色牒至准勅景定三年八月某日牒除尚右郎誥勅朝請郎方某本朝除郎之路雖廣其要有三曰館閣曰寺監丞曰監司郡守近自乾淳以來郎非監司郡守不可得雖然豈所以待倫魁者乎爾以清文奥學崇論抗議對䇿大廷朕嘗親擢以冠多士入儀班著夙稔直聲行已非磷緇立朝有本末朕未嘗不懷其賢也去把郡麾又淹家食起之槃澗俾佐銓衡於是得一佳吏部矣潔齊以俟朱紱方來可依前朝請郎特授尚書吏部員外郎奉勅如右牒到奉行景定五年九月十日除司封郎誥勅朝奉大夫方逢辰記有云好賢如緇衣以其改為改造不替夫善善之初心也爾逢辰先朝倫魁植學有淵源立朝有本末氣節端亮議論激昻疊畀州麾屢造省戸雖有滯南之嘆彌殫拱北之忱爰以勲曹致汝班列是詩人之意也肆酬嘉庸尚有顯序可依前朝奉大夫特授行尚書司封員外郎奉勅如右牒到奉行咸淳元年六月十五日轉朝散大夫誥勅朝奉大夫新除司封郎官方逢辰等生民立君既尊居於大寶惟辟作福斯溥錫於湛恩兹予一人踐祚之初亦爾羣臣委䞇之始粤從京秩遞進華階臣事君以忠宜勤厥職官量能而授嗣選爾勞方逢辰可特授朝散大夫行尚書司封郎官奉勅如右牒到奉行咸淳元年六月一日下兼國史院編修官勅尚書省牒朝散大夫新除司封官方某牒奉勅宜兼國史院編修官實録院檢討官牒至准勅故牒咸淳元年八月某日牒除祕書少監誥勅朝請大夫行尚書司封員外郎兼直舍人院兼國史院編修官實録院檢討官方逢辰朕祇若先朝裒是鉅典宏開史局既董領以重臣分判書林宜精求於髦雋爾種績甚懋植立不凡正學以言曽見洋洋之對嘉猷則告居多諤諤之風頃即前行用計羣吏遂㕘聮於六押仍振寀於三長甚宜厥官式敘爾位肆上帝羣玉之府俾貳其間庶我宋一經之傳襲六可待可依前朝請大夫特授守祕書少監兼直舍人院兼國史院編修官實録院檢討官奉勅如右牒到奉行咸淳二年六月五日除祕撰江東提刑誥中祕藏四部書班髙論譔外臺奉三尺法職重澄清式表儒猷以華使指朝請大夫主管成都府玉局觀方逢辰卓爾不羣之意氣褎然為首之科名鳯毛批綸見稱占授之敏螭頭載筆方徯直前之猷胡進之難其歸也浩朕惟人才培植之匪易事功述作之方新豈繄譽髦而可家食爰出少府之節俾祥一道之刑把繡斧而臨芝山大江東宜不究矣冠紳珮而上蓬島弱水隔豈其逺而副予掄材之心行爾澤物之志可依前朝請大夫特授祕閣修譔權江南東路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵仍借紫候迴日却依舊服色奉勅如右牒到奉行咸淳三年三月十七日轉朝議大夫誥勅朝請大夫祕閣修譔權江南東路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵方逢辰在仁宗朝有若韓琦實進士第二人也平日循循若不能為逮帥真定捍驕挺亂琦獨凝然不動舉十卒而殱焉謂儒者不知兵可乎爾以先朝倫魁之彥司臬江東㑹上饒有脫中之變乃能抜取二士布之州縣密伺姦謀以俟機㑹卒致草薙而禽彌之可謂儒效章章矣論功行賞爰進一階徑躋六品之榮以為元士之望可特授朝議大夫依前祕閣修譔差遣如故奉勅如右牒到奉行咸淳四年六月十三日陞集英殿修譔誥勅朝議大夫祕閣修譔權江南東路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵方逢辰淳熙間部使者有能究心獄事多所平允及我孝祖嘉之進秩一等又陞閣職爾以魁彥通才司臬江左亦既逾年克殄兇頑不動聲色頃嘗賞以元士之階兹復華以論譔之職有功而既見知矣其祇朕命益逺乃猷可依前朝議大夫特陞集英殿修譔依舊權江南東路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵仍借紫候迴日却依舊服色奉勅如右牒到奉行咸淳四年七月十四日除江西運使誥勅朝議大夫集英殿修譔權江南東路提㸃刑獄公事兼本路勸農提舉弓手寨兵方逢辰儒者守約施博無所不通刑獄錢榖事殊理一蓋知所以愛惜民命必知所以培養民力也爾以先朝倫魁之望初政倚柱之賢頃一道祥刑風采殊振兹改畀以輸將之寄自東徂西蓋取諸近載馳千隰之駰以活涸轍之鮒則予汝嘉可依前朝議大夫集英殿修譔特授江南西路計度轉運副使兼本路勸農使仍借紫候迴日却依舊服色奉勅如右牒到奉行咸淳四年二月二十一日蛟峯外集巻一
