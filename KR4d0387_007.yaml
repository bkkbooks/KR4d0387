body:
  text: 蛟峯文集卷七宋方逢辰撰講義子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也此一章以聖賢地位觀之簞瓢陋巷乃吾儒本分固非甚髙難行之事何為聖人獨以許顔又何為反覆稱其賢此當就人不堪其憂看只為衆人於此有所大不能堪者是以深嘉樂道之正欲學者於不能堪之中自尋樂處也處富貴未足以觀人處貧賤乃可以觀人處貧賤未足以觀人處人情所大不能堪處始可以觀人有天下不與何足以知舜居深山飯糗茹草而後知舜之為大去齊去魯何足以知孔子厄於陳蔡絃歌自如而後知孔子之為聖此章以顔子對人言以憂對樂言各有所指人之本心天理具足各自有一箇至尊至貴的物事舉天下之物無以尚之豈不大可樂者豈特顔子有是哉人唯不見所樂是以得志乎富貴則極聲色之奉窮四體之欲一遇貧賤則戚戚無聊只簞瓢陋巷便有甚不能堪者唯顔子工夫精到能忍天下不能忍之窮雖處屢空恬然不以為意蓋其胸中自有大可樂者天地間更有何物可以易其樂哉人見其陋巷彼不自知其陋巷人見其簞瓢彼不自知其簞瓢此無他人見物而不見道顔子見道而不見物也夫子始稱之曰賢哉回也終之又曰賢哉回也非譽顔子也有所不足於天下之人也稱道顔子之旨愈深鞭辟學者之意愈切夫子之待學者可謂厚矣望學者可謂深矣惟皇上帝降衷於下民人人與之以惻隱羞惡辭讓是非之心此聖賢之鎡基也今人有百金之鎡基者惴惴栗栗日夜護持惟恐為人奪之而貧而天所與我之鎡基倍於百金者萬萬乃反棄之如敝屣而不知惜誠能撥轉念頭移其兢兢護持於彼者以兢兢護持於此祗見其有人所不知已所獨知之妙而不見其有為人奪而貧之憂也昔程子從濂溪先生遊每令尋仲尼顔子樂處所樂何事嗚呼必有事焉必有下手處周子引而不發蓋欲學者深思而自得之吾儕共處斯堂所樂何事盍相與心體而身踐之顔何人哉顔何人哉子夏曰日知其所亡月無忘其所能可謂好學也已子夏聖人之徒也子夏之學聖人之學也聖人之學何學也入乎耳存乎心修於身行於事明五常之理盡五倫之道也顔子之博文約禮曾子之致知誠意子思之明善誠身孟子之盡心養性皆是也夫人之生以天地儲精以五行鍾秀無極之真二五之精合而為方寸之靈聚而為百骸之形所以備萬物而參三才者其原有自來而其本已素立矣然才稟於氣而性原於理窮古今亘宇宙寓於流行而不易者理也往來蕩摩雜揉交錯而無一定之體者氣也氣惟無一定之體故以流行於兩間者驗之光風麗日之景恆少風雨晦冥之變恆多則人生而隨遇者至清極淳之氣不易得而偏倚濁駁之分不能齊固其所也惟聖人之生也得其秀之秀故氣清而義理無不明質淳而邪穢不能入由聖人以下雖大賢之資一有纎毫之纍亦必資學問之力以修治之自帝堯有匡直輔翼之言大舜有直寬剛簡之命其轉移變化之功已見於當時矣然學之道至三代而益明其見於書則曰學於古訓曰惟學遜志曰終始典於學曰學古入官曰不學牆面見於詩則曰學有緝熙於光明隆古聖王未有不以學為要務者也吾夫子生於衰周不得位以行其道而天命在躬夙夜祇畏閔當世之人去堯舜禹湯文武之世逺而不聞大道之要當楊朱墨翟異端之説行而不免他岐之惑乃以身任大教繼往聖而開來學推明大學之道昭示明德之方使人人皆得以消磨其物欲變化其氣質而為聖賢君子之歸何其幸也夫以常人之資而欲為聖賢之事耳目口鼻之蠢然聲色臭味之交接愚者欲明而懦者欲立頑者欲亷而薄者欲敦以一心而明五常之理以一身而全五倫之事天下之義理無窮而工夫有限代間之人生有期而白日不再茍非勉焉孳孳克勤無怠則查滓未融而邪穢已入已之所學其能迄用有成也幾希矣此夫子所以拳拳於學有時習之誨而又曰學如不及猶恐失之者此也聖門之徒三千夫子獨稱顔子為好學蓋以顔子明心力行克已復禮所學者得聖人之道也學之得其道而又能竭其才夫子所以既許其不惰而又惜其未見其止也顔子終能至於去聖人一間者豈繆悠之功所能及哉子夏之在聖門篤實之功亞於曽子而身居文學之科其所謂學者皆人倫日用之道誠篤切實之功也其垂訓以勉人曰日知其所亡月無忘其所能可謂好學也已矣夫為學之道內明五常之理外盡五倫之事變氣質於有生之初絶物欲於有知之後必資師友之講明方册之誦習然後能開其心術見於躬行然其殫日夜之力嚴理欲之辨使朝有所詢夕有所考晝有所作夜有所思則志於緝熙功無間斷人心之罅隙不開本體之虛靈不昧矣其或玩物弛心廢時亂日於學問思辨不能致耳目手足無所加至於時弛歲去老死無聞豈不重可惜也為學之道若陟遐必自邇若升髙必自卑故當自強不息勉勉循循為山未成而加一簣之土掘井未已而見九仞之泉溫故而知新崇禮而廣業向之得於講明而見於誦習者既有默契於心知而行之拳拳奉持服膺弗失此古之人所以一飯不違跬步必思盤器有銘几席有戒參倚之有見顧諟之弗忘所以固守其德也其或執之不固守之弗專或存或亡乍得乍失則一暴十寒而生意弗存半途中畫而前功盡廢義理之性既無學問之推充血肉之軀不勝外誘之紛擾則杯水不救於車薪五穀不踰於荑稗雖具人之形當士之名飲食男女無以異於衆人存心制行不能逺於禽獸中心冥冥醉生夢死豈不重可哀也子夏之訓蓋深勉夫有志於學者必當日新其功有以自考一日之間自旦至暮我於義理未知未能則深以為恥一月之間自朔至晦我之學問已知已能則固守而弗失夫如是故日引而月長日就而月將自有學之初以至於一息尚存勉焉以盡其力愓焉以殫厥心其得不謂之好學之人乎子夏之所以居文學之科者此道也故言此以示人欲人人皆然而砥於道也學者觀此豈可荒嬉而不知所以自勉耶某負戴經籍而來山中諸友不以某為不肖而屑與某交修遊息嘗不自揣而述所聞於先師者告諸友矣今觀氣化之流行寒暑之迭興以春而夏夏而秋秋而冬矣竊以諸友之日有所亡而月未有所能為憂也良月初吉冬序伊始故述子夏之訓以相告語冀諸友思齊於聖人之徒而景行於聖人之徒也非徒守方册以為勤誇誦説以為能而已當以明物察倫治心修身為要務在乎為人子者必盡孝於其親為人弟者必盡悌於其兄為卑幼者必盡敬於其長手足動靜必知天理之所存耳目口鼻母為人欲之所汩以消融其查滓以蕩滌其邪穢子夏之所謂學也深致其力復考其成使進修之效日異而月不同此子夏之所謂好學也茍為不然徒事口耳虛費歲月堯言孔誦而不知求聖賢之心禹行舜趨而不免為禽獸之行若是則非徒爾父兄之所憂抑亦吾師友之所羞秦穆公有言曰我心之憂日月逾邁若弗云來此某之所以區區告勉學者當痛心刻骨而致力於學也齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸夫彛倫者人道之大綱政事之根本也第彛倫之在人內而至尊者無出乎父子外而至大者無出乎君臣茍在家父焉而能盡父之慈子焉而能盡子之孝則必有以正倫理篤恩義小大咸得其宜而家道齊矣在國君焉而能盡君之道臣焉而能盡臣之忠則必有以正朝廷平庶務上下咸得其所而國體治矣然則為政之本又豈有出於君臣父子之外者哉是時齊之景公內多嬖媵太子不立而父子之道暌外則陳氏厚施擅用國政而君臣之分亂故聖人因景公之問政而以君臣父子之説告之可謂至要切矣景公亦深有感於斯故以善哉之言贊之又從而嘆之曰果使君而不君臣而不臣父而不父子而不子上下之序紊綱維之義隳而法令不行禍亂尋起矣雖有穀粟之多尚安得而食之哉此必然之理也其後卒不免於篡弒之禍蓋由景公知善其言而不能自振故也間嘗論之國土至廣也人民至衆也茍欲使之安如泰山固如磐石非上下之分定不可也不然一日之間其或君不能君臣不能臣父不能父子不能子則家不可為家國不可為國而生民之命有不可得而保者矣論至此而後知吾儒之道大而真有以扶植天命維持世教而為生民休戚之所繫者正在於君臣父子秩然有序而不亂也若易之六十四卦而以乾坤為之首春秋之大一統而以王正月為之先其他如詩書之勸戒禮樂之防範無非欲詳夫君臣父子彛倫之道而已無他事也然則為政者不此之務而規規於事為之末而欲致國家於平治者無此理也讀此章者所當知子貢曰夫子之言性與天道不可得而聞也公冶長子罕言利與命與仁子罕孟子曰惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也公孫丑孟子道性善言必稱堯舜滕文公孟子曰盡其心者知其性也知其性則知天矣盡心孔子教人未嘗不言命與仁未嘗不言性與天道魯論二十篇何莫非是理而何隱乎爾也門人以為罕言以為不可得聞何也蓋孔子之教人只在日用處凡所言仁皆是為仁之方不是正言仁之體所言性命天道皆盡性至命事天之事未嘗推極性命天道之原也孔子不言心性而孟子開口便説性善説盡心知性存心養性孔子只説一箇仁孟子乃説出仁義禮智四端孔子一部論語盡是教人就起居飲食應事接物上做工夫孟子七篇直教人就心上存養孔孟之教人豈有兩心二道時不同也先儒曰春秋猶論是非戰國純論利害春秋之時文武之澤未斬義理之在人心者無恙故列國君卿大夫之自謀及辭命往來與鄰國之可否者惟論理之是非不論勢之強弱戰國時先王之道影滅迹絶通天下不知義理為何物列國君臣與縱橫之士謀其國者唯利害而已不識天下人心有是非枉直也以此觀之則春秋時人心未亡戰國時人心亡矣孔子時人心未亡愚夫愚婦皆可與知可與行故教人以忠信而已入孝出悌而已先行後言而已仲弓問仁則曰出門如見大賓使民如承大祭己所不欲勿施於人而已樊遲問仁則曰居處恭執事敬與人忠而已至於夫子平日所身教者亦不過誾誾侃侃聲色容氣之間蹜蹜愈愈進退揖讓之際凡形迹之粗事物之末皆帝衷之流行天則之呈露故夫子曰吾無行而不與二三子者吾無隱乎爾也孟子之時人心已亡舉國皆病狂惑門人髙弟尚未能篤信其師説謂舜不能怨慕者有之議周公不仁不智者有之疑孔子主癰疽瘠環者有之以管仲晏子為名世以公孫衍張儀為大丈夫夫人之良心陷溺如此非湔腸滌胃破骨洗髓不足以療之故孟子不得不直從其本心下手也譬人有不識五臟而不信醫者醫為之剖其腹而指示之曰某為心某為肺某為腸某為胃然後病者方自信孟子無奈戰國人不識四端何直從其軀殼之內標出而示之曰此天賦於爾者謂之命此爾受於天者謂之性此包性命管攝乎衆理者謂之心如此為仁如此為義如此為禮如此為智使人人自見得自信得然後吾之教可入而天理不亡孟子之喚醒人心其苦切有如此者雖然孟子豈徒教人以體察而已哉其操存其涵養其擴充七篇之書反覆言之詳矣又體驗以後之實踐工夫也孟子之救人心苦切如此端的如此其工夫詳密又如此後世異端之家乃有竊此以為識心見性之把柄者此不足辨也近世學者亦有得體驗之緒餘而強為執持者究其歸亦同於異端之病而已矣今之學者讀孟子必當涵養於未發之先以立其本體驗於將發之際以審其幾又操存之以定其所守充擴之以極其所止天所賦命盡在日用之間吾所受性皆為躬行之實以此讀孟子然後不負孟子苦切之心景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之汝家必敬必戒無違夫子以順為正者妾婦之道也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫昔者戰國之世七雄爭長仁義之路荆棘先王之教不明一時才智之士林立輩出不免利祿之趨功名之務而已又安知聖賢之學正己正人之道哉此景春所以有公孫衍張儀之問也蓋公孫衍張儀之為人專以權謀之術遊説於列國縱橫之法連結於諸侯得志橫行氣焰可畏當時之人尊仰敬畏之不暇遂以大丈夫許之且言一怒則諸侯為之恐懼蓋能使相攻伐也安居則天下為之休息蓋能使相安於無事也何則蓋七國之君一切以富國強兵為務其心已陷溺於利欲聞利則喜聞害則懼故皆為其所愚惑茍有丈夫之氣以道義為主者又安能惑之哉故孟子叱之以是焉得為大丈夫乎但子未學禮故耳古者男子二十而冠三加三祝父必命之女子之嫁也施襟結帨母必命之及女子之往也送之門而戒之曰汝往至夫家必敬之戒之敬恭聽宗爾父母之言而不可違也夫以順從為正者乃妾婦之道今二子惟知以阿諛茍容竊取權勢以僥幸於一時豈非妾婦之道又烏得為大丈夫哉果能居仁由義以禮自度養其大者不為小者之所奪則能超出於一時而不屈於萬物是乃大丈夫也蓋廣居者仁也仁者之心廣大寬平以四海為一家中國為一身故曰天下之廣居居乎此則舉天下卑汚之私皆不足以動之矣正位者禮也禮則尊卑大小進退出處皆有一定之節故曰天下之正位立乎此則舉天下不正之事皆不足以干之矣大道者義也義則事物之所宜乃天下人物之所共由者故曰天下之大道行乎此則舉天下邪媚之行皆不足以趨之矣若然則得志以行道則可以使民共由之而皆歸於仁壽之域不得志獨行於身則使此身常立乎正大髙明之地矣雖多財而富有位而貴亦不能淫蕩其心矣雖無財而貧無位而賤亦不能移易其節矣雖威勢武勇之可畏亦不能挫辱其志矣何則其所居者廣所立者正所由者大故也則視彼區區以利害之説愚惑庸常之君以竊取茍容於一時者誠不足道又烏可以大丈夫言之哉嗚呼正學不明人心陷溺遂使智能有用之士如瞽者之無所見聾者之無所聞甘心浸淫為妾婦茍賤之行而不自知雖孟子樹立如此之卓卓辨論如此之昭昭而卒無一人能自拔卒無一人能委而用之致使七國之君相胥於滅亡海內之民相胥於塗炭而後已豈天未厭亂而致然也歟抑邪説橫流而不可遏之也歟是未可知也後之欲為大丈夫而為國家者豈不可戒而可觀也哉孟子曰故凡同類者舉相似也何獨至於人而疑之聖人與我同類者又曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳告子上此一章可以見孟子之救天下者直從人心上做起心之虛靈知覺一而已矣豈有二哉以飢食渴飲之情言則謂之人心以天命之性言則謂之道心飢食渴飲之情雖聖人無以異於衆人天命之性雖凡民亦與聖人同爾春秋已降傳心之學不明天下之人梏於形體之私而昧乎性命之正但知耳目口體之欲與人同至於本心之當然不可易者乃與人異孟子痛之哀之諄諄然告之曰凡我同類者舉相似也何獨至於人而疑之又曰聖人與我同類者蓋謂夫知覺運動凡物之類莫不相似而况人乎雖聖人亦人耳今夫耳目口鼻四肢之所欲一有不得則隕護不能堪至於惻隱羞惡辭讓是非之天則乃吾所自有者則遜之他人曰此聖賢事也又否則曰非不説子之道力不足也是以孟子又惕然警之曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎蓋以飢食渴飲舉天下人人所同而方寸之微乃獨不然此孟子至痛至切之辭猶懼夫人未之覺也又提起此心曰心之所同然者何物也理也義也理以體言義以用言聖人之所以為聖人者存此而已堯舜禹之授受以傳之者此也湯武之弔伐以救之者此也吾夫子之作六經以抗起者此也唐虞三代洙泗之聖人所以出類拔萃為萬世立極者豈有異於人哉特先知先覺乎此而已矣故曰聖人先得我心之所同然耳夫世教不明人心不同久矣孟子必欲強其所異而歸之同自常人觀之何自苦若是然孟子之心天下之心也蓋其心元自有不得不同者夫所欲有甚於生者所惡有甚於死者非獨孟子有是心人皆有之今天下壞證急在人心吾儕登斯堂也閉戶造車出門合轍同此心也同此道也羣居講習又何為哉乃所願則學孔子孟子曰仁也者人也合而言之道也又曰仁人心也先儒論仁至矣盡矣其最善名狀者無如謝上蔡指草木之核種之即生道以為仁其中一包皆生理也雖然特借草木之核而言耳人之核安在曰心天地之核安在曰人夫生生不息者天地之心也然其心不能以直遂必以托諸人人得天地之氣以為形得天地之理以為性故萬物皆備於我而天地之所以生生者實寄吾性分之內天髙地下一日無人則天地特塊然者耳故孟子曰仁也者人也夫二物相配之謂合仁以性言人以形言仁固所以為人之理人又所以載是理而行之者也離形言性則理何所托以自見故又曰合而言之道也然而人之所以為人者豈以軀殼為哉天地以生物為心而人又得天地之心以為心者也天地以此心寄諸人豈徒然哉厥初賦與許多道理皆要從人心上抽迸出來如草木勾萌自有勃然不可遏者方其未形沖漠無朕一與物接觸之則生觸著他義則善善惡惡便有廉恥羞惡之心作觸著他禮則尊尊貴貴便有辭遜揖讓之心起觸著他智則辨黑白别香臭便有是非之心迸裂而出上蔡曰活者為仁死者為不仁人心不仁則天地死矣故孟子又曰仁人心也七篇之書自首至尾切切然以人心陷溺為憂凡教人求教人收教人存教人養勤勤懇懇至痛至切一情之動則曰心之端一思之起則曰心之官見於面則曰根於心害於事則曰生於心物有長短輕重則曰心為甚千言萬語不及其他直是指人之識痛癢有知覺處以示之雖非便以知覺痛癢為仁然欲其切已省察而救活其本心也不然死灰而已稿木而已頑然鐵石而已此之謂不仁列禦冦莊周之徒正坐此病今天下人心陷溺甚矣急起而救之責在學校心學工夫自我輩始羣居相與所學何事端居靜念我之生也所以賦形宇宙而靈於物者豈空殼哉即天所與我之虛靈不昧至光至明砥物事求之收之存之養之體於躬行日用之間著於食息動作之際則夫生生不息者不在天地而在我矣故曰人者天地之心乾稱父坤稱母豫兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也西銘之作張子蓋為人局於形體之私自小其身不知身與天地對立而不能盡人道之大也天髙地下人位乎中天大地大人居其一故曰豫兹藐焉乃混然中處乃者張子愓然自警之辭謂我以眇然七尺之軀乃得與天地對立者豈徒然哉天地之塞吾其體天地之帥吾其性此二句乃人所以得與天地對立者也塞者天地之氣也帥者天地之理也以充實言謂之塞以主宰言謂之帥其體者以身體而實踐之也其性者以身體而實有之也二句之上加一故字故者承上而有所用力之辭乾陽坤陰此天地之氣充塞乎兩間而人所得以為體者也然得其體必當有以體其體不體其體則人與物何以别體者一身軀殼無非造化日月之往來山嶽之鎮峙江河之流轉寒暑之代謝一人之身天地之所為者備故曰天地之塞吾其體一陰一陽之謂道陰陽非道也所以一陰一陽者道也此即天地之主宰也所謂天地之帥也天地以陰陽五行化生萬物莫不命之以是理人所得以為性者也得其性必當有以性其性不性其性則人與物何以異格物致知所以明此理誠意正心所以體此理此性其性之條目也操存之涵養之體察之此性其性之工程也如是則所以主宰者不在天地而在我矣故曰天地之帥吾其性然而我有此體此性人亦有此體此性物亦有此體此性特人全物偏故有胞與之分同胞者受氣稟理全無間隔吾與者亦我之儕輩也民飢已飢民溺已溺所以行吾同胞之事也昆蟲草木鳥獸魚鱉莫不使若其性所以行物吾與之事也故吾儒之道必至於此而後為全體大用必盡乎此而後眇然之軀殼始可與天地對立矣西銘一篇綱領在此由此而後皆其體其性之節目父母宗子以下指聖賢在上者言于時保之以下指聖賢在下者言讀西銘者以此體察而踐行之則各有下手處矣吾儒素其位而行在上之事固有任其責者在下之事我輩之所得為而不為則天地生我何如哉今田野之間骨肉反眼閭里作仇朋友彎弓主奴易位彼安知所謂理一分殊名為儒者不思所以植立抗起之則風靡瀾倒其勢必至於胥為禽獸而已矣凡我同志盍相與努力於斯周禮鄉大夫之職受教法於司徒退而頒之於鄉吏使各以教其所治以考其德行察其道藝以嵗時登其夫家之衆寡夫家男女也辨其可任者任者謂給繇役也國中自七尺以及六十七尺謂氓二十歲以上野自六尺以及六十有五六尺謂氓十五歲以上皆征之征謂繇役其舍者國中貴者謂爵尊者賢者謂有德者能者謂有才者服公事者謂士大夫居官者老者謂年尊者疾者謂廢疾者皆舍舍先儒謂復除其繇役也鄉大夫者司徒之屬掌教之官也考德行察道藝賓賢能其本職也然於征役瑣細之事亦與焉何也蓋所以辨貴賤優賢能行弛舍也以歲時登其夫家之衆寡辨其可任者所以考察其民之可役與否也國中之民自年二十以及六十野之民自年十五以及六十有五皆征之此成周繇役之法也國之民年二十則役之六十則免野之民年十五則役六十有五則免國中晚征而早舍以地近則役多也野中早征而晚舍以地逺則役少也其舍者有六貴者賢者能者服公事者老者疾者皆舍此成周免役之法也貴者不役以其爵尊也賢者不役以其有道有德行也能者不役以其有才藝也服公事者不役以其居官有職事也老者不役以其無筋力也疾者不役以其不任奔走也此六者皆復除其繇役載在周官所以示萬世昭昭也後世王道不明凡貴者有公事者與老者疾者皆免而獨賢者能者未得復除而與編氓皂隸同受役於府史胥徒之下冠履倒置莫斯為極古者公卿大夫士與庶人各有定分而不相踰越公卿大夫行先王之道以治於朝士明先王之道以教於鄉庶人服庶人之事以役於野凡學先王之道者謂之士為小人之事者謂之庶人三代之時士庶人家各百畝不以貧富為差而以賢不肖為别世教不修士庶人之分不明為有司者乃欲使士與庶人並役是不察周官之法不知士庶人之各有定分也庶人之役役其力耳吾儒則經天緯地為天下正君臣定父子别夫婦序長幼其為役也大矣今自國及野僕役於主子聽於父妻不敢二其夫幼不得凌其長非儒之教其誰之功也且有天下者必有所尊而後足以成天下之尊自古為人主者必折節以下天下之士非尊其人也尊其道也天地設位道行乎其中綱常禮義自儒者出一日無此道則強凌弱衆暴寡智鬬智力角力天地間乃一凌犯角奪之區而已矣然則君天下者乃所以自成其尊也王制曰命鄉論秀升之司徒曰選士升於司徒者不征於鄉不征者先儒謂復除其繇役若此則不獨周官之法通三代之制然矣乃者上臺有請以三代之法推而行之江南此尊儒道將以立人極也夫愚請發明王制以曉未識三代之法者策問天文變異及中國夷狄君子小人德刑公私之異主意君子純乎陽明之德則以陽召陽而星宿清潤君子襲夫陰柔之為則以陰召陰而孛彗垂妖其端芒兆於君子之身其證應著於天地之表今日星文示異所以不責小人而責君子也考官批機軸出於胸中華采流於筆下答題不徇題用事皆實事作此者必老手也對嘗觀陰陽清濁之氣流行於宇宙間在天為禎祥為祲眚在人為中國夷狄為君子小人為德刑公私數者同一陰陽也雖然天下之陽類衆矣而君子者衆陽之主天下之陰類羣矣而小人者羣陰之宗然則今日星文之異其小人為之歟抑君子為之歟世固以是責小人矣愚獨不責小人而責君子也何者向者共歡居朝五辰未撫猶可諉也今臯夔進矣將誰諉乎昔者管蔡在列保章星動猶可辭也今旦奭歸矣將何辭乎曩者季氏專朝星隕之妖猶曰宜也今宣尼相矣豈復宜有此乎是則君子有不容不任其責者茍能純乎陽明之德則於國為覆盂於仁為雨露於公道為權衡其應在天則析木天街星宿清潤陰不得勝乎陽矣為君子者不免襲陰柔之為則於國為蛇豕於仁為荆棘於公道為蹊隧其應在天則孛飛彗流垂妖吐異陽亦不能以勝乎陰矣是故厯象蒼珠璣衡珠璧非天數之偶符也唐虞治古俊德者純乎俊德以陽召陽之應如雨之妖守心之象非天數之適變也春秋世降正人不能純乎正人以陰召陰之證也逮我國朝天聖之流星慶厯之太白誠可畏矣惟杜富韓范歐余王蔡諸君子如景星鳳凰故在天之陰不能以勝在人之陽崇寧之彗大觀之孛未必不可銷也惟姦黨有碑邪等有籍諸君子不能自白故在人之陽亦不能以勝在天之陰信乎宇宙之相通一氣耳其端芒兆於君子之身其證應著於天地之表此猶黃鍾一動則根荄芽甲之下皆春夜氣一交則么微怪亂之證錯出機緘影響氣類塤篪斷斷乎其不爽也恭惟皇上寅畏事天固宜衆陽鼎盛羣陰睍消而乃者正陽之月譴示星文證不虛生何緣而起豈中國之陽未盛與昔權姦挾敵以固君父之寵三邊清野不問也於斯時而天變見焉是可曰夷狄之陰召之也更化以來敵人相噬困于蒺藜泗上凱旋伏戎于莽晉彗出室胡可移過於遵鑒相屠之時歲星犯月胡可遜咎於柔然將破之日是則諉之夷狄不可也否則吾仁之陽未暢與昔權姦以贓吏為公門之桃李永州之蛇不問也於斯時而天象警焉是可曰刑罰之陰感之也更化以來謹刑有銘江河疏濶戒殺有詔雨露涵濡長星竟天非元朔滲漉之朝所宜有孛宿歷氐非貞觀既效之日所宜聞是則諉之刑法不可也又否則公道之陽未盛歟昔權姦以多詐逢君君娥之啓寵不問也關子之交通不問也斯時而天戒示之猶可曰私情之陰召之也今邪徑既窒天日開明幸門莫通雲霧軒豁偏黨俱無矣胡為箕畢未協乎刑賞平明矣胡為隕星告變乎是又不然矣然則星文之變胡為而如此乎無已則君子之陽未純也夫傅説騎箕蕭何應昴君子未嘗不應於天象攝提之位列卿鈎鈴之司出納天象未嘗不應於君子故君臣和則三台齊君子多則東璧著賢人進則少微絢綵其感召如響之答也今天象昭昭一則曰小人之陰為之二則曰小人之陰為之不知中台星折可獨諉之張華乎太白襲月可專責之曹爽乎諸君子盍曰明白洞達者陽也吾未能無覆護掩匿果非陰乎慷慨奮發者陽也吾未能無依阿淟涊果非陰乎斷制者陽也今或似味道之模稜任事者陽也今或類石建之遜避譬如奕棋局面雖改而其間一二著數未免猶似前日之所為可謂純於陽明乎吾未能純於陽則召陰盛之變者非私情也非刑法也非夷狄小人也我也夫如是則位郎星職卿月應功臣之宿符三台之象者莫不以陽明自厲必洞達明白必奮發慷慨必斷制必任事則陽亨於復而陰剝窮矣陽長於泰而陰否消矣星變夫何慮雖然執事所問數條曰仁曰公亦不可廢也此又在於人主之心乎人主之心事事皆仁則德性昭明與陽俱盛而至誠暢乎九垓人主之心一適非公則物欲昏熾而幽明隔於方寸昔紹興三十六年太白犯前星髙宗皇帝曰人君有過天則戒之及懼而改天則愛之次夜而觀太白順軌矣然則以心答天不當如髙宗乎先儒曰陽明盛則德性用陰濁盛則物欲行愚請揭是為座右銘謹對論禮法之大分如何論楊楍批立説得先儒議論行文有前輩氣象佳作也論天下綱常之大當自人君立其大者基之夫禮莫大於分分莫大於君君不能自有其大則禮法蕩矣生民之初人未知有君之尊也先王憂焉為之辨上下别等殺而為截然之法法立而禮行禮行而君尊夫為君者盍曰吾之所以獨尊於天下者僅有此分耳使吾一日失此則不能自有其大君失其大則禮法能獨存乎世降叔末此分不明久矣不知先王所以為是禮法者正為君尊地也吾處其大可不思有以守其大乎云云禮法之分安在乎曰君臣也父子也兄弟也皆分也求其分之大者則同室之分莫大於父同與之分莫大於兄雖然又有大者焉統乎人倫之上而居分之至尊者非君歟夫以四海之廣兆民之衆受制於一人雖有絶倫之力髙世之智莫不奔走而服役者豈非分之至大哉雖然處天下之大必有以守其大是故秩於天庸於舜謹於文武成王周公自朝廷宗廟達之於州閭鄉黨自閨門袵席而至於天下國家者所以立其大也昔仲叔于奚有功於衛辭邑而請繁纓孔子以為名者君之所司季氏在魯擅顓臾之伐孔子以為天下有道禮樂自天子出誠以名與禮樂天下大分也而君不能司之天子不能自出之則失其所謂大矣一失其大則天下無復綱紀禮法其不墜於地者幾希矣乾尊坤卑禮之始也聖人法焉制為長幼之節疏戚之差若足矣未也又從而為之法焉車服有制宫室有度此法也小大有經尊卑有紀此法也總而為吉凶軍賔嘉散而為三千三百之儀者皆是法焉若足矣亦未也士庶人之上為之置卿大夫卿大夫之上為之置侯伯焉侯伯之上為之置三公焉等級而上至於天子其分極矣為天子者盍曰先王制禮所以為是差次焉者正以成吾之尊也吾處至尊之分而不能自有其尊得乎士大夫分職自我分之可也如晉之六卿魯之三家則分陵矣諸侯建國分土而守自我建之可也如韓魏以請命而侯則分僭矣三公分命總方而議自我命之可也如畀虢二鄭之事則又自壞其分矣分不克守則失其為君之大君失其大如禮法之陵蕩何春秋皆此類也况荀卿之時乎卿也起視四顧無一可人意著書立言而有禮法大分之語卿之意深矣楊倞不足以知此以任人職分釋之吁卿之意或者正為名分憂豈在區區分守乎雖然大分一語卿言是矣然載之王霸之篇君子不無遺論焉夫禮法之廢正為五伯壞之耳卿方欲遏頺瀾不能尊王抑霸顧以王霸並稱而名篇不觀筆削之經乎子拒父者罪之而父子之分明庶奪敵者貶之而兄弟之分明臣召君者諱之而君臣之分明然則春秋一書其禮法之大宗乎此見春秋者有周禮盡在魯之嘆而後儒亦曰春秋為一王法謹論策題問戰勝攻取不如韓信此將所以貴乎武方叔元老克壯其猷此將所以貴乎舊詩書禮樂惟郤縠可此將所以貴乎儒霍去病之常天幸王欽若之祿未艾此將之所以貴乎福四者之中孰為善歟兩軍對壘使詐使貪將不武則敗守西河使鄰國不敢向非起不能築長城使北胡不敢近非恬不能豈將當以武為上歟或者又曰韓彭英盧危則要安則背如養鷹鸇反費縧籠然歟否歟無已則改用儒歟鳴條之師伊尹主之東山之師周公將之豈將當以儒為上歟或者又曰陸機非不儒而不能免河橋之敗房琯非不儒而不能救陳濤之奔儒而不真則反敗事然歟否歟無已則改用舊德歟必欲取荆非王翦不可必欲討蠻馬援尚堪一行新者之疏不如故者之練豈將當以舊為上歟或者又曰田單之攻燕則下攻狄則不下前日身操版鍤則有死之心無生之氣今日黃金橫帶則有生之樂無死之心此魯仲連所以逆料其不勝如此則將之舊者豈又不可用歟武帥之敢於鬬則懼其難馭文帥易於制則懼其罔功舊帥熟於兵則又懼其已驕舍是三者之外無已則擇一福帥用之可歟福星臨吳則風燎可以走曹瞞而不必周瑜王氣在晉則草木可以蹙符堅而不必謝安然歟否歟乃者荆湖易帥以驍將攝之豈非以武帥緩急可鬬歟未幾改命資帥又豈以文帥易駕馭歟潭湘分命起督帥鎮之又豈以舊帥久熟備禦歟或謂荆閫不如就畀攝帥或謂不如移畀督帥孰為便歟然三帥之中當誰畀歟雖然朝命已授鉞矣今之謀帥固不敢仰視伊尹周公若周謝之事亦可憑籍福星王氣之所在而收風燎草木之竒功否歟憂國者固望之幸之諸君試借一著問祭之重其享神也莫重乎牲其求神也莫重乎樂與灌郊用犢尚純慤也明堂我將我享維羊維牛説者謂明堂不以犢而以牢蓋牛羊豕備曰牢明堂不以犢將不純於慤歟帝牛不吉以為稷牛祀后稷者説者謂卜為帝牲不吉則以為配祖之牲然則祭祖以不吉之牲固無歉歟帝牛繫於滌芻之三月稷牛維具説者謂稷牛惟臨時取備然則祭祖不闕恭為疑歟商人尚聲先作樂而後迎牲周人尚臭先灌而後迎牲二者求神孰近歟樂所以求諸陽灌所以求諸陰魂氣歸於天魄氣歸於地當合陰陽求之今各尚其一何歟禮曰樂之號所以告詔天地之間説者謂用樂之音呼號告於天地庶乎神聞之而來然則果能必其來格歟否歟又曰灌用鬯臭陰達於淵泉説者謂用鬱鬯灌地則臭氣達於淵泉然則一瓚之鬯果足以裂地而直達歟周禮曰樂七變則天神降八變則地祇出九變則人鬼格然則天神地祇人鬼必將俟七八九變而後至歟周禮曰以獻祼享先王則享人鬼皆當灌也然宗廟用灌而明堂配祖不用灌又何歟豈祖宗在天不當求之陰歟所謂貴純貴聲貴臭三者之義可得聞歟子入太廟每事問况三載明禋於此有未達敢從諸君質之問中庸曰國家將興必有禎祥不然必有妖孽見乎蓍龜動乎四體然則中庸之所謂妖尚隱於微者歟然遽曰見動何歟乃者蜀閫走驛以嘉敘地震雹擊水怒山裂上聞京城盛夏而大風拔木發屋此非天妖歟所以召此者何失銷此者何修歟或曰天作孽猶可逭然歟否歟豸冠執白簡擊二豎子此非人妖歟然膏之上肓之下針之不達藥之不及將何道而可歟彼且操戈以逐臺臣是可忍孰不可忍歟豸所以觸邪今反助邪以觸豸豈以言者為妖歟繼之者將言歟勿言歟縉紳中嘗有移書廟堂者亦弗見聽將弗能救歟於登崇俊良之中而首為掾豎逐直臣不為除目玷歟去天之妖不過修德至於人妖甘者如薺豈終無良劑歟過庭緒論可得聞歟恐謄題之窘不欲泛引故事答者將勿略碑銘志唐侍衛都指揮使王押衙太尉碑聖人之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災捍大患則祀之故厲山氏之後至今祀以為稷共工氏之子至今祀以為社此皆有功烈於民者青溪之東去縣七十里安樂鄉之楓溪有唐侍衛都指揮王押衙廟其始父老信其靈異尸而祝之凡冠婚喪葬營繕莫不質其吉凶而後即事歲有水旱札瘥禱之立應淳熙八年刪定陳公曄訪其靈迹紀之縣志越嘉定甲申戴侯師聖尹兹土以秋涸乞靈而雨以其靈迹聞於朝敕封靈惠廟忠順英烈侯仍捐己俸增葺祠宇檄少府董役不月而成嵳峩屹峙廟貌一新逮淳祐辛亥神之裔家於東土歲奉宗祀者來請豫紀其實鑱諸砥以詔不朽豫按縣志及索其舊碑所為文得其始末神生於唐大中元年神少負節槩涉書史慷慨沉毅膂力絶人長於弓馬劒槊世迄僖昭政權旁落藩方尾大翹足伺釁者環天下皆是神獨抱膝長吟自比諸葛乾符中裨將王郢倡亂兩浙鎮將董昌以戍兵單寡檄鄉井兵未有應者神首舉義旗與錢鏐協志應之郢既討平逆巢之釁作擁衆長驅攻掠浙東饒信池宣歙等郡神復乘勝擊賊合鏐兵誓死俱奮不介馬馳之所向輒捷賊畏其鋒遁自采石渡淮時髙駢為諸道行營兵馬都統聞賊不犯境壯之而奏於朝以神為都押衙鏐為都指揮使乾寧二年董昌據越叛朝命神偕鏐兵討之未幾昌就擒露布獻捷以功遷侍衛親馬步軍南北都指揮使而鏐加鎮東軍節度使是時宦豎驕橫如田令孜韓全誨等劫脅人主東西出其意神實憤之而謀適不用無如之何同列諸帥如李茂正朱全忠等無非挾強大冀非望之人神實恥之而大厦將傾非一木所能支舉目山河終夜雪涕於是浩然有歸志麾衆而東曰吾姑俟聖人出也居無何闕庭蹀血而唐室丘墟五十年矣我太祖皇帝六龍御天海外有截是何神先見蓍龜也神所居即今之安樂鄉環境十里皆遒峯矗壁大者龍跳小者虎臥下者﨑嶇迤邐淺露縈迂昂者層稜嶔崟形峭狀怪觀乎此使人心膽雄偉志氣踴躍其上楩楠杞梓幽幽陰陰蒙闕蒼苔絡紫蔓霞霧卷舒雲月吞吐觀乎此使人胸襟放曠起髙蹈塵表之思地靈人傑固應不凡也然神猶以平陸千里大江遼絶民旅擔賫酸股脫膝遂規度浚治為河湟以通舟楫千夫荷插萬畚齊作功未畢而殞星告變今天樂觀左遺迹如故觀者至今恨之神諱克儉字子廉墓在昌期鄉之柘源諸部曲所葬也神叔父長史昌胤仕唐昭宗神之兄副都指揮使克勤仕唐宦遊寶婺因家焉神之姪承義仕後周太祖為廷尉延壽仕吳越錢氏為主簿諸誥牒尚存其後枝葉碩大且繁今居淳安者皆其裔也嗚呼盛德必百世祀神有功於國有功於民有功於禦災捍患其世祀也宜哉遂為之銘曰皇路嶮巇誰扶誰持惟神驍勇東擊西馳有嚴鈇鉞所向輒捷蹴郢走巢翦昌定越外叛未清內姦已成何物閹豎納兵闕庭天翻溟渤一簣莫窒明哲保身進退不失殞星於東乃顯神功生封死廟嗚呼英雄行狀宋知郡寺丞俞公行狀并銘公舊諱忱一上字本從言從成後改公明字則明為君避也曽大父簡大父謙咸隱德弗耀父點自號雲巖居士贈奉議始祖稠仕吳越為睦刺史因家焉今為嚴之分陽公少頴書一覽輒記雲巖公鍾愛之家自為師友研經史寒暑不釋卷嘉定某甲子以周禮首鄉薦明年上橋門又冠之自是氣益雄文益進月書每先諸子鳴聲譽郁天京矣公以重闈在上不忍去膝下歸而私淑於家四方士負笈者雲集凡膏潤之所沾丐者莫不歆豔一世貢於鄉升於學魁於南宫者踵相接其目睫可數者如潘君忠恕何君夢然兄弟是也十三年以監舉試禮部未得志歸而益肄業十六年升舍尋擢上第調昭武教官寶慶甲申龍飛循修職郎旋居雲巖公憂服闋以慶覃轉文林郎再調和州教官兩易南康兼白鹿書院山長公教人以踐履為先擇經明行修者列職事以倡每講説必明界限析義利不專以文義優劣士用以勸當路如蒙齋袁公留耕王公著齋髙公咸剡於朝端平甲午董文上饒同寮持卷請差次公曰三場惟策可觀人遂拔其一及蛻號乃韓君叔穎士論帖然郡太守以撙節有羡將獻之朝公曰獻羡是逢君也不若以代民輸而弛其賦守勉從之二年鶴山魏公視師江上聞公而羅之幕公條陳攻守急務歷犖慷慨魏以逺器目之嘉熙丁酉調浙東帥幕來赴間京城災公攢眉時事移書時相規以省災異量賑恤禁侈靡省營繕數事二年改調淮東總幕旋為有力者奪之公恬不較歸而復聚徒於門未幾文清李公當國如京謁選復移書陳時病五事曰審命令信賞罰擇宰屬久外任選將帥李嘉納焉尋調臨安鹽倉弊蠧必柅出納必盡情履齋吳公尹京一見曰管庫豈所以況清流耶檄之幕淳祐辛丑被旨衡文别頭如洪如葉所得皆知名士四月遷書庫官二年遷宗諭改秩轉宣教郎三年遷太學博士輪對反覆援文帝太宗事以諷上首肯之次劄言科舉三事一曰考校拘執之弊二曰謄録鹵莽之弊三曰彌封易換之弊四年再為别頭考官前列如翁如湯皆公所拔也尋丐外添倅上饒會歲大旱公戚曰吾職勸農奈何視民飢而死也郤交承禮亟走羣望一夕忽雨郡境賴之積訟壓纍政不剖者山積皆為盡心一一當曲直民之訟於他司不直者爭願質於公咸曰乞送清強俞太博諸臺交委訟牒雨集一經豫奪無反覆者歲再飢公擇大家勸賑首捐己俸以倡又借公帑為糴本航他境米平其直以糶徐節他費補償之道有遺孤捐己俸募人收之民賴全活者衆當路如後村劉公虛齋趙公實齋王公交薦之五年轉奉議郎會徽及南康乏守朝廷聞公劄攝徽而當路又命攝南康公俱辭之越月以朝旨之徽居無何代者已壓境公鑰府庫以俟供給禮例皆却弗受還任信又闕守復攝事六月朝命以宗正簿召八月造朝差衡文胄闈撤棘乃領事七年四月遷國子丞以磨勘轉奉議郎尋考試殿廬得張君孟博歲旱副端張公小坡李公以言去國公以封事爭之不報言者從而媒孽之遂有主管崇道觀之命八年二月差知常德辭改知南康又辭不許十一年轉朝奉郎南康促代忽除公大理丞方控辭未行言者已尼之蓋柄國者欲奪公南康以畀姻婭故神其操縱如此尋再與公郡公悟遂丐祠以老杜門絶客菽水之外惟以書史自娛同志或為怏怏公無悶焉寶祐癸丑元日上挂冠請越六日俄疾革夜半呼子弟握手叮嚀不及他事惟曰吾負吾母不得終子職若能竭力事吾母汝父死不死矣言訖而逝蓋二月之七日也享年六十有七娶秦氏封安人子一澤民見待省進士女一適何應孫孫一松壽公生山水邑人物清苦而堅孝友根於天性學問勉於躬行雲巖公抱恙晨夕奉藥衣不解帶居喪盡禮哀毁骨立祖父母喪代終大事必盡禮外舅姑亡家窶喪弗克舉厚助之皆有歸里東孔道病涉捐金鳩衆梁而屋之其待人接物睦族展親居鄉交鄰靡不輯順度量寬容喜怒不形辭色遇事剛果不為禍福怖自奉儉約菲衣糲食破忩敗几淡如也居家蒞官未之改性不嗜飲賓至必設醴論文著述凡一十五卷號南疇集九月丙午奉襄於生仙鄉之傳巖豫與公雖不靣而心知敬則舊公之孤謁豫序羣玉丐狀公行豫焉辭輒銘之曰讀公之文兮金聲即公之行兮天成桐江之山公之名桐江之水公之心山之不動兮不以震撼而重輕嚴灘之冷冷兮或為公而不平悠悠蒼天殱我良人恭人邵氏墓志銘恭人邵氏者中奉大夫尚書吏部侍郎兼中書舍人兼同修國史實録院同修撰兼侍讀方逢辰之妻乃吾母夫人之姪也名滿父曰彌髙為嚴陵之知名士生於嘉定十六年癸未六月十日以淳祐辛丑歸於我寶祐甲寅以夫有位於朝封孺人越二年丙辰八月二十有三日以疾卒年甫三十四也明年丁巳贈安人咸淳丙寅贈宜人又三年己巳贈恭人男三人國孫夢孫鄱孫女三人省女福女孑女咸淳九年九月二十五日甲辰葬於龍山之北曰汪尖山下去家僅十里逢辰銘之曰夫人之家世種福田乃生爾姑為女聖賢又生夫人秉心塞淵如何蒼天乃不假年三十有四已埋於阡後數百世陵谷變遷君子鑒兹為我掩焉有宋方公翠坡先生方母安人潘氏墓志公之冢子於逢辰為婭壻其冢婦又逢辰表女兄也孤子楍來為公請一言以表於墓豫何辭公姓方吾宗之典刑者也諱天驥字龍友娶潘氏公人物磊砢倜儻少年場屋有雋聲屢膺亞選幾戰胄闈居家奉親孝故乃翁壽至百歲教子篤孝方二雛皆讀書世其家居鄉里質直好義每持公論以裁物凡人有不平者輒質平焉人多德公晚年酷好恬靜幅巾竹林之下自號翠坡老子閉門淨掃一室讀史觀詩暇則閲老佛氏書每語人曰老佛氏之言與吾儒相近蓋喜老氏知止之論與佛氏有誘人為善之意其霜降冰涸之年孳孳之好如此夫潘氏安人生於詩禮之門幼失所恃事叔嬸如母然在室清貞淑謹父疾革嘗刲股以療之孝感神明長以年德擇對來嬪於方安人孝事舅姑義處姻族無違夫子撫育諸男女恩愛如一翠坡翁治身理家待人接物其善德令聞安人內助之功為多焉子二人長壯猶娶莘田邵氏孫一人會老俱亡次本逢辰曾帶行應試娶府城陳氏又髙坊某之甥女也孫一人嗣老翠坡翁生於慶元乙卯卒於寶祐丙辰安人生於丙辰卒於庚午男楍卜其宅兆以甲戌十一月合葬於進賢鄉之二龍塢童會卿墓銘童會卿之孤泳元翁館於家孰泣請曰泳先人生於某年某月某日以咸淳己巳五月某日卒家貧未克葬越八年丙子宇宙大故先人弊廬為盜焚毁兄弟僅克以死獲殯今以某年某月某日葬於某所蓋祔先妣兆域從先志也請豫為銘元翁每與豫言乃翁自七八歲失母隨父東西寄學於大家之孰逮長卓有立志處里族篤以睦交朋友實以遜雖遇田夫孺子不敢慢人亦敬而親之數竒不偶以秀才終其身豫惟人之才與學與文天不茍以畀人也降衷之初其性善同而智愚賢不肖之質則有異有其質而無學無文者又滔滔也豈非天降生民不嗇其性而獨於文與學不肯多以與人乎自宇宙變革以來士不守其業臨難茍免衣冠降於皂櫪之下獨會卿家守其文學自其父業於是今其子又業於是其孫又業於是天之所甚嗇而不肯茍以與人者乃獨鍾於會卿耶會卿諱驤龍安項氏江州湖口宰女姪也子泳次某中子早卒孫某銘曰先民有言既富方榖世變日下貧乃其福三后之姓髙岸為谷窮士之家守志彌篤四世讀書一簞自足後君百世尚有膏馥蛟峯文集卷七
