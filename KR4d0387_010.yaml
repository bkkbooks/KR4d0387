body:
  text: 蛟峯外集卷二宋方中續輯贈蛟峰先生易登雲新扁記嶽元帥時先祖㑹書盟於馬岩聚星樓淳祐戊申易登雲新扁明年鄉闈先祖果登首選又明年廷唱為進士第一人斯文信有徵矣淳祐戊申鄉之寓公秀士方夢魁輩將以二月乙卯易登雲新扁揭於聚星樓前蓬萊山人諗於衆曰是扁之設丹漆其字金璧其書巍巍煌煌炳星麗日揭之通衢十手爭指十目爭視文則文矣實安在乎簪纓峩如劍佩鏘如牲牢既具鼓吹畢陳斯名之揭斯䜟之符津津喜色已溢睂睫文則文矣實安在乎吁文者末也實者本也寧使實過於文無使文浮於實虛其實而求誇於文諸君之自期者可謂誕矣略其文而求工於實諸君之自勉者可不力與聖天子賔賢之詔不期月而頒好事逼人瞬目過耳堂堂之陳整整之旗空拳可以冒白刃乎短兵可以接勍敵乎日月却從閒裏過功名不向懶中來此十四字座右銘也諸君生長儒鄉登巍科躪膴仕前後輩出衣鉢相傳源流有自加以同力合志鬱乎俊秀耆英先達凛然典刑可以激昻後習勉勵新功相率以為善相資以為益奮凌雲之志藹如雲之文展拏雲之手遂登雲之願使實足以副其文則今日之揭斯扁也未為無助異時之覩斯扁也大為有光若其人自為師家自為學專門獨擅面牆株守無不恥之心狃懷居之習坐失事功虛擲嵗月三年過矣又復三年徒新登雲之扁覩登雲之兆文不副實非特為諸君之羞抑亦為是扁之羞矧今大魁黃君亞唱昕廷首破天荒地相連也居相邇也諸君之相與友也諸君之相與㑹文者也豫何人也時至氣應行當放出一頭地要在勉之而已豫將洗目以觀盛事賀蛟峯先生及第書方雲峯某揆時白蘋風徑黃菊露鮮共惟某官徜徉帝里領䄂神仙穹厚協扶台候動止萬福某粵自夏新躬造屏廡攄展賀忱過厪尊府肅入得以服膺老成之論喚醒久矣君子之思春風滿面秋水照人黃鍾律吕之韻入耳著心塵埃為之退却三舍銘鏤肺肝又在豆觴殷勤外也臨行而魁騎回轅雖得略伸慶悰第若來鴻去燕適相遇於江湖之渚踵復東西有言莫罄不滿至今自是判别瑰儀傴植瑞蓂五换杓明嶽峻徒厲清夢某久仰執事負湛盧之器藴相如之學文光百丈筆力千鈞摘髭一第固其餘事然而以壯懷而掇巍科儕膴仕榮雙親耀一族實所罕見况執事進黃君之地位破嚴瀨之天荒吾邦增重士類生輝雖牧圉芻養亦且踴躍不禁則凡勵志螢窗攻心雪案者當何如其鼓舞耶若兹盛事殆未可以尋常慶語形容也繼今以往駑駘下質朴􅈪小才亦將淬鋒厲刃刮垢磨光願踵芳躅又寧肯甘心暴棄耶如某者蘭宫退鷁今年未能竊魁宿之輝以同姓作同年良亦飲恨然大事業固不敢起幸覬心或者以華家喧轟在前恐可叨光借潤追逐遐軌髙明謂何載惟執事雖今日名魁四海恩寵九重大可喜而可賀而愚心所期直欲為國家梁棟作蒼生霖雨勳猷與伊傅齊驅豈以一大狀頭便為兄足哉敢冀酌乾之運輔泰之主式玉其躬以需新渥之寵拱俟錦衣榮還敬敢趨走崇墉尾賀賔後先此擘箋寄鯉以寓賀私之萬一伏丐台照謁蛟峯先生書方萬二丈某聞士大夫達而在上其德惠之所施功與造化同夫造化天地也噓之則暖然而為春萬物以之生吸之則凄然而為秋萬物以之成此理出於自然士大夫使然之功奚其同蓋以眷負四海之望唾咳風雲陶泓雨露貧賤者可使之無貧賤失所者可使之不失所旨意之所寓恩波之所洽是雖使然之功殆與自然之化同一機緘歟共惟某官闕受間氣以應昌期以歐陽子之文章收王文正之科第明料如包孝肅而寬大過之鎮靜如韓忠獻而學問有餘受知兩朝道山蓬閣藥階薇省未幾而分符未幾而荷槖共參大鈞論大政垂紳正笏措天下於泰山之安者行將見之是當令飢者之求食寒者之求衣不遂者之求得皆有望於名公之造化矧如某者寧獨無心於此某碌碌無似年不後人才不先人誤䝉以鑑軒溪堂之澤俾納交於筆硯窮通異命矣而軫念之不忘雲泥殊勢矣而豫潔之猶故非三世夙緣不爾也慨先人早世母氏繼亡三妹一弟笄者嫁冠者娶叢責於一身安居萬山欲耕無田所資者泛舟之役欲蠶無桑所織者貿絲之將雲窗雪案之習又不能與商賈相爾汝所以孔方常下絶交書也吳門别業搬載阻於江禁之嚴顆粒無從水旱相仍強幹乘之反食主肉之弱得不償失未免俾之易姓以無源之水而事灌溉以不根之木而取花實羣疑滿腹衆難戡胸所以不二十年家徒四壁先人之墓木雖拱而慈氏之櫬未入於九泉風雨霜露曷勝其悲弟妹之債僅圓而妻兒之號寒啼飢人不堪其憂可謂宇宙間枯槎敗枿陽春誕布生意不相干預吁造化吾固無望於天地同造化之造化豈無望於名碩耶周公瑾指廪魯肅得以濟其飢范忠宣捐麥其友得以葬其親某也固不能無所求求則於是執事以大魁登顯仕江浙東西虎節龍符或文墨之舊殘膏䞉馥賢於十部從事者俾某䄂之以曳長裾焉晴花晝妍麗錦春濯彼必襲連城之寶為榮幸矣如是雖不指廩指之者無非公瑾之廪雖不捐麥捐之者無非忠宣之麥生者感之死者亦感之矣抑又聞之士之已達不忘交好之窮謂之仁士之未達能求友好之貴謂之義仁者豫其所當豫而能周其急仁莫大焉義者求其所可求而不例其進義莫大焉某之所謂其亦庶幾於仁義者乎干冒崇嚴不寒而栗賀蛟峯先生復祕書署摘句渙膺宸綍晉陟道山天下第一人宜獨秉蘭臺之筆狀元為宰相即並調梅鼎之司賀蛟峯先生提刑江東書文天祥某當公在螭坳時嘗奉一紙書於閣下書上未幾而公歸蛟峯矣譬諸草木臭味實同瞻望雲山臨風切切某兹者恭審升撰祕丘宣威直指西臺與政蓋嘗識潁濵之文東路洗寃亦以行濂溪之志六絲初駕一佛歡傳共惟某官色正而芒寒揚休而山立言語妙天下材稱一代之奇出處重本朝望在諸公之右自夾侍玉皇香案等而上之胡不均𢎞俾執事樞國家重更迭之制江湖一節煩公驅馳式敬由獄以長我王國公所學在此歸哉歸哉中詔在道某山林之下靜觀世故其於君子進退安得不致其惓惓芝山父老迎擁星軺以時考之可矣輒馳一介自附於門下燕雀江水東西心期天逺臨紙欲飛上蛟峯先生書僧無文比禀違後為慈親請田事見實堂又留兩日乃絶江省洪氏女兄桃花峯下徘徊玉溪柳塘間三月初方還鄱鋒車促覲屢見近詔正人登庸固可為天下國家賀然驟失賢父母又極為西民惜也度關紫氣已行復輟豈山川鬼神陰留濳尼以遂斯民所大欲耶某伏奉公移以上藍缺住持事俾舉所知敢不循名考實以求無負侍郎主張之意然有所謂明老者昨領鵝湖於大壞極弊之時百廢具興內和外恱惟恐其不留而翩然引去寺僧申邑邑申臺此侍郎曽出公帖留之矣明老去意不可奪托某申懇乃已今之為住山者多彌縫鑽刺深根固蒂惟恐不盡其術若僧若俗又惟恐去之不速於此可以觀明老人品矣侍郎求僧於數百里之外某以妄人應舉不獨有愧侍郎亦愧此心也荒荒眼底求一可人如某意者不可得而况侍郎兩眼空一世乎此所以舍明老外不復他舉也淳民以橫斂上蛟峯先生書此書長老傳言先祖既得書手封送州縣官曰亟改亟改不改且奏聞矣州縣大懼弊政盡去民如解倒懸也書具載家乘用附卷末以彰先祖之德且使有民社者見之亦得以自警省而平其政庶幾先祖之仁心不獨行於當時云淳安縣士民董有真等謹百拜裁書獻於國史中書右史吏部侍講侍郎先生師席前某等嘗聞先正范文正公居母夫人憂日上宰相書及民間利害凡萬餘言仰見先正以天下為心以生民為念初不以大憂戚而暫忘也某等今有利害迫於已庸敢合辭以請惟先生其聽之某等生為嚴民同飲嚴水嚴之為邑有六田之少者惟淳為最千畝之户不滿十百畝之戶不滿千豐年樂嵗民猶不足加以連年水旱夏秋之間粒米珠慳掘草茹根茍活殘喘雖中上之户亦趨而下矣遭霜之葉不可以風垂憊之證豈堪再汗斯民一線生意撫摩而愛護之猶恐旦暮之不保何况椎其肌而剝其髓乎洪惟我朝培植至仁以生民為國脉聖天子紹休聖緒以忠厚為家法令戶部遍牒諸路苗米不得過數增收髙折價錢許人越訴多出榜文此八月十八日之聖旨也頗聞州縣於百姓不甚加意夏稅秋苖取之無藝此八月十九日之玉音也所有被害民户仰外經監司內經臺部越訴根究得實官吏一體坐罪此九月初五日之聖旨也元老恭謹聖訓則有預期而催數倍折價之憂以為聖天子加念元元祈天永命無易於此臺臣上體玉音則有愛惜民力重催疊擾之奏且欲令郡二長嚴戢吏奸上而聖君賢相問答之懇切下而廷紳百執事章奏之敷陳其為生民慮者無所不用其至承流宣化正有望於近民之官也天錫吾邦得賢守令為民父母斯民舉手加額以謂郡龔黃而邑卓魯欣欣然而有更生之望有如王賦供輸前此州縣之號令一頒雖窮崖深谷之民亦奔走奉命之不暇孰敢有越厥志今也吾民之視守令如父母而守令不以赤子待吾民非惟不以赤子待之且以非類待之矣申請府由挾勢作威乃欲置之於湯火中銀牌之大如門悍吏之唬如虎一邑震駭神散魂飛千百年古淳之民未嘗罹此虐焰也家之老稚相視而泣大則有家破之憂小則有瘦死之患號啼之聲上徹青冥國家之所恃以為命脉者乃欲一旦而斫削之仁人君子不忍聞之而見之也作俑之吏方且揚揚然以為我能為官辦財賦我能為官作威福刻薄之政肆行撫字之仁何在縣吏則曰我即知縣也府吏則曰我即知府也十四鄉之貴寓巨室我能箝之而制之十四鄉之下户細民我可生之而殺之狡焉小吏弊例捷出已納之稅一匹則有六貫之陪已輸之苗一石則有五關之貼以至上供折帛又有三貫重納之折絲綿每兩則交稱二十錢重豈文思院有是稱也而又有所謂頭腳者焉苗米每石則折納六十貫豈豐稔嵗猶有是價也而又有所謂縻費者焉以至禾稅畸零每尺例有一貫之取則又有腳錢鈔錢者焉聖天子有苗稅取民無藝之憂今州縣則取之過苛矣聖天子有秋苗髙折價錢之慮今州縣則益之倍蓰矣平章有恭敬聖訓之心州縣則若不知之臺諌有遵體玉音之奏州縣則若罔聞之一有上司催科之榜則宣之揚之以揭通衢之牆壁惟恐其不張皇一有聖恩寬民之旨則祕之密之以塗時人之耳目惟恐其有見聞甚至前政預借之關必不用今來趲借之令必欲行問之於吏則曰前政之行不可用也問之於官則曰前政之借不可理也知縣方欲有循理之言而專局之官吏乃從而箝其口知縣方欲動宛轉之筆而專局之官吏又從而掣其肘曽不思前日之借既以為非則今日之借亦未為是前日之關狀不可用之於今日則今日之鈔書亦不可用之於後日也誠如是則民間預納之錢遽欲使之平白泯沒於官理耶法耶故鄉民為之語曰去年預借官不還今年典賣重納官今年趲借急如火明年飢寒如何過況夫屢年以來縣無正籍止憑府吏隨時標簿暫爾批鑿影射鄉民今日之足鈔未必不為他日之具文也始也專局官吏之來西風颼颼黃葉悲秋今也專局官吏之去四知不畏暮夜行舟抑明月歟抑膏血歟將盡歸於公朝之府庫歟抑歸於私家之囊橐歟人見其空篋而來滿載而往婦子伺門僮僕歡迎私相告語喜色津津是雖一家之幸為可喜不知一邑之哭不忍聞也嗚呼蝮蛇之毒暫歇虎狼之惡又來一邑元氣銷鑠殆盡龜皮鷺股豈堪頻刮而頻封耶但聞道路之間攢睂而語曰前官去時削盡膏脂後官來時剗盡地皮一邑之民罹此荼毒抱此寃抑欲以畀辟正理鳴於縣官而縣官不之受欲以此情此意白於郡使而州縣相為表裏蕞爾小民豈能回郡侯之聽也於是相與語曰吾邦有先達之尊以堯舜君民為己任行將霖雨天下豈不能灑一滴以活吾邑之涸鮒乎某等今有哀痛一書陳於百里欲乞鈞慈轉而致之琴堂以回一邑之生意先生今之文正也必能以文正之心為心垂情父母之邦上為國家夀元氣下為斯民續命脉達之州縣可也申於臺部可也聞於朝廷可也庶使九重之仁無壅斯民之疾有瘳吏奸可絶橫政可寬預借可免而前官之關狀可開矣一邑幸甚惟先生其嘉聽之訪蛟峯山房二先生紫陽方虛谷朝窺石峽峽中石暮宿風潭潭上風石峽蛟峯所居風潭山房所居石峽書院賦紫陽方虛谷歷故鄣之遺區兮泝桐江而西上百灘跳以湍駛兮萬峯閴其清朗挹寒碧以濯纓兮睨空青而倚槳維還淳之古邑兮割歙封之東壤昔固嘗郡於斯兮猶民稠而土廣豫家於紫陽之下兮濫此邦之來長雖視之若桑梓兮愧曾微於善狀七閲嵗曷不歸兮駭童顛而槁項賴多士之微俗兮遵砥途之坦蕩猶阡陌以勸耕兮嘉農畔之洵讓偉深衣與大帶兮勞豫行之鞅掌曰肄業於精廬兮新石峽之嵦􅲞領袖者豫同宗兮又同登於龍榜鬱經綸其未竟兮聊私淑乎吾黨眷吾宗之嬋嫣兮扣古初而遐想古雷氏之嫓軒后兮實得姓之攸昉至姬周而昌大兮叔佐宣而善將參召南之雅什兮詠其猷之克壯伯牙之師子春兮絃山水之幽響燁兩都之九卿兮字君實而名賞紛蝟起以鋤新兮有平陵之相望成敗之不可以論人兮亦一時之倜儻猗真應之仙翁兮知駕鶴其焉往嘆異代之陵寢兮孰不凄迷於烟莽彼金碗出人間兮此獨巋然而無恙羣雲仍之簪纓兮謹嵗時而來享隱鸕原者曰于兮守雉山者曰亮一則保土宇以綏靖一則擅詩名而髙尚皆賢良之苗裔兮匪郡乘之私奬豫君玉之好修兮鼓斯文而為倡昆季儼其連璧兮邁坡穎之超放出寸雲必為霖兮寧退處而孤抗肯斯堂於傍近兮奉聖賢之遺像聚學徒而蒞止兮咸攝齊於函丈俾掃松而釋菜兮契豫衷之歆仰托鹿洞之故實兮謂升堂而授講嗟豫學之久荒兮艱弄斤於般匠拾朱子之糟粕兮切有聞於疇曩情之動貴乎省察兮性之靜在乎存養未發固無所偏倚兮發則欲其各有攸當致知以進其識兮居敬以除其妄如鳥翼之必雙兮如車輪之必兩日用飲食無非道兮勿馳情之惚恍一念不念之間兮分聖狂之克罔噫近世之不古兮罥名場之罝網科舉之壞人心兮競區區之得喪厲夜生子而取火兮幼嘗視以無誑以干祿為始教兮將終身其奚仗天或者惡其然兮斯革弊而矯枉無所為而為學兮真儒庶其可訪聲乃心於希瑟兮槃厥躬於陋巷顔曾固何必仕兮勝齊魯之卿相或孰居而授書兮或野藝而植杖君子睟盎以潤身兮小人給夫一餉化銛鋒而牛犢兮息缿筒之鷸蚌春豳酒以介睂壽兮豈太平之無象嬰吏徽而弗豫蛻兮言及兹而泚顙豫固將引而去之兮疇敢卜鄰於思曠時辛巳孟夏十有七日壽蛟峯先生七旬邵清溪元祐人無幾對西風從頭僂指寥寥誰是劫火灰中真鐵漢老闕一人而已那闕掀天揭地司馬不來諸老去奈乾坤顛倒成兒戲天下事竟如此小春明日浮梅蕊到如今平頭七十依然弧矢且把六經書盡注更占峽山深處又管甚世間風雨稱夀一觴公須飲道此心千載斯文寄康濟外總餘事右調賀新郎又方逢振峽山秋晚峭蒼寒萸菊拒霜時候眼底氛埃千萬態看盡雲輪白首宇宙骰盆天公兒戲人事猶芻狗此翁七十精神只麼如舊須信待足何時不如人意時事十常居九到得聖賢無奈處天亦不能管勾司馬自傷伯寮自訴於我乎何有喚莊生起借椿千嵗為壽右調念奴嬌賀蛟峯先生入宅詩何夢桂富貴朱門蓋里閭先生斸石此山居一區自足子雲宅三徑何妨靖節廬萬壑風雲生几席四山花木入庭除乾淳豈少髙官爵自是寒泉要著書賀蛟峯先生得孫方山房翁年六十九大郎才得孫五行不孤亢停當乾與坤於焉觀於穆孝悌天已根賢愚一任汝鞠育推豫恩我觀人祖心恨不見曾元曾元日以逺多至昧厥源惟有睂山家穎弟坡為昆慶圖掛髙堂幼幼而尊尊代昌賢才出根碩枝葉煩願是我家兒庶幾大吾門蛟峯外集卷二
