body:
  text: 蛟峯文集巻五宋方逢辰撰記嚴陵浮橋記嚴治萬山窟無河渠無大陂濼遇秋夏即浮橋面州壘惟一衣帶水宜無洶湧澎湃憂然歙流直注婺流横絶山包而水不洩一潦即又大浸居民遇梅霔常惴惴有魚鱉之懼然此猶有時也由定州壘門直涉而南斷岸千尺民由是出者耕焉器焉牧焉由是而入者薪焉蔬焉菓焉由是往來戢戢者販夫販婦貨焉貿焉市所無郊運以入郊所無市載以出一日病涉則耕者器者牧者厄薪者蔬者菓者梗販夫販婦貨者貿者滯吾城内外之甿且以病告此則旦旦之憂也於是不可以無舟舟猶險也又從而梁之然後涉者始無憂雖然涉者無憂固有任其憂者夫舟與梁皆木下渰而上覆風雨之所剥蝕波濤之所轟豗舁擔之所蹴壓舳艫之所挩拽馬牛之所騰踐數年一葺又數年一易為費且浩瀚州家憚焉歲在丙辰李侯以胄簿來守兹土每事痛撙節下車首問輿梁之政侯亦可謂知務者斯役也舟若梁故者腐者悉撒而新之葺而仍者十不一二舟七十梁百有三十其製之廣袤數之多寡悉仍其故鳩工集材於府治侯躬自檢柅其受給也吏不得隠其營作也匠不得鹵莽故費不浮而事集工堅而人忘其勞㑹其用為緡萬有五千為米斛者百材木綆鐵不與焉十有二月梁成官民慶之屬予記其事郡丞武博呉愷且語予曰此郡太守撙節力也余謂節用愛人此治千乘者第一義二者固並行而相為用也不節用者固不能愛人徒節用而不能愛人則其節也必入於吝不愛人者固不能節用徒愛人而不能節用則其愛也必反於刻世固有墻傾壁壓而不能恤坐視民之墜水火而不拔一毛者曰吾節用也又有唾金穀一切汎愛甚至屠人膏血而濡洙乎螻蟻曰吾愛人也出納有司所專也而侯謹焉興作人情所憚也而侯樂焉此無他視人之溺猶己之溺怵惕惻隠一觸即奔迸不可遏而舟梁一事其火然泉達之始歟余家青溪濱熟睹病涉者重有感於斯而書侯名介叔字直翁宣城人也天邊風露樓記乙卯之冬十月既望余自館職言事不合以歸友人盧登父上春官就坐囑余記山樓巔末余方入林而登父將發軔請因扁樓之義共商之宇宙間一氣耳掀簸萬物莫勁乎風此天地之至剛汛濯垓壤莫澤乎露此天地之至潔故風露氣之清以任者也肖翹惴耎洪纎髙下莫不秉是以生以潛以動以華以實故受氣之不剛匪潔者為朝菌為秋蒲為糞蠅為裩􅀢人亦然貢薛韋匡用之固葩華闕庭而熟視諸賢駢首刀鋸束頸栗股於刑餘之掌握醖成漢鼎易姓之禍君子貶其孱柳宗元劉禹錫元徽之之輩非不文彩燁燁而比之匪人不辯芳臭萬世穢之信越平布拔荆棘立赤幟而頑鈍無恥似任而不清西晉之士揜鼻富貴芥視六合而無能為中原取一塊土似清而不任三代之下何寥寥乎我思伯夷伊尹喜之慕之孟軻氏曰伯夷聖之清伊尹聖之任雖然軻特區别而言之夷尹易地一也登父屋於溪山境樓曰天邊風露白雲趙漢宗扁也風乎露乎取二氣之剛且潔乎陟而俯之四望迢嶤鬱乎蒼蒼面浸寒碧蛟宅驪窟樓之偉觀也左冊右絃積床牙緗鉅公名人走筆龍蛇樓之貯珍也笠樵入林斧烟丁丁謳漁泊艇燎月熒熒樓之朝昏也柘洲春藍菘町夏甲圃秋橘霜坡冬梅雪樓之四時也其人如玉人醉我醒踞吟風濤已重物輕樓之賔主也斯主斯賔歴覽四時徜徉朝暮挾貯珍飽偉觀把酒呑英風拂劒嘯勁氣風露在天乎在我乎窮則夷達則尹不綽綽乎漢唐諸子之孱穢當望避三舍勤有堂記余外兄吳景邁寺簿壯年築居室經營數載而後畧備旁為書室三間取昌黎之言榜曰勤有為讀書敎子之所丙子春宇宙大故屋遭刼燬獨勤有巍然烈熖外景邁語予曰殆天未喪斯文子為我一言以訓諸子余惟勤有之為言勞也力於所有事也人在宇宙間未有惰而生者農與工賈雞鳴而起雖善利不同莫不孳孳各有所事士獨可以不自力乎哉天下物之不可以力而求假使求而得之亦非可以力而有之所可以力而有者獨學問所得天之所與我與生俱生者也常人於力所不可求者則遑遑以爭而於可以力而有者反悠悠以媮不亦失其勤己乎人與萬物之生天地間我乃得其全以為人天與我以人之形又與我以人之理而我乃不能承其所與而有之則人之形雖具而所以為人者則亡然則何以有之學而已孔氏之敎法曰博學之審問之慎思之明辨之篤行之先儒曰五者缺一不可學之目有五所以行之者一勇而已矣學以弗能求能學之弗能弗措也問以弗知求知問之弗知弗措也思者必於求得思之不得而舍置焉是無勇也辨者必於求明辨之弗明而含胡焉是無勇也行者必於之善行之弗篤而茍簡焉是無勇也人能行此五者決之以果持之以毅進之以序終之以不倦一念之決為賢則賢為聖則聖孰禦陶士衡志在事功則朝暮運百甓以自勞蘇明允志在文章則閉戸讀書十年然後下筆則沛然矣事無精粗無大小未有不自力而至者况以上而求為聖賢哉彼亦有以頴悟為道以鹵莽滅裂為學者其說謂不由階級不假修為以致知格物為支離以躐等陵節為易簡以日就月將為初學以真積力久為鈍才匪徒誣人亦以自誣天下未有一超徑詣忽焉而聖賢者吾景邁甫所取勤有之說意葢為此豈徒為撐腸柱腹五千巻而已哉芳潤堂記文章以芳潤擅名自陸士衡之說始予外兄呉景邁築居室也於進修敎子之所榜曰勤有於游息延賓之所榜曰芳潤其用力於進修而游息於文章也歟丙子宇宙大故屋室為煨燼獨勤有芳潤二堂在予既為發勤有之義復俾記斯堂所以擅芳潤者予惟山川之氣升為雲降為雨潤莫大焉其滋液鍾聚為根荄芽甲洩為春華斂為秋實芳莫大焉宇宙芳潤之氣吾與斯人凡有生者所共食也文章家士安能而專有之青溪之南去邑三十里曰雲程其溪山演迤其勢宏以放足以大受吾景邁伯仲以詩書宅焉絶溪而南有墟市富者商者鳩焉其水陸達杭越通衢建凡舟車日夜之所奔走皆奪吾山川芳潤之實以去之者溪山不改風景頓殊井落荆榛㕓市瓦礫俯仰宇宙山川芳潤之氣鬱積磅礴無所發洩廼為山林枯槁者之所受用而獨專其有於斯堂又非他人所得而奪之者幅巾藜杖徜徉山水間昕往暮歸歴覽無際斯堂之行窩也左右面勢小垤大陵或曲而阿或呀而谷或崖而嶙峋或石而崔嵬一川横陣風之則波而紋日月則絢而章鶩鳬鷗鷺之出沒鱖鱸魴鱮之洋洋圉圉斯堂之詩窟也或漁而扣絃或樵而行歌聲嗚嗚而田家之撫缶夜漫漫而牧童之扣角或欣或嘅為過耳之飄風者皆斯堂之感心豪興也日出而霏開虹收而雨歇雲脱天空而月在水落石出而潭清凡朝暮四時之變化不齊者皆斯堂之澄襟霽宇也是氣也流行於宇宙則為民物之所共有收斂於山川則為騷人雅士之所獨專此吾景邁以文章家而擅之者歟雖然元氣混淪絪緼於天地間著形於萬物者孰主宰是孰翕闢是景邁甫平生用力於濂洛關西武夷之學自明而求誠由博而反約則夫文章之妙雖得助於氣而實根於道登斯堂者又當索文章於睹聞之外靑溪縣修學記孔門敎人要領一言以蔽之曰學道子游得之為宰邑法蓋君子學道決不肯於仇其民小人學道必不忍於尤其上上不仇下下不尤上雖治國平天下可也於一邑乎何有嚴瀨一絲凛凛有生氣青溪嚴上流治萬山窟其民蠧愚而堅忍豪家畝不能百甲邑版者不十室而歲收斛不滿數百甚矣民之窮也習於窮故慣於忍窮以忍貧賤不能移苦以堅富貴不能奪敎之入也莫易乎哉邇年來上下以􅗀絲為功守迫之令令迫之民而胥吏最黠足以顚倒其長令之峻也火以熬政之怪也湍以驚噫仇矣朝三暮四狙其不詐乎弱者買吏以為安強者伍吏以為市畏征者逃其田怖役者竄其戸鷗鳴舞而不下矣為令者又相與詆兹邑曰難治噫斯民也三代之所以直道而行也民之尤乎上者其無辭乎淳祐辛亥四月石君孝聞来尹兹土越明年夏大水禍半天下而嚴尤甚城郭壊陵谷遷室廬十蕩八九賴尹顛頓扶服而登之岸淳之赤子一飯必曰微尹吾其魚乎越明年又烖以旱尹扶傷救死日不給雖大賢處此亦有未暇禮義之嘆一日㑹邑之寓公秀民慨然以修學校為急尹之心子游之心也抑將以禮義救人心之溺矣雖然土木談何容易尹曰費當自公出吾將請於郡民曰費當自百姓出吾當率以助尹戚曰是厲民也民悦曰以佚道使民民忘勞也尹捐俸以倡鄉之秀民聞風興起咸戸相裒願翼斯役而無尤其上之心羣目而凛之不日而成由殿而堂堂而廡廡而門此經營之序也大成殿規模舊雖壯屋老風雨摧壓兹上覆悉改作餘則撤腐易牢四隅易以遊楹面殿設朱綠檻天井悉易甃先聖賢像加繪先聖座上下四傍設障加帷仍几而丹之廡下從祀七十二像升之殿東西兩夾室殿北有堂三間曰化成舊梁棟微弱今易以壯撤榱桷重覆之氣勢𢎞敞東西各一室再整刷亦如之仍長諭館焉長東諭西堂之北明室三仍扁兌軒軒外逼通衢舊甃頽塌來往者攀而入今易疊以峻之東廡入首創屋三間朱扉明牖扁曰東齋㕔西廡如之扁曰西齋㕔㕔相聨分兩齋扁仍之齋相聨有室四東則仍令尹祠土祠創五先生祠西則仍融堂祠學廩兩廡舊無甃今甃之門三間及左右翼室並撤新所仍者無幾并門㦸易之左翼室仍扁直學位又旁室創為祭器庫并圗經在焉右翼室扁曰齋館封土崇三十尺種杏扁曰杏壇庖屋兩間在西廡北之右齋𨽻室兩間在東廡南之左皆創也垣墉舊圮成熟路今厚築而藩焉經始於寳祐改元仲秋告成於明年二月朔是役也邑尹啓之邑侯贊之鄉寓翼之諸生先後之庶民懽樂之乃集厥成慶成屬某記始末某謂前令非不言修校也為其事者無其心分其事者無其人塗扄鍵粉墉壁已即功徒於室之壁書曰某年某月某日某人葺也今則尹親督斯役又得鄉之賢士夫老成縝實疏暢者董經營司出納一匠一夫皆倣鄉例和貿僦而來之飽而役之犒而遣之民悦於使工力皆堅實可經久不壊噫土木非樂事也而民雖勞且費也無尤固足以見尹無仇民之政然亦可以觀人心矣尹輟俸為緡五千鄉之秀民助緡五萬有竒邑僚助緡六百寓公學職助緡萬餘刋諸珉姑以記歲月云思堂記琅溪余氏其曾大父邦程捨田於安福院者二十畝至於孫應龍暨曾孫繼先志又兩世以十畝入焉其祖妣方氏孺人墓於院之陽也厥後於院左闢一室曰思堂為奉先之所俾院僧主之春秋設饌外毎嵗孟春則輪差子孫同院僧徧詣余氏之先塋所誦佛經以代俎豆展省之禮是舉也余氏有孫曰振玉者出家於本院實綱維是此報本反始之心歟厥孫洙請余記其本末余惟義理之敎行於堯舜三代之時禍福之説興於石姚之世天下治少亂多家之貧富不常子孫之賢不肖不齊是以堯舜三代之所宗主者有興有廢而石姚之所興起者則有興而無廢於是孝子順孫欲報其先者悉託諸石姚之所敎者焉葢禍福之説可行於亂世庶彼之敎不廢則吾之祠堂亦可托之而不墜焉爾若振玉為浮屠氏而有孝弟心此則尤可書者贑州興國先賢祠堂記贑州興國地雖僻小先賢仕國也慶厯甲申大中大夫程公珦以大理寺丞知縣事二子侍焉學焉越二年丙戌公由興國攝倅南安識濂溪先生周元公於理掾以二子師之即明道伊川二先生也明道生於明道元年伊川則生於二年侍乃翁在興國時明道年十有三伊川十有二國史傳曰明道自十五六時興弟伊川聞周茂叔論學遂厭科舉業慨然有求道之志葢此時也咸淳十年吾友臨川何君時了翁試邑於斯考往牒知為大賢過化之邦二程子始學之地景行先哲廼創書堂於安湖於講堂東奉大中公父子祠以元公侑之二千里走書介入嚴陵山中語予曰江西為周程授業傳道之所實自興國開先焉子為我一言以發濓洛授受之微㫖以開斯人某竊惟聖賢之學自孟氏後無傳距慶厯凡一千三百五十年而周程出焉非元公無以傳絶學於千載之不傳非大中無以識元公於衆人之未識故祠以大中主之元公配之二程子侍焉若元公之面命以授而二程子之捧手以受者此為何物太極一圖不以語他人而獨以語二程子及二程子之教人則專以語孟中庸大學為主而未嘗一語及太極或遂疑其非元公之書而爭辯紛紜至今學者猶相枘鑿嗚呼夫所謂太極者其盡在圖也不窮理之所自來則滯於形氣之粗下而不足以為造化之樞紐品彚之根柢不體理之所實在則淪於空寂之髙虛而不足以貫本末而立大中該全體而達妙用天之所以髙地之所以下陰陽之所以動静此何物哉必有為之主宰者未有天地未有民物以前又何物哉必先有是理而後有是物也周子將教人以窮理之所自來不得不探天地之根極萬化之源以為言故名曰太極又以其形形而實無形也故曰無極而太極二程子將教人以體理之所實在則不得不就日月事物切近者為言故曰道不離器器不離道二程子之不言太極乃所以詳言太極之無在無不在也何也入孝出悌徐行後長即太極也桑麻穀粟日用飲食即太極也出門如賓承事如祭即太極也為堯舜則揖遜為湯武則弔伐為禹則胼胝為回則簞瓢即太極也去齊則接淅去魯則遲行為乘田則牛羊茁為委吏則㑹計當即太極也語其隠則上天之載無聲無臭語其費則即事在事即物在物程子之言道器其得於周子太極之説歟某不敏姑以是復何君之命常州路重修儒學記至元二十二年乙酉常州路學正前鄉貢士李君闡等書來言常州自乙亥歲火於兵幸夫子廟在唐君駿發以鄉國名士為教官立司存瓦礫中先汛掃以新廟貌次營搆以居生徒修講堂修經閣建直舍建兩廡為六齋六楹暨内外夾屋垣墉四周咸一新之學田為戍守軍將奪占者請於官復其舊越十年甫訖事徵予一言以誌之予謂唐君有功於鄉學大矣考州誌常為延陵季子采邑今墓在焉葢先哲興遜之邦也立學自唐李栖筠為刺史始五季以兵燬宋景祐乃復建炎又以兵燬越紹興再復今又一燬而一復矣噫唏此天之不肯喪斯文也天以於穆之命寄於人也書謂之帝衷詩謂之民彝帝衷民彝不能懸空以獨存於是寄以學校無學校則三綱淪九法斁君不君臣不臣父不父子不子天下之人胥為禽獸維天之命於穆不已者疇托此天之所以不肯喪斯文也虞書天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉五典五禮於天何預然不曰我敘我秩而一則曰天二則曰天葢斯道之原出於天非人力所能造為者堯舜特為之守典禮而奉行之耳挈帝衷民彞之目寄司徒今州縣有學學有官其司徒之屬也三代盛時家有塾黨有庠國有學術有序五典之教自鄉州而達於黨族閭比自遂縣而達於都鄙里隣其所講明所踐行者皆此物也民彞宣明於學而天命流行於民熏䀨浸灌是以風俗醇厚人人有士君子之行此天下所以久安長治三代衰學校廢教法壊人之道不立天下遂為紛紛爭戰之場天生孔子孟子扶帝衷民彞出之汚穢糜爛中載之六經載之七篇以示萬世而後維天之命於穆不已者始有所托三代而後歴漢晉唐宋一千六百餘年其間雖有大亂大禍而天地猶得以位萬物猶得以育者斯文未喪孔孟之教猶在也後之學孔孟者其以四書為根本以六經為律令格物致知以窮此理誠意正心以體此理學之博以積之反之約以一之庶不負天之未喪斯文之意癸丑嚴陵鄉㑹題名記寳祐初元夏五之四日皇帝臨軒策士越二十有二日賜文武正特奏名發嚴陵進士洪承祖暨方哲凡一十人續鄭璹又以今科中嚴之傑士山湧泉出或齒穉且壯而先登或器大以周而成晩或以韜畧而出間道或以法理而收竒功視丁庚兩科未遜也鄉之仕於朝居京者楊鑽約鄉之新進循比講序拜禮鄉寓致禮者或自逺而來餽者或畱京而預集者鄉貴郡侯李鏞輩偕諸邑尹多以幣將意乃差穀盍簪於湖山之四面亭禮畢泛舟從遊籩豆洋洋絇履鏘鏘斯亦鄉邦之偉舉歟時孟秋後五日也徐義士旌門記歲在壬午至元十九年十二月浙西道宣慰使司奉行中書省劄以徐洪甫賑濟飢民令府縣旌其門閭并將戸下一切科役並行蠲免淳安縣尹丞若簿李君震髙君天祐魏君惟寅皆以力行好事為心咨於鄉之士為之榜曰積善徐家復徵予紀其事嚴在萬山中本無富家然有洪甫之力無洪甫之心故寧辱身以藩貨不肯扶危以利物有司此舉豈為一家所以愧鄙夫勵薄俗也予安得不特書以為風俗勸蛟峯文集巻五
