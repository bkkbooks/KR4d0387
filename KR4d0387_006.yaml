body:
  text: 蛟峯文集卷六宋方逢辰撰絶句題盧可庵天邊風露樓龍泉三尺倚天橫濁世滔滔我獨清一柱髙臺仙掌起願推一滴活蒼生題柯峯讞掾錢君叔行敬簡軒是非辨白只須欽敬簡奚消讀吕刑一片公心一雙眼心醒醒則眼醒醒贈尹巽齋數學陰陽晴雨可前知此是人間第一奇鼾睡華山何日覺煩君更與問希夷題吳氏梅堂聞君家在雪邊住靠盡闌干索盡詩只怕梅花應冷笑清香元不要人知問天胭脂十二萬風塵一樣胞胎父母身天欲殺之胡至此厥初何用降生民天對羊祜乘危乃併孫楊堅非解自蠶陳長江不是無天塹只為江南多婦人贈墨士翁彥卿因其以竹墨來謁故吟詩以䁬一團煙裏蓄明光做出稜稜竹樣剛語汝好尋臺閣主直將徑節掃豺狼贈風鑒曹老眼九重拊髀嘆才難幣聘皇皇難未戡老眼試將天下看豈無頗牧在東南送胡兄逺遊人言行路險於山君却乘槎欲問天畢竟家邦總聞達雞鳴猛著祖生鞭贈月心蒼苔破屋生涯足淡飯清湯夢寐安認得秀才窮快活何須煩惱做窮官贈大佛老子賣藥齋僧藥中得報飯中施始實終空不是呆水復去來來復去誰知無去亦無來贈南山寄傲軒著心尋處元無物開眼見時都是天楚市少年霸陵尉紛紛蠛蠓過吾前贈相者煙霞泉石在空谷富貴貂蟬在北方林下野人無可相相人須去相侯王贈梁電目滿睫塵埃寸許深世間豪傑尚山林冰壺指見形骸外難照江湖一片心七言律詩慶明堂禮成合宫芬郁徹垓埏治象陽明景爛然雲氣朝隮疑欲雨帝心夕愓即旋乾皇穹后土實臨汝祖德宗功鑒在天既灌更祈如未灌緝熙此福萬斯年和劉府判名夔相人英雄牢落谷音空敦薄猶存柳下風善政有聲聞六邑病軀無自謁千峰乾坤許大心知少道義相交我輩同珍重瑰章何以報煙雲留護峽山松和張寓軒題孤山二首吝驕專恣諱言兵禍本伊誰自種成潮汛有時聲轉怒權姦一死罰猶輕道無起滅無今古物有消虛有長盈贊化正需豪傑手華山深處卧升平又西湖奮事逝如流紅紫塵沙新緑稠昔日賞心今日弔前人遺迹後人遊雨觀水色連山色晴看湖頭送日頭鷗鷺無情自來往興亡不管帝王州挽有宋周府君袁夫人孩提均識愛其親未有君家最睦姻遜畔以全諸父義在原此豈婦人仁一門鄒魯斯文地三世羲皇太古人朱紫滿門直餘事九京可作百其身挽宋尚書余公二首時樣多求赫赫聲惟公獨韞玉精神傳無房杜可書事心即羲皇太古人日月升時先奮翼風雲濃處忽抽身蒼蒼忍奪客星去却使凌煙憶老臣又扁舟一葉掠垂虹因泛江蓮得識公千里軍民安席上一年賔主坐春中斑催紫槖朝天近夢到黃粱霍地空契闊真情言不盡只將楚些寄東風挽宋吏部趙公翺翔碧水又蓬山再入郎闈即丐間屢疏朝端詞梗梗一麾道院政斑斑閣因書創家鄒魯堂以親名行冉顔所恨與公非識面一詩寄鴈寫澘澘被召不赴萬里黃華遣使輈姓名曾覆御前甌燕臺禮重金為屋嚴瀨風髙玉作鈎丹鳳喜從天上落白駒須向谷中求敲門不醒希夷睡休怪山雲著意留贈樵隱樵仙深入琴棋境一笑出門天地寬人世已非存朽斧土音不改只南冠琴中自有鐵心在局外何妨道眼觀霽月光風元屬我飯牛何謂夜漫漫題河潛齋安樂窩間中厯覽古和今夫豈全無所用心書為重看因熟讀詩添新作費沉吟消磨暇日尊前酒賡和熏風膝上琴過去未來都不管却看明月是知音頌徐大可為六縣減免稅糧得請六縣歡娛已獨勞肯心行善是人豪乞憐請命繭絲價起死回生鼎釜熬誰謂他人無力氣不于好事拔毫毛老夫贊詠非誇詡此在春秋亦合褒石峽山茶盛開水崖赤骨物俱老火樹生陽我不孤鐵葉幾經寒暑戰丹心不為雪霜枯托根峽裏老居士加號花中烈丈夫顔色不淫枝幹古洛陽牡藥只為奴又凡卉春妍誇國色此花陰極抱陽明人疑芝草非時出我謂丹砂托樹生可惜洛中欣富貴不知霜裏蓄精英老夫詩若宋初出牡藥如何得盛行古體前修史宫講吏部陳大著赴鎮贑州蠡湖擘破亨衢開山川鍾作魁竒材九關呌後入雲岫六陰卷出登蓬萊著庭萬卷了汗竹粉闈胡事被先幞非徒五馬人生榮正要急流剛沃足章貢二水分西東江右九郡斯為雄亭橫塵外眇四海臺插天表森孤峯三百里水見沙磧一十八灘如劒脊醉讀題詠呼坡翁此是太守風月窟又聞獷俗多驚湍况有蠆尾鄰諸蠻付之重寄憂亦大此是太守思慮關伐木詩廢友道缺道山幸有詩送别一言愛助當何如思慮先之後風月錢判府國史直講祕書赴鎮南劒番江之峯髙插天番湖之水淵其淵山川鍾作一書簏胸次洶湧萬斛泉呼來天上佐良史喚起英雄斧姦魅玉堂萬字雲錦章赤墀一對國士器天為資善擇畏師汝作羽翼從吾兒光芒忽報動雙劍翺翔直去分一麾我聞了翁鐵梁脊生晚不得拜履舄又聞龜山與延平首為東南揭標的今君剖符守其鄉視三先生為有光開明義理當日用扶植氣節爭秋霜知君報政只數月袴襦萬口九天徹去時好趂蘆花天歸時又見橙橘節道山繾綣持一觥臨别惟有詩送行執手不敢贊諛語版樣惟視三先生和僉事夾谷之竒韻夫子説周易肇開太極分及乎作春秋下逮西狩麟混闢至決裂堅冰至習馴三皇何皥皥五帝何紛紛卓哉洙泗翁道大孤無鄰於是作六經以救萬世人孟氏辨義利戰國駭所聞不肯為老聃和光同其塵人不識四端豈知有君親孔孟作日月然後夜向晨天髙與地下中立師與君師以扶綱常君以治廣輪廉恥甚鈇鉞禮教威斧斤自古立宇宙以道為精神清溪斗大邑土瘠民甚貧虎豺方恣睢駰騏忽諏詢痛民若赤子禮士如上賔簞瓢在陋巷窮則獨善身家有讀書屋乃為劫火焚仁人忽行惻仲氏敢具陳公肯挈墜道天未亡斯文移檄作主宰歌詩示恩勤絃歌已久廢簡陋尚可因祠堂儼遺像生徒招驚麇戶內有洙泗山中見華勳光霽挹茂叔粹盎師伯淳體用契忠恕恭安想夭申仰師千載上興起三代民剝窮果不食貞下元又春太極在何處青歸燒䀶新送潘翠谷無屋住僧廬無菜挑野草野草風味長僧廬人迹少剝剝誰扣扄訪豫事幽討錢塘有騷翁自號翠谷老匹馬遊南墻要伴松竹好遐思到山人迂尋出詩藁詩無怨苦吟掃退郊與島胸次鮑明逺筆下王逸少我觀陰與陽禪代何時了不能為魯連尚可作商皓長歌黍離篇酹酒問旻昊贈術士劉衡鑑髙目下耳赫如鑑福善禍淫平如衡顔癯胡天跖胡壽季氏乃富憲乃貧伯道無兒湯有後造物豈是鑑不明孔明遺恨懿血食造物豈是衡不平當知稟氣有清濁所以人品有善惡至若夭壽與賤貴又是稟氣有厚薄清濁厚薄物自聖洪纎髙下天何言君子惟以理自充英雄難與造物爭前人論理不論氣不信試問劉鑑衡贈星命舒雲峯五星聚東井天下王業開五星聚奎宿天下多賢才蚩尤掃闕攙搶卷飛埃日月黃道見火羅計孛烏能為之災雲峯挾術善説命窮通貴賤非所問敢問何時聚五星今年五星聚何分聖人在上天下平疏食飲水甘曲肱題盧文峯十二知丞文集驪珠一顆千仞淵漁翁探得遭驪眠一朝吹墮千萬顆恐是蛟驪卧半天駢花儷葉妙天下文賦直追古班馬手抉河漢裂錦章寫在詩歌軋騷雅大篇赤手捕長蛇不須控勒騎生騧短篇任意起忽伏蒼江浩浩濤中槎文章妙手壓場屋到砥亡羊還得鹿廬陵方買載月舟清談又展朝天軸軍將打門書一封呼起醉夢為醒鬆只怕至寶不肯留山中雷霆風雨取去還蛟龍挽鄭直齋居士有姪宰相才昔惟呂文穆有壻國士器昔惟晏同叔公乃兼其榮秀氣塞一門為國作瑚璉賴公培福根世態方惡直公乃自立的掉頭蠻觸爭冷坐雪月窟今世能幾人如公心迹清馨豔有如此公死猶如生贈楊內舍景堯刲股子肉可療親或曰不敢毁不見母生兒生死一間耳此身母之身非可認為已殺身可救母當不愛一死天理通神明寸膚直粳粃茍能充此心是即學曽子贈五星陳東野粵從動靜極互根裂為二氣分五行未有二氣先有理理與氣合人物生人惟稟得天地氣故為耳目為口鼻人惟稟得氣之理故為仁義為禮智氣為人形理為心同是水木火土金今人問氣不問理茫茫只向天外尋人而不仁木已死不須更論敗在子人而薄義金已傷如何却説生在已無禮無智水火滅不忠不信土氣絶人於心上斬了根是氣安從有萌蘖出門一笑逢星翁談天議論逈不同若能論氣又論理太極只在桃包中題跋青陽方氏義聚跋一生二二生三三生千萬太極生生之道一無不分之理雖天地不能拂此而過之而况於人乎雖然天地之理一本不能不萬殊而萬殊不能不一本也惟人則一者固可以萬萬者不能以一非惟不能一且不知其初之一矣蘇明允有言吾父之子今為吾兄數世之後不知何人此薄俗之通患也青陽之方以義聚而居者數世國初嘗旌其門此誠義族也後三百年其逺孫時發以縣志所載者來宛見國初氣象使人感慨也豫觀東京之樊三世共財北魏之楊緦服同爨唐崔郾之三世張公藝之九世皆有太古風然昔之同者終不能以不異何也物不可以終聚理與勢然也釋老之廬聚數衆厯數百年而不弊者又未嘗不可以終聚何也彼無生生之道也若生生者衆則情偽日多衣食不給則聚者不可以日久也然則人生而羣分殊者終不可一歟曰可有大宗之法跋洪智堂地理心機諺云一世識陰陽三世翁無墟墓場此為不識陰陽之理者發欲識其理則程子五患之外莫非佳山水也洪石庵與乃翁復庵自言髙於陰陽之學然皆為己而不為人數世兆域皆其自卜世之言陰陽者不足以眩之其所卜皆不出數里之外非如他人之自淺其山水必求於他邦數百里外者今其家福祿昌熾本支盛大又有非他人所可及此可謂真知陰陽之理者矣其從子曰應東圖其先塋之山川形勢及其家世福澤之竒名之曰地理心機又將推己之學以及他人其用心亦仁矣哉陰陽之術豫雖未達而其理則固深知之近毛伯玉來豫贈以詩曰當面有山人不識却於山外更求山族人有卜葬於住山之麓者豫贈以詩亦曰風水不從天上落元來只是屋簷頭此可與知理者道吾子若計豫之説推行之則可謂識陰陽之理者曾楊當在下風書鳳山呂首之玉京勝槩圖後鳳山吕首之以吟詠作玉京勝槩圖二十首讀之皆有竒思有微意使人坐萬山中如覩京城之巨麗也首之云如今生不遇後來當有楊子雲豫謂知我者希則我貴矣何必子雲題薛上舍集孟軻氏發性善一語反以激荀楊韓子之爭端周茂叔説無極而太極亦以啓陸子靜之排詆立言之難如此乎薛君某過豫袖示一編五言七言長短句皆有可觀首卷曰性理論也河洛辨也中庸大學論也井田議也噫是數者皆當世大儒所難言者君乃脫口如瀉灔澦似不見其所謂難者何歟軻逺矣請試以問茂叔題梅騷後寬間之野寂寞之濵不以無人而不芳此謹獨者之事也窮崕瞑雪疏籬曉霜毛皮剝落孤幹獨挺此特立獨行者之事也梅乎梅乎其遁世無悶者乎非斯人也而友梅梅友我乎哉屈平一不見知則悶以死其悲憤自况遍及乎菊蘭蕙茞而獨不敢及梅平猶為知量者有客過豫自號梅友出示一編曰梅騷且以不及梅為騷之欠不入騷為梅之恥將以補騷缺也噫嘻果如子之言則平不得為知量者矣題方景説出家疏簿東坡翁問佛印曰鑊湯獄圖中何獨不畫和尚對曰人間怕閻羅閻羅怕和尚翁曰怕你則麼對曰若使閻羅自犯亦要和尚懴除此詩人所謂善戲謔兮不為虐兮者歟方景説來言鑊湯無冷處惟和尚快活願捨身入龍華寺以為死中求活之道乞一轉語以干宗族鄉黨之仁人君子噫嘻聖賢未嘗許人從異端也但釋氏得時其力足以活人吾儒安能禁之茍自度吾力不能活之則聽其依釋以自活亦可已有肯助緣便請下筆題家狀籍舉人書鋪翁生持一籍來曰我將以此訪丑科之省元狀元且謁豫序余戲之曰昔陳摶有雙元集嘗持以語人曰天下省元狀元盡在豫集中今子亦摶之術乎雖然摶之術數也天地之通塞人才之隱見有理焉君子不謂數也方今天下林澤空缺鉞鈍赤子如溝中瘠明詔搜材正將以得經綸天下之大器豈徒詢詞藝云乎哉嚴之山峭水秀代不乏人子試以此求之雖未學陳摶之數而來科之省元狀元當在子籍中矣雜體田父吟清溪眇如斗大邑萬山壁立土磽瘠百分地無一分田九十九分如劍脊一畝之地髙復低節節級級如橫梯畝心一畦可一畝邊旁一畝分數畦大家有田僅百畝三二十畝十八九父母夫妻子婦孫一奴一婢成九口一口日噉米二升茗醝醯醬菜與薪共來日費二三斗尚有輸官七八分小民有田不滿十鐮方放兮有菜色曹胥鄉首冬夏臨催科差役星火急年年上熟猶皺眉一年不熟家家飢山中風土多食糜兩兒止肯育一兒只緣人窮怕餓死可悲可弔又如此有司猶曰汝富民手執鞭敲目怒視今年淫雨天作難洶湧澎湃四五番浮尸敝屋壞江下迸山裂地如鯨奔半山都成水澤國平地皆作龍蛇窟水頭晚退早復來屋角朝出夕又沒巋然令丞簿尉衙下視四境無人家水平歸家無屋住有屋住者無生涯農民拋家認畝隴擔砂翻石肩皆腫百千一畝判晚秧一丘分作兩丘種都來一畝無百千買秧已費半百錢眼前插種已剜肉頭後豐歉猶在天晚田再種未可保早田無秧為出草皂衣旦暮來槌門今年苗稅催得早打快織機趂頭網作急糴米輸苗倉更有一言牢記取斷不許人言災荒猩猩歌獵者圍猩猩疑其以衆抗諉曰不取小惟取大與壯衆猩自相仇推擠送其長以次索二三不復推已往四五至于十無一得釋放衆猩怒相目各悔受人誑及早同一心未必軀盡喪吁嗟獸不靈相仇無足嗔胡為豪傑羣不能自相親秦人吞六國諸侯各附秦併力取其一冀不及他人智者欲合從徒自腐舌唇安得先震鄰然後于其身彼先噬其一其次禍亦均早知秦用術六國同一心雞雛吟我聞先儒云雞雛可觀仁須臾不舍母是即孝弟根不待教而知不待習而成於斯為良知於斯為良能人從此充拓四海皆閔曾異哉雞伏鶩出殼忘其恩子向水中去母從岸呼鳴子往母亦往子疏母愈親鷹隼飛在天母亦與子驚或遇狸與牲愛雛忘其身不顧力小大直與爭死生天於微物上感人惻隱真人觀雞護雛鐵石為動情子呱方卧冰安得卵覆人勿看雞伏鶩吾則行吾仁南康遇雪夜來怪甚風太顛掀簸震撼不可眠門前鐵騎怒拔屋枕上猛虎飛吼天却是廬山夕作雪楊花未春先擘綿左蠡門前玉兩柱江心落石鷺一拳五峯千仞削銀壁重湖萬頃開璚田若使璚田可以種雖遭赤地民不癲若使銀壁可以鑄當造白幣權飛錢要知冬燠生意泄明年造化功斯全帝呼玄冥急妝斂閉塞陽氣胚豐年雖云不可耕與種桑麻穀粟兹開先上梁文由市入山初非避世讀書築室祇為悅親不妨驢背狂吟賈浪仙事更入蛟峯深處規模小小居處安安蛟峯主人天地外快活胸襟水雲邊自在人物科目人間之第一世猶能之家庭君子之樂三我惟有是雖尚論坡翁生子不能稱顔魯之詩雖求為元祐全人亦足養怡愈之志回尋深密小作住持左顧則龍卧半天界風雨清涼之境前瞻則虎眠雙峽卧雲煙紫翠之間門外皆山縱巉岩而氣象不迫崖下可井雖淡泊而滋味自長挑野菜足以羮種村秫足以釀未遜李願之谷庶幾康節之窩修齊治平未説經綸天下事出處語默且須康濟自家身龜策既從虹梁斯舉東髙岡千仞橫長虹萬壑千崖此為主旱天喚起作蛟龍西虎卧一山髙復低山外日斜遮不斷光芒照夜有青藜南舉足出門天地寬葵向太陽心一片舉頭正午日當天北入到源流皆稼穡瓣香旦旦祝年豐此是書生真報國上河漢無雲呈萬象主人丘壑本來心月夜一層樓更上下歸來同結漁樵社前村牧笛方放牛我亦推敲馳匹馬伏願上梁之後戶庭清晝松柏長春晏起早眠學為混沌之太極身輕腳健餘皆富貴之浮雲凡我同盟共伸善頌題家狀簿主試棘闈又是一番造化題名桂籍只消三日工夫然須家狀甲發之人必得舉子利市之簿惟爾多多而益辨諸公衮衮以先登前科雕鶚之在秋凡七作者去歲蛟龍之得雨有五人焉至護巨鱗亦入吾網凡羣公由此選也舍吾子將安之乎各示芳銜列八賦十經之選亟乘盛會續百里三元之題題賣試卷引足踏黃槐好是一番大比手攀丹桂須要三軸雄文敢奉楮先生用供新貢士少年紙貴休誇賈誼才能今日價髙正賴諸公斟酌願揮兔管早綴鴻名又轉眼三年又是一番造化妝功一日只消三軸文章縱誇黃絹好辭也用清江佳楮當效驅馳之力益加製造之功庶可探春蠶食葉之聲得無助秋鶚橫天之舉請書姓字即占鴈塔之題行奪科名盡中龍頭之選蛟峯文集卷六
