body:
  text: 蛟峯文集巻一宋方逢辰撰申狀奏劄辭建狀元樓某照得本縣見差修造司打量基址欲議建樓問之則曰為某設也此固是鄕邦勝觀賢令尹之盛心於某何辭然某為見田里嗸嗸縣庭烈烈某自束髮讀父書便以致君澤民自任毎觀后稷視天下飢由己飢之伊尹見一夫失所若已推而納之溝中作而嘆曰彼何人也某仰䝉聖渥塵忝甲科則又將以致君澤民之責自任矣爰自期集來歸閉户焚香置書一巻將前賢事業日夜討論將天下利害日夜靜思求所以報君父而慰蒼生豈有慮周四海而不及父母之邦乎且淳之為邑吏猾民貧斧斤之餘元氣有幾遭霜之葉不可以風毒民之尤莫如里役一人之身責之警捕責之風火責之橋道責之督賦責之追㑹文移如山欲其頃刻為之俵散卒徒如雲欲其倉卒為之喚集抛買不時欲其質田貿屋而為之償納縣道倚之如命胍而使之如奴隸取之如外府嫉之如仇讎自去年創置白納旬解錢米誰生厲階其禍最深充一月之役掃其家資之半充數月之役者其家掃地矣賢令尹下車之初首聞明榜罷此弊例一邑聞之為之鼓舞曽幾何時罷而復行邇來鄕之父老過門者曰子聞保司白納旬三百典盡妻兒無擘畫之詩乎曰未也子聞齪標八九十年同百萬豪家一夜空之詩乎曰未也子聞縣家建樓之議乎曰嘗聞之矣父老勃然告曰樓則聞而田里咨怨則不聞蒼生何賴於子某竦然下拜曰某之罪也旦夕當請于賢令尹以造樓之費少紓保司白納之禍此舉於某無益於賢令尹有益其從與否某雖不敢必若樓則决不容於不罷惟高明實利圖之須至申聞者伏乞照㑹謹狀辭兼國史實錄院校勘是時兼史之命非出於謝相之本心而出於諸公之列薦所以屢辭而後拜命具階方某狀照對某五月一日伏准省劄備奉聖旨令某兼國史實録院校勘速為撰述輿服志某伏領指揮益重悚惻切念某種學罔工績文尤拙昨來兩被公朝劄命俾某撰述上件史志某所以敢於干冒鈇鉞一再繳還劄命者盖某自揆力不能堪兼進呈期限已廹使某臨時苟簡修纂懼必有疎繆故也兹忽被宸命華以兼職是益置某於坐針負芒之地愈無可以奉承之理如此則是某度徳量力之本心轉而為干榮覬進之私意公朝縱不以是而加譴某獨不自愧於心哉所有輿服一志容某一面用功外有校勘職名在某斷斷不當祗受省劄當用繳還欲望公朝察某拘儒自守之本心特賜敷奏収囘成命所有纂修之書仍乞少寛月日容某䟎集以副公朝眷委之盛心伏乞指揮施行申聞事再辭前職具階方某狀照對某再准省劄備奉朝旨令某不必避免國史校勘職名仰見公朝眷寵之美意緣某自揆前日之辭今日之受兩有牴牾於義斷斷不安而公朝但欲國史成書在某敢不任責某於纂修則不敢辭所以上無怫於公朝於職名則不敢受所以下不背其初志然某不欲其文辭避頻凟穹嚴除已將省劄寄留秘書省國史庫不願被受供職外伏乞照㑹申聞事乞祠具官方某備員館職絲粟罔功蚤夜思之每懷兢惕雖聖朝包荒未賜汰斥然某實甚愧之近忽於六月七日得冒暑之疾繼以寒邪衝之至下旬僅僅小愈又因入局及行香出入再冒暑毒加以洞泄又緣前來發散過多遂至不能支持此間醫者用藥多不相投若非急歸私家尋醫必致狼狽欲乞公朝特賜敷奏畀以祠禄早還私家以便醫治伏乞指揮施行申聞事再乞祠具官方某狀照對某昨以病勢危迫具稟朝廷丐一祠闕以歸山林繼准省劄備奉聖旨不允某仰見天地包荒之仁心切念某至愚極陋既病且危愚陋而久留則徒負素食之羞病危而不去則立見殘喘之蹙况某始因暑毒繼感寒邪腸胃虛鳴水穀不化異證捷出生意甚微一官雖卑館閣豈是養病之所二親在遠庭闈益重惟疾之憂坐館閣而病是已曠官遺庭闈以憂又為不孝凌兢跼地危迫籲天欲望公朝特賜敷奏曲回造化陶鑄一祠廩差遣俾得輿疾急還私家以便醫治實拜隆天厚地之造須至稟聞者伏候指揮施行三乞祠具官方某昨兩以病勢丐祠再准省劄備奉聖旨指揮不允許令給假將理仰見天地曲全之造第緣某才鈍如椎福薄如紙一身值坎坷之戹數口有迍邅之灾廼者七月十一日又有䑛犢之戚汎焉萍梗困于蒺䔧造物之所以警不韙而罰曠瘝者莫慘于此茍不急歸是為樂禍又况久焉伏枕館閣非卧治之地仍欲望公朝曲囘造化特賜敷奏陶鑄祠廩一闕俾得輿疾速歸不然乞除程三月俾得暫還私家以便醫藥實拜二天更生之賜伏候指揮乞假歸里具官方某狀照對某一介書生備員百僚底尸素三年遂無分毫補報造化包荒未加汰斥比自六月以來一病幾至狼狽三上祠禄之請公朝未察其眞而未曲全其去但某昨來病中自知决不可不歸所有禦冬之具一縷不存而二親年耄已先奉歸鄉而某僅以隻身留此二親在遠日夜所以望某之歸者甚切兼某昨有先祖襄事封於淺土近方卜地將以初冬遷厝某此而不歸是為非孝欲乞公朝特賜敷奏陶鑄一在外待次小壘差遣或予祠或給假三者之中乞畀其一實拜二天之造伏候指揮施行再乞假歸里具官方某狀照對某昨得父家書以十月上旬遷葬先祖促某急歸赴葬事某已即具申朝省乞給假或補外或予祠俾得速歸以赴大事而公朝未察其心未賜俞允切念某為先祖之嫡長孫豈有祖葬而長孫留戀官職不急奔赴者乎揆之天理人倫大有所拂欲乞公朝特賜敷奏先與給假兩月俾某得急歸以全孝心此亦天理人倫之正須至申聞者伏候指揮施行乞假劄子某切謂臣子之大節進退而已進以禮退以義禮主乎辭遜義主乎剛决故曰三揖而進一辭而退若當决不决而濡滯乎進退之間則失其所守矣某等不才業已買舟江滸挑包即行但未得朝旨未敢輕動欲望鈞慈曲轉造化於假狀尾特賜鈞判且與給假暫歸若萬一續與在外差遣則未為晩庶幾某等可以曲全進退之節不然要君之罪將無所逃於天地之間何以立身乎立俟指揮下情無任悚仄戰汗之至再乞假劄子某不避鈇鉞之誅輙伸輪囷之懇某一介不才備數館底三年尸素靦面凌兢屢上丐外丐祠丐假之請叠奉指揮不允緣某近得父家書以先祖營葬之事促令丐外急歸甚峻某切謂君父之命一也不俟君命而先去固為不忠久違父命而稽留又為非孝欲乞公朝察某真情特賜敷奏檢㑹考功郎中洪勲例特與在外小壘差遣或照監丞呂中例特急假三月容某急歸以承父命以赴祖葬實拜公朝錫類無邉之仁某干冒鈞嚴下情無任俯伏俟命之至出闗後乞假具官方某狀照對某昨得父家書促歸赴先祖葬事叠上丐假之請未蒙公朝察其真情某今月十二日又得父書促歸尤峻某切謂君父之命一也不俟君命而先去固為非忠久違父命而稽留尤為非孝况某於先祖係嫡長孫若祖有葬而孫不赴豈不拂人倫而害天理兼國子丞呂中考功郎中洪勲近以弟赴兄葬兄赴弟葬俱蒙朝旨或給假或補外况某嫡長孫之於祖乎今緣卜期既迫難以稽留除已於十月十三日冒急出闗以俟朝旨外欲乞公朝檢㑹某前後所陳及照監丞呂中考功洪勲近例特賜敷奏或給假或予祠實拜陶鑄之賜伏乞照㑹施行伏候指揮抵家乞寛假一月具官方某狀照對某今月十七日午時伏准秘書省牒繳示省劄二通備奉聖旨俾某兼莊文府教授及奉玉音促令某囘省供職等事某切謂臣子之道忠孝所貴於兩全進退不可以中止某昨以父命促歸赴祖葬事屢控於朝乞假乞外未蒙賜允然卜期既迫父命尤峻只得丐假于朝冒急馳赴今星夜兼程於此月十六日已抵于家方將再上寛假之請敢謂九天震威惓惓於一螻蟻曲賜追還之命某感恩入骨雖死不忘但某為親乞退又難中變而為進若以退為進則要君為不忠背父為不孝實為名教之罪人欲乞公朝特賜敷奏少寛給假之期俾某得了先祖葬事然後奔走公朝俯伏俟命所有兼莊文府教授省劄寄秘書省庫併俟某假滿日赴省被受供職實拜二天之造伏乞指揮照㑹施行展假三月具官方某狀照對某一介螻蟻為親丐歸自知凟犯雷霆罪在不赦聖度天寛曲賜涵貸伏准十月二十三日省劄備奉聖旨給假一月某露香東面再拜感激埀涕以告於二親曰此聖天子至仁如天必使天下歸仁而皆得以遂其仁而不遺其親之心也天地之大未知所報某嘗覩先朝趙汝愚為著作丐祠未許以祖母大事即日自劾而歸仰值孝宗皇帝孝治寛洪就許畀外而釋其罪今某忝覩省劄天涵地育曲賜予假雖某之妄庸不足以望汝愚之萬一而某之遭逢聖明䝉被恩寵則又過於汝愚遠矣今某始得安心入山有事於祖塋若不展假必致一簣虧山於孝心終為有礙欲乞公朝特賜敷奏寛賜展假三月容某得終大事實拜公朝錫類無邉之仁伏候指揮為病再展假具官方某狀照對某伏准寶祐四年正月十七日省劄備奉聖旨除某著作佐郎某已於省劄到後涓剛祗拜聖恩訖即擬兼程赴闕忽為痁疾再發未可戒行謹先具專狀控申欲乞公朝特賜包荒少寛程限放令某稍便醫藥俟病勢少可扶持即便負席藁走闕下以俟鈇鉞之命伏乞照㑹申聞事辭著作佐郎具官方某狀照對某伏准今月十三日省劄備奉聖旨除某著作佐郎兼備近降指揮庶官不許辭免某一介蛙黽藐焉井底忽逢王明汛渫而綆汲之某感激君父異恩誓將捐軀以報但某切念内外迭補之法所以練人才也毎讀晉陶侃傳朝暮運百甓問之則曰侃方致力中原若過自優逸他日恐不堪事某雖不才中夜感慨常有奮勵事功之心自曩綴朝班未更外任今復尸素館職切恐犯陶侃不堪事之譏欲乞改畀在外小小差遣俾得稍自展布以啚萬分之報伏乞公朝特賜敷奏施行伏候指揮乞改正理還劄子具官方某劄子伏覩指揮應命官凡經臣僚論列者並合經朝廷改正某昨自寶祐乙夘之冬因有先祖卜葬事急投假狀即行遂坐擅出闗之罰得旨寢著作新命按之者朱應元也丙辰之冬有排斥三學之士者某偶前此與曽唯為文字交遂坐不合與太學生交游之罰得旨寢寧國新命劾之者吳衍也景定庚申之夏以輪對不能盡言陳寅彈之得旨予在外差遣未幾以有官人不合作館事林光世擊之得旨予祠積是四非無非自取某惟聖賢不責人以無過而許人之改過聖君賢相千載一遇此而不言是自棄於大造之外欲乞公朝特賜敷奏將前項特與改正過名理還元斷月日伏候指揮辭免司封具官方某狀照對某伏准尚書省劄子備奉聖旨除司封郎官某自揆不才合具辭免者伏以井鮒無聞久處泥塗之蟄乾龍有造忽聞雨露之仁其得若驚以感而涕伏念某素行乎患難自墮於迂愚不圖槖籥噓吸於天地燾載之間欲使勾甲萌拆於瓦石覆壓之下某雖無他技而善自知敢以庸才冒居清選輙裁免櫝仰告朝廷伏乞畀矜特賜敷奏彚征開泰倘不忍一物枝葉之枯自養曰頤願少給勺水簞瓢之禄禱祈懇懇跼蹐兢兢伏候指揮辭兼直舍人院奏具官臣方某狀奏右某今月十三日恭准省劄備奉聖旨方某兼直舍人院日下供職者伏以菲材僥倖濫分主爵之曹誤渥光榮俾涉代言之筆鼎來天寵震惕氷衷臣切惟内史贊書之司實為文士清選之極必有渾厚爾雅之體然後可以潤色國典必有激昻婉切之功然後可以感發人心必揮翰如飛然後可以備緩急之辭命必湧泉不竭然後可以應填委之文書夫豈庸才可當是選切念臣荒疎學術淺涸辭源郎圍方懼於素飡詞掖豈容於越俎王言之制有七所未討論舍人之様有三其何稱塞恐慚帝制祗速吏訶仰望聖慈俯矜愚悃不嫌反汗収囘成命之頒特許循墻別選時髦之任籲天懇懇伏地兢兢所有前項恩命臣未敢祗受謹録奏聞伏候辭兼直舍人院劄子伏以綸闈地峻顧越俎以難堪黼扆天高雖循牆而未許敢薦陳於愚樸祈轉徹於穹窿伏念某受才既凡種學尤淺以寒苦而粗為文字處孤陋而實寡見聞孤陋見聞固未習朝廷之典故寒苦文字豈足代皇王之訓辭冒居是官必忝於位輙成免櫝仰告公朝欲乞畀矜特賜敷奏渙焉廷號倘無銷印之嫌属之時髦方稱如綸之任懇祈切切跼蹐皇皇所有恩命未敢祗受伏候指揮辭起居舍人奏具官臣方某狀奏右臣今月十七日伏准省劄三省同奉御筆除臣起居舍人兼職依舊者伏以龍御正中言動則書于史螭分左右記註必惟其人安有非才可當是選但覺震躬而􅊒􅊒不知渙汗之皇皇伏念臣孤遠之踪空疎之器惟空疎則學問不足以該臺閣之典故惟孤遠則名實不足以孚上下之聽聞以名實未孚之人而職簡書豈能信乎後世以學問不該之士而立殿陛安能沃於君心而况濟濟周行藹藹君子茍自知非佚狐之選而不遜於䕫龍之賢必至曠官反以違戾伏望皇帝陛下察其安分矜其不能更畀時髦倘許緇衣之改収囘成命何嫌刻印之銷所有恩命臣未敢祗受謹錄奏聞伏候勅旨辭起居舍人劄子伏以才非狐佚何敢班二史之清身際唐虞未許為九官之遜以感動之忱弗至宜呼籲之請莫俞匪告公朝曷囘宸聽敢歴陳其梗梗冀轉徹於高高切原古者設官之由曷寘君舉必書之職盖以人主一言之善否實闗天下萬世之安危所以選端良之人執簡在後庶幾處富貴之地非道不行以是官所係之匪輕雖先正猶懼其弗克蘇軾之有此令且必詣宰相而力辭必大之除是官猶自乞皇帝之改授茍以謭才而不自揆冒居古人所不敢為以此敗官何所逃罪伏望公朝察其非據許以奏聞言出如綸倘可惟行而惟反衣猶在笥何嫌改造而改為所有恩命未敢祗受伏候指揮討信州鬨軍待罪劄具官方某照得比歲以來兵驕易鬨不勇於禦亂而勇於為亂所資以衞民而反以害民然桀悍難制惟信為甚某蒙恩予節職在澄清昨入境之初據信州公申本州軍人以支米作鬨事繼得之諮詢咸謂郡糾遭其凌辱非小郡僚雖微然其損一郡之體者甚大即欲誅鋤一二首惡少正軍律盖以事體闗繫者重所以遲遲而未敢輕於一發自此暴横愈甚夏稅場棟子州郡已差人許福等又欲別差一吏州郡不聽遂挾衆喧譟以請州郡遂俛從之乃七月内州郡以獄劊行刑而許福等以不用軍劊遂集衆持杖拽街搜捉獄級擒至郡㕔必欲行法州郡不聴此曹又輙喧譟州郡又俛從之竊惟信之卒伍肆驕其所由來漸矣郡守低首喪氣為其挾制郡民吞聲茹苦為其凌暴已半年于兹比者殿司軍將官提兵自信經過此曹生心衷甲腰刀呼儔集衆復謀為變闔郡惶惶中夜束擔出郊以避禍以信之去天密邇軍兵干紀一至于此下無州郡上慢朝廷是可忍也孰不可忍也本司近以秋試因密切調遣諸寨寨兵入城為䕶試之舉隂為戢亂之圖帖上饒縣令程從事應新䕶州印牒差擬迪功郎兼本司僉㕔何惠生以捕偽闗㑹為名同共合謀今月二十九日蚤據擬迪功郎本司兼僉何惠生同上饒縣令程應新申已於本月二十六日早擒獲為首人許福等八名斬首示衆揭榜曉諭軍民各已平定外無非仰藉國之威靈幸而集事少洗積年驕横之風少正兵律抑亦可銷變於將來也所有調遣用命服勞一行人別具姓名開申乞賜推賞所有某不合專擅調兵及專行誅戮一節謹席藁俟罪外伏候指揮乞與共討信州鬨軍有功者轉官推賞具官方某狀竊惟漢人有言曰有功不賞有罪不誅雖堯舜不能以化天下信州鬨軍其罪當誅久矣某自到任己來日夜圖之而未有一可任事之人方欲以兵取之則本司無兵之可調方欲乞兵於朝廷則此等狗䑕何足上勞君相之慮環視精選得一有用之材曰從事郎上饒縣令程應新然彼方為縣令其勢不足以運掉一州也而某於是委之攝行州事旁搜遠取又得一可與共功名之士曰擬迪功郎何惠生然彼方為士其位未足行事也某於是留之本司僉幙其不知者以為過客也使之以過客為名館于信州者屢月以盡察諸軍之情偽盡得鬨卒之姓名盡識諸卒之面目入其黨與探之試之離之間之結之収之往反圖為至于十數所與共謀者上饒程令也乃者八月秋試士人喧雜於是借科舉之名密調諸寨精銳頓之棘外而選彼黨之强壯者収之棘内然後謀取其渠者而殱之彼八兇者誘而致之數處同時下手一朝擒之頃刻之間皆就誅斬急張旗牓以壓衆心軍民按堵如故今城内外不驚一塵所調捕兵不傷一卒實縣令程應新擬迪功郎何惠生之功也斯二人者使其一為見任守臣一為見任僉幙皆不當言賞盖本職公事也今程應新以選人縣令行郡守之事何惠生以江州進士任潛師之責非其膽畧度越常人何以不動聲色不煩朝廷調兵収徒手縛虎之奇功某伏覩在法捕獲强盜選人改官白身補授今來二人之勞非止捕盜而己欲望公朝特賜敷奏將程應新特與改合入官何惠生特補文資給迪功郎真命以為趨事赴功者之勸外有頭目用命立功人張濟為第一功王伯茂鄭榮次之若頭目以下則排軍璩遷藍安詹寶汪福余正陳福秦明徐强余寶及百姓吳龍吉軍兵吳强郭茂余照二楊旺洪貴張珎魯先程先璩元等凡壹百餘人内頭目立功張濟本司已於信州見管進武校尉綾紙内書填一本給付張濟充賞外其餘並合厚支犒賞欲乞朝廷劄下信州於有管官錢一切支行庶幾賞不踰時則三軍感悦他日可以使人仍乞劄下本司照應伏候指揮辭免誅勦鬨軍轉官具官方某狀照對某今月十四日伏准省劄以信州誅勦鬨軍事備奉聖旨方某運謀集事與轉一官某竊惟百官有司各有所職曠職分之當為者固不逃司敗之刑為職分之當為者亦無受賞之理盖某之事與程應新何惠生不同也若使程應新為見任守臣何惠生為有官僉幙亦不當言賞惟以其選人縣令而行郡守之事進士僉幙而任潛師之托是以可嘉若某則為所當為僅可逃司敗之刑而已今公朝賞不踰時以為厲世磨鈍之具因衆人而及某焉若某以本職公事而受賞則是僥倖而冒功頑鈍無恥人謂某何所有上件恩命不敢祗受欲望公朝特賜敷奏収囘成命庶幾小臣得安分守伏候指揮江東提刑一考丐祠劄具官方某伏照對某伏准咸淳三年二月省劄授前件差遣某即於當年四月二十五日入江東境交割本司職事越今年四月二十四日書一考某竊惟荀卿之書以禮遜為偽衞風之詩以素飡為非茍以荀卿之言為嫌而犯衞風之刺則為頑鈍無恥之士伏念某學未語上才不逮中冒乘使者車而行外司㓂之事雖小大之獄必以情而聴訟未能無訟雖得其情哀矜勿喜而罔中未能惟中聖人之言朞月而可今某試之朞年而風俗未能變化囹圄未能空虛弗績罔功孰大於此所以未即司敗之罰者聖賢在上不求備于一夫也某是用不敢犯素飡之譏而避偽遜之嫌伏望公朝特賜敷奏姑畀祠廩使某以自量之心而為自全之地實拜天覆地載之造伏候指揮辭免江西轉運副使具官方某狀照對今月二十一日伏准省劄備奉聖旨某依舊職除江西計度轉運副使某聞命震驚懼溢於喜某竊惟小器受大任者有顛覆之虞一命至再命者有盈滿之懼某一介不才濫切皇華之遣司臬江左凜凜曠瘝乃夏五月既叨進職之恩今甫半朞又叨改轍之命俾之將漕于西非但小器受大有顛覆之虞而一命至再尤有盈滿之懼所合具申公朝乞賜敷奏改畀時髦庶安愚分伏候指揮蛟峯文集巻一
