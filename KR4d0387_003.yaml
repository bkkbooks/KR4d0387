body:
  text: 蛟峯文集巻三宋方逢辰撰啓賀董矩堂某啟伏審光膺典冊進秉鈞衡有王佐才人謂用仲舒之晩任天下重今乃得伊尹之時皇路大亨蒼生胥慶孰不交陳於頌語僕方願獻其忠忱某竊謂自古至今未易有明良之㑹惟天祚宋豈終無平治之期每念吾皇屢更元弼越若老奸之執柄遂令上意之吹虀但欲損外廷之權反以開旁遯之罅雖宸聰英斷視堯舜無以過之然中書積輕有周召不能為者而况暫焉冢司之虛佇沸乎人心之多疑或云巨奸之復來或曰外闑之晉拜議論交撼證候可驚忽開昌運於千齡乃宅耆儒於百揆致君之責實重當世之務孰先恭惟某官四海一賢兩儀間氣齊家治國平天下夙韜大學之經綸佐王經邦統治官素抱太平之綱領時止則止當為必為人盡倚冰我則為仲宣之接淅衆方辭甲我則為裴度之請行既深愜望霖之心宜即展擎天之手然適處艱難之㑹正有資撑拓之功仰而思之非無事者如國計當裕而邉防當飭士風當美而民瘼當瘳此雖久積於弊源然尚可施於活著惟獨正邪勝負之際最闗治亂反覆之幾清晝之狐狸方嘷南衙受屈高崗之鳯凰欲集東方未明幸絃轍之一更宜弓旌之四出多培元氣少抗外邪使朝廷之肅然則宗社之幸甚某自擢禮闈之桂即栽治化之桃聳觀登庸喜至欲舞燕雀賀厦先歌芘寒士之詩蟋蟀吟秋當續得賢臣之頌非私禱也與衆望之謹具啟事專人馳貢鈞墀百拜申賀伏惟鈞旨俯賜鑒察不備謹啟賀何提幹恭審入登法從就領神臯夜半思賢劃聞漢宣室之召日邊作郡驚見趙京兆之來輙持一瓣之香以贄九頓之賀恭惟某官才𢎞且毅器博以周運斤成風解全牛於四顧策轡奔電洗凡馬而一空自其不卑小官於州縣之間已知將降大任為社稷之重剛亦弗吐柔亦弗茹以霹靂之手而把麾威於不怒信於不言以天地之公而持斧翺翔卿月驅馳使星足用度而不歛於民士無饑色有仁義而可利吾國王曰遄歸第版曹適當煎熬乏興之衝而京邑又有彈壓不行之弊狐嘷萬狀蠧宂百端如上必欲無拂乎人主之私心而下又欲不傷乎天下之元氣雖有智者實惟艱哉惟公權衡二者於熟慮之餘則我邦家庶乎有無窮之福方見君子有益人之國毋使小人執理財之權蒼生望之赤心及此如某者窮途場屋借逕右階雖素無根柢之先容未甘與草芥而俱腐月烏三匝方吟遶木之無依雨燕孤飛尚冀捲簾之放入一忱歸嚮萬舌莫彈謹具啟事專諸台墀申賀伏惟台旨俯垂鑒念不宣謹啟賀王僉樞某伏審顯膺宸渥擢贊廟謨江左喜見夷吾屹為砥柱中國欲相司馬先領天樞増重朝廷聳瞻夷夏共惟某官盛名盖世直道致身於衆人方醉之時冷揩醒眼居萬物為圜之世獨秉方心遂從班班乎中外踐敡之時已知卓卓乎𢎞毅重遠之器總司制司之條畫足鎮闗中春官天官之規模可推天下宜從瑣闥即上幾庭矧惟世事江濤之秋又值人物晨星之㑹兵憚而國弱財匱而民貧及閒暇可以有為以疑信費於虛擲惟事事備乃可以無患言人人殊何以成功必資運帷幄之中折衝尊俎然後坐廟堂之上不問甲兵邦其永孚於休公有無窮之聞某竊依大厦側聽温綸休哉登庸喜而不寐帝謂何見之晩漢豈憂匃奴哉天將大任是人商為真宰相矣非私禱也與衆望之賀程僉樞某惶懼頓首加拜稟申樞密端明相公先生鈞座前某伏審明廷渙號右府升賢上念李牧廉頗冀精神之强趙王命程伯休父圖宥密以興周増重朝廷聳瞻夷夏共惟某官淵源伊洛人品富韓萬頃涵波澄之不清淆之不濁一團和氣聽之也厲即之也温自入長於烏臺即躋榮於紫閣御史作朕耳目持剛亦不吐柔亦不茹之心文昌為天舌喉行進思盡忠退思補過之事宜從雉正徑上鴻樞矧惟云云某以書生為門弟子聞明主得王佐才休哉登庸喜而不寐紫泥一下咸謂僉書之得齊賢甌墨又新倚需中國之相司馬非私禱也與衆望之伏丐鈞照賀胡殿院伏審擢從諫省晉貳臺端玉立坡頭久抗青蒲之節芒寒殿上再揚白簡之風除目一頒僉口交慶恭惟某官邦之瑚璉學者斗山忠言嘉謨有舒蕡諸子之不及細旃廣厦非唐虞三代則不陳龍旒簡知豸冠益峻當栗烈冰霜之操為胚胎霖雨之基某芘竊萬間喜聞三接燕雀之賀厦屋輙控輪囷鵰鶚之在秋天佇觀凌厲深慚塵瀆伏丐淵涵賀丁司諫伏審龍墀疏渥騎省升賢白簡囘天已芒寒於柱後青蒲伏地又玉立於坡頭吾道之亨下民是望恭惟某官邦之瑚璉學者斗山峩惠文之冠風采聞於天下坐細氊之席仁義陳於王前簡在帝心擢司廷諍君子得輿民所載也毋使昌黎之疑陽城衮職有闕我儀圖之更令淮南之憚汲黯栗烈冰霜之操胚胎霖雨之功某芘竊萬間喜聞三接輙憑一紙以寫萬分無任冰兢伏祈淵鑒賀吳守某伏審宸陛疏榮輔蕃借重一絲高潔猶有漢故人之餘風千里廉平又見吳河南之作守下車戾止交笏慶之恭惟某官眉山之蘇華陽之范蓬山直上便當執筆於二螭棘寺横翔胡尚持麾於五馬行且召矣姑少俟之某一別轉頭五年撚指未由面賀徒切心傾維巢而鳩居之幸有滕君之門里在及門而馬後也勿云為賈之賀遲盈臆願言非舌可盡伏丐台照賀邵正言戊戌狀元之及第獨冷甚安慶歴御筆之諫官新除再見鶴鳴而和鵬怒則飛喜直道之可行宜清朝之増重忠良得路已辨蔡君謨之詩議論囘天必須張元素之力非私禱也與衆望之某雖病欲歸因喜亟賀萬間之托大厦不徒私上棟之安一言之訂千金庶或伸南衙之屈深慚塵瀆伏丐淵涵囘趙少保某伏以天子維辟公實賴鷺飛之助宗廟為小相偶叨駿走之聯奉以周旋曰予先後適際慶成之始允為無疆之休未罄賀私先蒙遜牘兄弟婚姻無胥遠矣來此雍雍神祗祖考其安樂之錫之簡簡略陳稟謝未究願言伏丐鈞照囘鎮江徐總某伏以諸侯上之王人已聞環召三館中之冷客猶辱盃傳旨哉竹葉之香華矣菖蒲之節久聞公瑾願為不覺醉之交未許屈平乃作我獨醒之客下拜受也中心藏之伏丐台照囘王檢閲某伏以九重渙號半刺借賢奏上汗青已就補天之巧香傳泥紫忽催分月之行除目一頒僉口交慶恭惟某官師尊姬孔奴視遷彪雖驪龍之珠惜為漁者之所得然塞馬之福詎非鴻造之復還便當立柱下之班胡乃屈治平之駕㑹且召矣姑少俟之某不能留行慚無舉羽之力薄言往送冀寛接淅之期無限心丹尚須面白伏丐台照囘南班冬魯雲喜書又報有年之兆趙日可愛易為向陽之春茂對昌辰宜裒殊祉恭惟某官為善最樂大雅不羣舒栁放梅天必私於玉葉拔茅連茹地行錫於圭桐某濫伴吹藜又聞鳴竹方圖面賀先辱手箋百萬買宅千萬買隣密邇仁人之里一陽為復三陽為泰願依君子之明無限謝丹尚須控白兹祈台照囘徐總君子占七日之亨陽從地起王人序諸侯之上福與日新方擬慶箋先䝉巽汗恭惟某官氣排冬凜德配春和一綫添長緩如絲之六轡重緹噓暖囘挾纊於三軍或遄其歸可拱而俟某冷伴青藜之杖浪辱蒲萄之觴既有滴紅寧憚斗十千之直第虞飡素不無囷三百之譏感藏諸心言不盡意囘西倉送酒兹審揚旌拂日擁纛朝天且分萬斛之春例及百僚之底光生節朔惠重泰山今朝捧漢殿之觴被沾丐者多矣他日作商巖之醴願公溥其庶乎具此控酬伏祈錫詧囘皮嘉興氣應黄鍾又報放梅之信香凝畫㦸頓囘雋李之春對此新陽宜爾遐福某未由執贄先辱傳觴勿謂孺文之飲此特私恩但見公瑾之交不覺自醉下拜受也中心藏之幸有滴紅寧憚長安斗十千之直第虞飡素不無河漘囷三百之譏感藏諸心言不盡意囘南班正玉厯頒春又報桃符之換璇源襲慶宜増葛藟之長未即贄庭先䝉墜汗恭惟觀使領衞太尉振振公子藹藹吉人脱穎金枝自是向陽之木分封圭葉行連拔茹之茅與時偕行何福不至某居蓬山底托樾䕃邉四為鄼五為陸幸甚藩蘺之剖破三于耜四于趾但求畎畮之歸耕亟報掌書餘需面賀伏丐台照囘詩秘書送物某無功受素飡之禄方懼河漘之貽譏聞君上白玉之堂乃許瀛州之隨步未由贄慶先辱貽箋餽我生魚既有化天池之便酌之浮蟻又欣囘冰谷之春玉蓮深契於苦心繡𤓰可托於永好粲然之文驩然以相愛得之若驚長者之賜少者不可辭歸之斯受尚須面白以控心丹囘王漕賀新除伏以東觀底僚偶塞除書之數西清法從忽來華剡之頒得之若驚報於何有退思僥冒益重凌兢昔繙閲乎道家山之藏尚訛渡豕今超躐乎蘭臺郎之選寧免濡鵜所當後汰而前揚莫匪左提而右挈一字之褒榮於衮辱先施之七襄之報不成章非敢後也尚圖酬控以罄謝私伏丐台詧囘安吉楊守六十属觀象喜頒魏闕之條二千石惟良融作霅溪之慶與時偕極何福不臻恭惟某官風韵浚明天資凝遠陽春布德已奉行玉札寛大之書肆夏升歌即展布金鑾論思之事某未申贄賀先辱貽箋兹飲公瑾之醇醪不覺自醉若作商宗之醴酒更賴汝為感之在心言不盡意伏冀台照又囘楊守送重午某冷坐道山罔記菖蒲之節香凝苕水忽傳竹葉之馨敬再拜之得一醉矣有餘謝悃尚須嗣箋第乏報璚惟祈炳鑒賀吳是齋弟中鄕試種槐久矣殆如種德之多折桂以之何啻折枝之易山川且為之改色雞犬亦為之動容恭惟某人博大𢎞深高明寛厚以是父生是子載瞻砌玉之芳以難弟得難兄共副儒林之望三獻小淹於抱璞一鳴始見於驚人淡墨書名不在郡英之下泥金作榜即為四海之魁賀何梅境入太學監闈奏凱帝學騰聲行當高占南宮而魁唱彤庭猶使同登瀛州而蜚英璧水造物者將玉其成就大君子益顯其姓名賀何曽六丈得鄉第秀芝呈瑞已為鶚表之占撤棘登名果見鳯雛之捷金鈴夕報鄉錦晝榮共惟某人望聳儒林芳聯棣萼韋經教子於詩書尤用其心竇桂収功在造化可謂有眼更看黄甲自有青氊某賀在人先喜如已有遙想長安得報弟兄兩處和氣春風少頃浙漕聯鑣父子一門人間天上謹專申慶伏丐炳原賀余吉甫升學中十一名凱奏上庠共仰天荒之破名標先進咸瞻月窟之登香蔀桂林光増梓里喜溢萱庭之色榮聯棣萼之華明時幸際於乾亨嘉㑹果符於萃聚綢繆托好忻懌無涯昨陪賓廡之後塵過辱主儀之前席未遑牋謝徒重甲顏奠綵驅羊盥手鴛緘伸燕賀策勲奏馬狀頭虎榜佐龍飛賀人中鄉試綵戲斑衣雛飛丹穴秋闈勇戰已登天府之名春榜聯鑣又續世科之胍賀同年中鄉舉高題鴈塔増耀螺川鷺于下鷺于飛民獻有十夫之翼鄉舉十人麟之趾麟之定天潢分四輔之輝宗子四人實為六一卿之榮適應五百年之盛兹逢喜事倍激慶悰泮水林中荷不隔同年之面凌煙閣上又將埀異日之名賀周幾堂請舉掉臂鄉闈登名天府看榜中姓字如吾友果是得人想分内功名在造物豈容欠我到此日方知篤信詩書之效則天下豈果無持衡鑑之明某如已得之逢人誇此燕雀賀厦敢以豚犬而代行鵰鶚横秋更冀鵾鵬之速化心之所愜言不能宣賀吳是齋入室肅涓良辰榮歸華第木石之奇規模之壯可知勢力之恢繩墨之巧斧斤之精皆出主心之用在道傍免三年之嘆見胸中有全室者存未至往觀且陪申賀遣蘇羝而致敬具畢甕以助懽笑而留之幸何大也賀能和尚生日日臨良月天借小春萬寶呈祥一佛出世人共天贊善類均懽恭惟某托在契厚倍劇忻愉敢指南極老人星仰祝西方無量壽謾持菲物僣侑伊蒲囘人請掃門求見方愧魯人之臯開閣相延乃辱郇公之翰圭三跪誦鼎九恩隆雖私心欲退以循牆然厚意不容於避席懽然之恩燦然以相愛辱先施之長者之命少者不可辭事斯敬矣方聘陳元老克壯采芑之猷藐焉冷胄宰相不對治粟之問華矣名門昔相望乎周漢之間今幸托乎朱陳之好恭惟令姪女某小娘幼閑四德有南澗蘋藻之儀刑某次學生某家傳一編匪東山芝蘭之子弟荷不棄菲葑之體遂獲締絲蘿之盟諾既拜於千金幣敬陳於五兩圭馬而琮錦繡甚慚庭實之微屏雀而褥芙蓉行近門闌之喜方聘何咏楊州之梅清矣參軍之胄采新田之芑冷哉元老之家幸作合之自天俾借榮之有地恭惟令女擬封于沼于沚習知鳩德之儀而某次男於禮於詩粗聞鯉趨之教幸因冰語遂契月書定盟已及於三年納采尚遲於一介雖聖賢之訓不以貨為禮然婚姻之始非以幣不交輙略彌文敬陳薄贄圭馬而琮錦繡愧無周行人使聘之將屏雀而褥芙蓉尚冀李監宅門闌之喜葵心無限楮面莫殫蛟峯文集巻三
