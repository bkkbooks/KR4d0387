body:
  text: 蛟峯文集别集類三宋提要臣等謹案蛟峯文集八巻宋方逢辰撰逢辰初名夢魁字君錫淳安人登淳祐十年進士第一理宗改賜今名官至吏部侍郎以母憂歸徳祐初徴拜禮部尚書會父疾未赴宋亡元世祖詔御史中丞崔彧起之于家以疾堅辭不出至正間修宋史有司不得其事狀故不為立傳惟黄溍集中有所作逢辰墓表尚畧見其始末明邵經邦作宏簡録始為補傳然亦據溍所述不能有所增益也是集乃其五世從孫䝉城知縣淵等所輯正集八巻前七巻為逢辰詩文末一巻附以其弟逢振所作逢振字君玉景定中登進士官至太府寺簿亦國亡之後抗節不仕者也外集四巻則其七世從孫玉山知縣中所續輯凡逢辰厯官誥勅及酬贈詩文皆在焉逢辰當丁大全賈似道柄國之時皆能力抗其鋒持正不屈其提㸃川東刑獄及爲江西轉運副使政績亦俱有可觀惜其遺篇散佚所録奏劄惟寳祐三年請除内豎一䟽尚存餘若論雷變論邊備論吴潜去位賈似道匿敗諸劄子皆平生建白之最著者墓表略見大槩而悉不載于集中其所掇拾大抵案牘簡札之文爲多而策問一首至并考官評語載之盖散佚之餘區區搜輯而成故不免識小而遺其大矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7dd033dd7cee63daacd794cd7f2fe7056b8c9edfa1c460ccb473f1fa0d9739fc
