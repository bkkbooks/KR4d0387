body:
  text: 蛟峯文集卷四宋方逢辰撰序嚴州新定續志序郡之有志所以記山川人物戶口田賦凡土地之所宜也嚴於浙右為望郡而界於萬山之窟厥土堅而隔上不受潤下不升鹵雨則潦霽則稿厥田則土淺而源枯介乎兩山節節級級如橫梯狀其民苦而耐其俗嗇而野其戶富者畝不滿百其賦則土不産米民僅以山蠶而入帛官兵月廩率取米於鄰郡以給而百姓日糴則取給於衢婺蘇秀之客舟較之浙右諸郡其等為最下下而嚴之所以為望郡而得名者不以田不以賦不以戶口而獨以雲山蒼蒼江水泱泱有子陵之風在也郡志自淳熙後缺而不修者距今七十餘年矣吳越錢君可則以太府丞來守嚴政事之暇為之訪搜以補其缺編削訖事走書屬豫為序豫謂嚴為我太宗皇帝髙宗皇帝建旄之地今皇儲賜履之封則一郡之山川人物風俗戶口田賦職方氏皆欲究知之矧惟天子聖明勤恤民隱凡州牧之出辭入覲必詳訪焉是編之作非惟可以備顧問亦可以少助宵旰民瘼之萬一也雲塔序南臺沙合河路通先出狀元後相公此晉人語也至今方驗水繞壺公山莆陽朱紫半此古語也後渠水包山而髙科者甚衆如響斯答豈人才之隱顯盡在天而不在人歟此猶曰陰陽家之説非吾儒所信也三山千簇寺七塔萬枝燈謝泌此詩蓋謂閩多文章士秀氣聚於山與塔也妙果院造一塔范文正公曰此番水文章之應因目曰文筆山後二十年趙汝礪果魁天下文正何人豈惑乎陰陽家者豫謂宇宙間一氣也山川氣之宅山川之氣有厚有薄則鍾而為物為人亦異故山之潤者必有玉川之媚者必有珠茂林蓊鬱芝蘭郁乎其間楩楠杞梓松筠楸柏挺出而特起者必天地英華剛徑之氣宅乎此也惟人亦然穹崖深密必有厖碩朴厚之人崇岡峻拔則當出磊砢岌嶪之士申甫降嵩嶽軾轍枯眉山其驗著矣漕貢進士方君至京謁豫謂其鄉自溪堂後未有顯者今幾百年氣數當一復陰陽家謂是水口值風雷峯若文筆聳立當有掇巍科者今擬其鄉之同志峙一塔於雲頭之峯以迓氣數之復豫謂君不必以陰陽家為辭但舉文正之言謝氏之詩以扣同志孰不聞風以興橫域義孰序橫渠先生有志於復井田之法嘗慨然欲共買田一方畫為井田而行之一鄉先儒之行好事其志之烈如此豫於三代鄉里之學亦有志焉嘗願得屋一區聚鄉黨之英教之讀書講明義理而躬行日用之斯亦可以自求相規之益也歲在庚申婺之士相與踵門而告曰吾鄉有橫域蔣君沐慨然有淑後學之志創義孰而請豫為之師豫曰是豫本心然師則不敢姑相與正其始而以待當世之賢師可也眀年春扁舟泛雪直造雙峴與孰主相與訂正所以為教之條目一旬之中以九日讀書講眀義理而以一日為科舉業條畫具行之越月孰主請載之册曰又當創新孰而恪守之豫謂見義必為此勇者之事樂得天下英才而教育之非君子不能推是心孰主以君子之心為心而又勇於義若是則豫曷敢不成其美遂録其大槩而併為之序其或規模之有未善者正以待方來之賢師訂而改諸誠齋文膾集序人莫不飲食鮮能知味也知味者在飲食之外也誠齋先生磊磊砢砢挺挺介介故發而為文則浩氣拍天吞吐溟渤足以推倒一世之豪傑豈必聱牙屈曲波譎濤詭艱深蹇澀思苦形枯使人讀之不能句然後為工哉雖然大篇巨册浩渺無涯或傳於經或集於文或散於遊戲之翰墨檠窗屹屹猶有未能盡窺其班者況場屋一日之士乎建安李誠叟取先生片言隻字之有助於舉子者門分條析為前後集前集為綱者四十三後集為綱者三十二名曰文膾蓋鼎嘗一臠皆足以炙人口而膏筆端也千里外來徵豫序豫謂先生之文豈止於舉子之助而已乎舉而措之可以撑拓宇宙彌綸國家黼黻皇猷衮冕古今知味者又當於此乎求之毋但曰膾炙而已矣邵英甫詩集序詩不必工工於詩者泥也諸所以吟咏性情足以寄吾之情性之妙可矣奚必工前輩有以放而詩者謝靈運是也有以狂而詩者李太白是也有以寓而詩者陶淵明是也有以窮而詩者郊島是也有以怨而詩者屈平是也以文為詩者昌黎以史為詩者少陵以俠為詩者非今之江湖子乎放也狂也寓也窮也怨也文也史也雖其為詩有不能皆出於情性之正者而其所以詩則亦各寄其情性而已惟俠則詩之罪人焉邵兄英甫吾鄉之秀也讀書之隙且寄意於吟咏集而成編來謁豫序豫謂子非俠者也豈其文乎史乎窮乎怨乎抑狂乎其放乎子以儒業其身而志於詩子姑以此寓性情可也勿泥於工請子識之汪君明詩序汪君明以妙年挾英氣而為詩以吟藁一卷并為序介朋交示豫曰願得子一言以自壯焉其自序之説以作詩未能工方將為子長遊遍走天下名山大川歷覽旁搜以發其英華果鋭者此蓋得於馬子才送蓋邦式之辭之意也豫謂子志英矣又將何以進子乎昔老泉蘇公之初為文也舉進士不中曰此不足為吾學於是閉門讀書絶筆不為文辭者五六年涵蓄充溢抑而不發久之慨然曰可矣由是下筆沛然但見其中之源泉混混而不知其所從來至於詩之優柔騷之清新投之所向無不如志此蘇公之自述也然則子長之文得諸天下之名山大川而蘇公之文得於環堵一室之內而已矣以吾子之才之氣作詩特餘技何事於子長尚當端拜老泉先生以為師則他日為逺器君眀曰唯於是書之為贈汪稱隱松蘿集序殽江稱隱年妙而雋於才故有餘力於詩今為嚴正學以郡檄核士闕籍于淳之鄉校豫耄病峽中稱隱顧焉出吟卷二集曰子為我評之豫素不詩不曉詩家尺度姑與子論詩之道可乎喜怒哀樂未發謂之中發而中節謂之和詩所以吟咏性情而已矣感物而動矢口而言不失其性情之正斯可也讀子之詩如詠青藤杖屬玉枯桑數章夷易而有沉潛如客淮沿途諸詩英發而有感慨夫遜言而沉潛者藏乎智也直道而感慨者見乎義也即此充之其進孰禦或曰如子所云詩一出於情性之所發則從事於詩者將何所用其力而詣其至乎曰學以培其本氣以達其支則橫馳直鶩皆不失其正矣稱隱唯之否洪苽巖先生詩序唐李漢壻昌黎翁乃能集昌黎所作而序之漢亦得托以自聞於後世夏生濂豫族之外孫也以婦翁洪磐陸翁平生善題詠懼其死而詩不傳録其藁為一卷求潛齋石庵諸老為之序以托不朽此亦漢之用心歟自陵谷易位士失其本心語之以道義則笑而走濂也獨汲汲為婦翁存其詩其篤志好義足以厚人倫起人之善心允為可書濂年十二三時陸翁一見竒之即許妻女焉陸翁可謂能知人而胸中倜儻不凡矣豈徒能詩而已哉鴈蕩林霽山詩集序霽山林德陽前進士也壯年英華果鋭之氣無所於托璚瑰玉佩大放厥辭吟卷一編囑朋友胡天放轉致石峽山中請豫評之豫惟詩所以言志蓋直泄其中之藴而無待於外者然而騷人文士於得意處每曰神助蓋光風霽月有以發之然後勃勃有竒氣唐人謂張燕公守嶽陽而詩益悽惋蓋得江山助也德陽自鴈蕩遊會稽而錢塘潮汐之吞吐吳山煙霏之舒捲瞻望兮咫尺縹眇兮余懷所以觸其情發其感者朝朝暮暮無日無之故其悽惋夷以逺暗以章率有古意非湖海吟笑而已矣於詩家門戶當放一頭因書卷端以歸之胡德甫四六外編序世人有言司馬君實不能四六無損乎四朝元老豫謂不然司馬公者所謂梓人不能葺牀足者也若其鋸者鋸斧者斧梓人豈能欠斯人哉汪彥章作册康王文曰漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在天下讀之戚然起朝覲謳歌之心曰吾君之子也壽皇初兩淮保障虛張魏公以右相視師尋以讒召洪景伯當制曰棘門如兒戲耳庸謹秋防衮衣以公歸兮庶聞辰告兒戲本指邊將而天下謂詆魏公而不平夫以一言而收天下之心一言而觖天下之望則四六可茍乎哉胡公伯驥德甫余鄉之老師學問淵源山湧泉出而尤長於四六近得啓事數篇觀之交乎上者不諂交乎下者不倨且鋪敘旋折咳唾歷犖如散文每篇於頌之末必有所規規之末必有所勸若施之制誥當有彥章之得而無景伯之失矣陳后山有言韓以文為詩杜以詩為文余於胡公四六亦云林上舍體物賦料序賦難於體物而體物者莫難於工尤莫難於化無而為有一日之長驅千竒萬態於筆下其模繪造化也大而包乎天地其形狀禽魚草木也細而不遺乎纎介非工焉能若觸而長演而伸杼軸發於隻字之微比興出乎一題之表惟工而化者能之前輩賦鑄鼎象物曰足惟下正詎聞公餗之歌傾鉉既上居足想王臣之威重因足鉉二象而發出經綸天下之器業賦金在鎔曰如令分别妍媸願為藻鑑若使削平僭叛請就干將因藻鑑干將四字架出擎空樓閣願為請就又隱然有金方在冶之義識者固知其為將相手噫化矣上庠林君采長於賦月書季考每先諸子鳴一日出示一編曰體物賦料自天文地理至草木禽魚合二十門凡涉體物字面收拾幾盡閣筆寸晷者得是編觸起春雲秋濤之思或可以化無而為有矣周月潭詩序三代而下詩獨稱少陵蓋其以史為詩不以詩為詩也武強周月潭因宇宙大變挈家東西走托詩紀其事蓋直敘其情而無事乎追琢者丙子丁丑盜哨之禍可考焉亦鄉之詩史歟因為賦兩詩以敘其端家世牙籖入劫灰猶存詩種發枯荄騎牛夜半歌誰和跨馬月明敲又推且説山中窮快樂莫言世上活輪回欲知天地心安在冷看溪橋雪後梅又曰誰云世上無君子試看林間有散仙康節逍遙在行樂希夷快活只鼾眠不言宇宙山河變且擅風花雪月權撞著頭頭皆太極賞心樂事浩無邊名物蒙求序童蒙未識宇宙內事雖此身不識其所從來況同胞同與者乎法當從事物上起豫弱冠時業書館苦於初學聰眀不開為作蒙求一卷教之以天髙地下萬物散殊人物之大原人倫之大本次及其飲食衣服切已日用處使之先識其名次通其義積習既久雖木石之愚者亦豁然為之開眀然後知天地間無不可教之人伊川程先生曰今日格一物明日格一物然後當脫然有貫通處初學之學雖與大學之格物不同然太極之沖漠無朕者豈在萬象森然之外哉此之所教特先其近者小者而所謂逺者大者亦不離乎此而已矣丙子後有朋友拾得此本於兵革煨燼之餘者持示豫問所為作之意遂為道其所以然蛟峯文集卷四
