body:
  text: 蛟峯文集巻八附山房遺文宋方逢振撰瑞粟圖序青溪之近郊有粟一莖而兩穗者三四穗者民若士合辭以慶於長官學正宫大用率諸生以其圖來諗俾予敘其嵗月予曰異哉邑之嘉瑞也昔張君之治漁陽雨暘時若嘉榖生百姓歌之曰張君為政麥穗兩岐載在簡冊吏治燁然有光觀史者誦之而已未嘗得於目擊今粟穗兩岐秀出於素當年盛美復見於兹得非善政感召而然歟民曰續我大命時尹之休士曰大和尹實有之尹不自有歸之太守太守曰於戲非守若尹之力聖君賢相之徳予聞之喜於是乎書以備觀風使者之采録云瀟洒集序瀟洒集者復心汪稱隠之吟巻也瀟洒者何吾州名也州曷為曰瀟洒文正范公守是州日名之而稱隠取以名其集也稱隠歙人為州學正年妙而工於吟來吾州曾幾何時錦囊已成巨帙訪予臥病中屬之叙其端予曰噫柳柳州以愚自名溪池丘島無往而不愚是邦瀟洒樓亭泉石無往而不瀟洒凡仕於斯歌於斯先後來不知瀟洒幾人矣今又將瀟洒子之詩挾冊讀之大篇淡而不失之枯小篇奇而不流於怪其為人楚楚洒洒可見其中之飛雪層氷矣是則稱隠之詩又不專以吾州得名也雖然先賢所謂瀟洒者山水云乎哉子陵一絲之風凛凛千古吾州之得名以此子為正亞博士一等皋比得分半席以講授餘閒率冠者五六童子六七徜徉乎逝川之水涵咏乎舞雩之風蟬蛻而春融籟鳴而機動即其鳶飛魚躍體認其活潑潑者悠然思超然覽心領而躬行之是則吾之所謂瀟洒者也子其勉之揚州盛恕齋吟藳序杜少陵昔與李太白髙書記遊時衞八處士年最妙呼為小友後二十年少陵有詩贈之曰少壯能幾時鬢髪各已蒼又曰訪舊半為鬼驚呼熱中腸前輩羇窮流落之餘不遺故舊如此予少從軍淮海時盛君之年妙之又妙予且未得友之矧敢小越二十有五年以吟藳索予於萬山深處屬之敘追省舊遊恍若隔世斯可見少而壯壯而老曾日月之幾何而天地不能以一瞬也噫予衰久矣蓋自辛未放還抱痼疾臥空山垂盡無幾平生往事不復夢見壁上龍蛇化為塵土江流浩浩逝者如斯然而天機動處元無古今固自有不毁不滅不逝而往者不知於何乎寄栖霞寄於刹瓊花寄於祠道鄉四柏之風操誰與守今吾得是編然後知舞雩之下猶有鏗爾而作超然獨見之吟弄而歸則夫楚山之雲秦淮之水二十四橋之風月始有所寄而不孤子其勉之蔽自三百篇而下本乎六義以觀所感究乎四始以考其成而又探之騷以致其幽博之西晉晚唐以廣其趣然後約之李杜歐蘇以㑹其指歸囊括造物之無盡藏者散為太平風露庶幾永與坡後四學士齊名使觀是編者曰此嚴陵方某二十五年前從軍時所不敢小友之者也普安寺記佛廬於青溪者凡三十有九而盂粥盆飯則普安為第一予築室讀書清風潭上順流以東三里折而北又五里復折而南峯斷流分有峯隆然起而傴倭以伏若虎踞熊臥横絶二流之㑹以控淳遂蒼藤古木蕭然翳蔽而普安刹為翠岩千尺别是人世出林跬步即翕翕熱熱僧遊其間非鐵肝汗脅鮮有不動心者予丙子避地於杭越明年宼平纜舟西上而過之則廬已火於盜但見寒烟斷礎荒草頽垣而已四顧閴其無人旁有室斗大煢然一衲如孤雲野鶴悽其憔悴儼繪像而事之予為之愴然歸舊隠且十年有僧復禮訪予於清風潭上問向所經從則雲棟雪脊奐然一新矣問昔之煢然憔悴造次顛沛於是者誰歟曰禮也問今之輪奐翬飛幻出於寒烟荒草者誰歟曰禮也禮率其徒撙節粥飯苦心殫力以濟登兹鐘樓藏宇創於庚辰佛殿法堂建於癸未僧舍兩廡㕑庫成於丙戌禮之來求以記嵗月云爾予嘉其流離困踣不忘所事堅忍強耐以復厥初於是喟然嘆曰凡物廢興成敗不可得而知也天髙地下往古來今一興一仆一起一滅消而長長而消相尋於無窮此豈可得而知哉蓋自有不以興仆起滅消長而為之消長者則存乎人靜樂先生祠堂碑淳安縣常樂鄉上貴寺靜樂祠堂者唐處士靜樂先生方公聚徒授業之所也先生生於唐末以節義自髙唐亡恥非所事持峻行不屈五代之吳越錢氏招之不往遯於深山讀書講道以終老焉昔宋咸淳明堂詔書求歴代忠臣烈士有功於民者令州縣嵗時祭祠時知縣事承議郎應應偶發錢一千緡下本寺助造佛廬就其中為先生祠從衆請也越數年國家更代宇宙且運而往獨前代名人遺迹不許廢墜先生之祠如故嗚呼先生之道與天地相為久長豈特子若孫世守之邦人士聞先生之風凛凛如生亦足以為勸王道以徳義生民賦王立民命道於福基念本根之係此即徳義以生之坦然至正之彞理皆日用推此可遵之實人遂春熙聖人出而胎一世之春天理乃夀羣黎之地惟寛平正大事事無擾故涵育渾融元元咸遂王維知此宵旰之念在斯民道豈他哉徳義之中有生意觀夫洪範其建騶虞以成無反無側以修以明非屑屑以力假非區區於利征萬端皆正此洪範之攸建纎芥不仁豈騶虞之大成此王者能自得師孰是顧所行之本要先為益俾遂莫不夀之情生者可養期無憾烏可以不厚欲惟和種豈容於罔克有大孕育無窮保息尊以不傷是即罔砥懋而欲並闕無禹拯觀彌滿天下民所蒙福見胚胎春意義之與徳者𦕈以飭修之始莫匪常行納夫人心歸悅之中疇非允殖大抵一毫悖理此豈粹王之道萬宇皆春莫非吾道之功故仁夀多在帝治醇醲之際而糜爛每基於伯圖功利之中王乃綱審其執貫民所同極予遵而汝免短凶之咎仁我行而爾無鄙夭之風使王民之皞皞如是見道之生生不窮情本欲安事自商湯之制典因以任教由成后之通是道也在商為極惟以用康於夏曰中形而允治春風惟政之徳時雨行師之義用能蘇怨徯之困漿食西北拯瘠捐之命蠶桑兖冀奈千載以來亦幾斯道之泯幸一王者作而受更生之賜如或戛沈其命當不任刑儻令念爾推肌勿交征利嘗論衆形皆有弊理獨不朽壞證茍弗除脉終未蘇胡乃括田非義也忍矣膏腴之奪科斂薄徳也傷哉疲弊之敷曾不曰怨已滿腹剥將及膚不去斯二者使承蘇也則生之一脉殆將斬乎當令化致豳原夀一農夫之必介仁先政邑餒宜老者之無噫滅義非可怒曷怒商頑敗徳不必誅曷誅苗蠢衆芳同植育則兼育一物獨枯忍與不忍王者若曰順吾徳義者則施以春生之惠梗吾徳義者則示以秋殺之威道宜兩盡噫陶物以古冶固善胚腪醫國用盜臣反滋殘忍毋管晏術行斬民命於筭筴毋孔桑利折朘民脂於平準否則遏絶生意小人未去皆足為吾民之巨蠧焉斯道奚其能盡冠二子說冠義曰凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義立故冠而後服備服備而後容體正顔色齊辭令順故曰冠者禮之始也冠義一篇首及禮義而不先之以冠禮義備可矣未也必禮義立然後始及於冠冠其可以不重乎冠者大人之服古者二十而冠十九而下皆得為童子一服大人之服則與童子辭矣安得不重之哉人之所以異於禽獸者以其有禮義也男子生能飲食教之右手能言教之唯諾六嵗教之數與方名七嵗教之能别八嵗教之能讓十嵗學幼儀十三學誦成童學舞射御其為教不離乎容體顔色辭令之間以常情觀之正容體齊顔色順辭令初無甚髙難行今自能食能言至於由小學而大學嵗月若是其久工夫若是其深豈徒苦其心志哉蓋大人之坯樸已造於此容體正顔色齊辭令順至於禮義始備以之正君臣而君臣可正以之親父子而父子可親以之和長幼而長幼可和至於禮義立矣然後加之大人之服故曰冠而后服備其與童子異也然所以異於童子者軀殻云乎哉蓋必有事既冠以往三十而有室則將有父道焉四十而莅官則將有君道焉生乎吾後者先吾則將有兄長之道焉回視二十以前所學何學則當惕然警悱然發痛自督厲曰正容體容體果正歟齊顔色顔色果齊歟順辭令辭令果順歟必能盡乎為人子而後可以為人父能盡乎為人臣而後可以為人君能盡乎為人幼而後可以為人長所謂大人之事者蓋如此曽子自少而壯壯而老一生涵養工夫見於動容貌正顔色出辭氣三事直至全而歸之方知免夫善乎士冠禮三加之祝曰棄爾幼志又曰介爾夀考曰敬爾威儀又曰慎爾黄耉人生之嵗月易老天下之義理無窮髫齔習之有餘頭白行之不足古人於加冠之始不得不致丁寧告戒之意蓋終身大人之學方自此發軔故又終之曰冠者禮之始也後世冠禮廢童子與先生並行遜讓之節既不防閑於幼穉之時修治之方又不謹嚴於行冠之始此人才所以難成而教道所以戛戛乎難入愚重有感焉故於二子之冠繹其大義而申言之正容體持已處要端儼以守之使内賊無自而起齊顔色接物時要矜莊以莅之使外賊無自而入順辭令出辭氣時要審以發守如惡言不出忿言不反出必顧行重必然諾大學曰言悖而出亦悖而入即此便是不順弩有機謹而後發知動知微者其為機乎和孫名汝曰機字汝可度户有樞運則不蠧知闔知闢者其為樞乎良孫名汝曰樞字汝可達遣禮往項氏書某端拜申禀某惟至敬無文大圭不琢大羮不和件列長儀非古者是用盡芟蘩蕪而一致情悃惟髙明先之以察某切謂婚姻人道之始禮之本也易之咸詩之時禮之醮且命所以重本謹始也嫁女之家三夜不息燭思相離也取婦之家三日不舉樂以著代也古人致嚴之婚禮蓋如此顧今天地變人道缺綱常之寄在吾黨所以立斯道者亦有仁義而已矣共惟親家令聞在躬而惇善積之本義方篤教而開徳潤之基寒緒之於華宗以世俗論齊大豈偶而純誠厚徳所尚則同此門牆之所以下取而蛟峯所以托之子女也某亦既送姪女出就車雖以其未克羞蘋藻為憂然既獲執棗栗以見云乎不喜薄禮將敬采菲斯榮心之精微言不能盡伏乞台照峽中和卜彥才韻尹躬樂不在耕莘樂在明明以及民貪㸔回頭多應錯偶聞變色始知真聖賢氣象心為大天地根萌人是仁認著濂溪牕草意自家胸次一般春峽塾講中庸第二章詩滔滔逝者若斯夫不有耆儒孰共扶昭掲五條皆達道由來一本不殊途聖賢奥義難窮盡老筆名言妙寫模我欲研硃同㸃易先生肯位此中無次盧月山賀建造韻轍雪營巢近嵗除樵奴溪友落成初卜隣喜有玉川子作計拚為陶隠居架上多儲韓杜巻案頭不著老莊書乾坤自有闗心事非是幽人偏愛廬山房歸隠卜築清風潭上與賚爵盧氏之居直一葦之隔爾故詩云卜隣喜有玉川子也至元廿四年十一月二十日得宣命詣朝可菴有詩不敢當次韻以謝雪棹殷勤泛剡溪吟香為拂案頭埃老軀久已乞骸去瘦骨應難入畫來但願東皇憐病瘦早從西華覓雲臺當年自是渠無分明主何曾棄不才抱琴來㑹錦沙溪音響能清一世埃不學晉人反招隠頗知陶令欲歸來羨君雪裏騎驢興哀我年前戲馬臺留取老翁看雲月乾坤撐拓賴奇才風潭精舍月夜偶成先生山房之號本此茅屋三間一塢雲此窩真足養吾神不知逐鹿斷蛇手但見落花啼鳥春石几梅瓶添水活地爐茶鼎煮泉新古今天地何窮盡愧我其間作散人挽諫坡居士諫議村中一布衾幽潛兩事最堪稱瘞骸鬼結來生草削髪僧然後夜燈螭篆淒涼嗟老鈍薤章嗚咽動親朋羨公有子能如此多少英雄呌不譍贈相士葉秋月麻衣道眼明如月學士神仙帶不來天上貴人若相問只消三字畫爐灰江湖穏處於潛寺僧此舟無物本來虛萬斛清香只有詩昨夜潮頭髙幾丈老僧睡著不曽知贈山屋相士我有一部相法在無言處顱欲圓趾欲方耳欲聰目欲明鼻孔欲别香臭其形肖者為上相目重瞳以迄於今睿者秀者髙年者孤幼者顛連無告者不知相中幾千萬萬矣惟不肖者不入相我昨日病期汝明發來當相傳授如期汝果至是或可教與之詩曰圓顱方趾具仁端性體由來只一般若見裏頭腔子黒相書已作死人看汝持是法以往十希八九矣悼亡祕書翠華東南來奎聚屬吳域分王百餘年靈光赫天徳龍文發南源圖書粲東壁誰拆天罅開猝忽正氣泄剖藏發金櫃抉藴破石室籖怕逐汗牛至珍去遐絶我欲然藜人四庫亦赤立細人慕所愛但嗟珠玉翼君子為道謀惟憂孔孟北風氣日已趨南強變金革周禮吾能言欲徵恐無籍落落星向晨後生當努力毛伯玉以六月廿七日來訪是年天不雨梅亢熱異常書數韻述懷且以贈之伯玉不我過過我必六月老天雨不梅五行一乃絶亢離單用事赤烏赤如血人寰何辠辜幾欲炮烙殺左手觧衣襟右手不停箑脫帽無奈何而况可腰折西望禽鬼焦東望金魚涸前山牛眠洿亦復如火發相攜將安之只合坐論說伯玉老先輩家傳洞林訣談辯管郭雄五鬼皆避易借君鐵柱杖蹴踏六月雪為我買雪山斵氷作天穴庚寅人日雨夕大雷電激而成雹陽專而陰不勝寒反為燠復雷雹大雨彌旬燠極而霰繼以大雪三日深山盈丈自人日至晦凡二十三日雨雹霰雪農民告苦為二十韻以記之龍馬交戰相長雄一勝一負互始終二氣脅擊威力窮凝氷迸出焦火中跳丸飛砲怒打空一夜白盡千頭峯頃田十萬銀裹封東皇未肯開冶鎔山眩水晃人滅蹤癡猿凍鶴驚折松鄰雞失旦僧懶鐘昏曉不辨天地聾鹽虎坐險終陷凶獰獅見日空眼紅書生徑臥身龍鍾諷諫不到齊王宫灞陵無驢句不工萬象醜怪難形容我聞古語盈尺豐今深一丈愁殺農欲將此意問天公天公髙髙髙幾重翰林將指下學峽賔聲叟為諸友先雨雪載途民亦勞止一詩懷之空山雪片大如盤有客逺在孤館眠翰林喝馬不到地白帝叱馭親行鞭疾驅滕六笞飛㢘六花急舞狂且顛玊皇香案口讀宣深衣大帶依然仙東里先生履欲穿濕透布襪枵囊纒髙談雄辯罏亭邊不有義意誰肯前陽羨山中春信傳兩驂已發垂虹鞭諸君急棹山陰船子猷逸興今翻然茶具一贄鮮于伯機惠山天下第一泉陽羨百草不敢先二絶獨與端石便不受翠鐵黄金煎古來風韻擅玉川日髙丈五猶打眠山中舊事今不然石銚不在坡爐塼伯機卓犖美少年好官不做自取㢘床頭月俸無一錢手續陸羽經二篇我有片石出古端斤師斵成無脚鐺為君置之書几邊自汲活水烹新烟不待七碗肌骨仙飛去玉皇香案前天公髙髙望眼穿百姓墮落深深淵無人敢說江南天示湖田菴僧湖田菴乃耐軒先生墓所千里渇驥奔横川萬松滴翠蜿蜒盤我來廬墓分一龕紙窓揺動卓錫泉鑄鐘􅯍鼓買祭田雲冠雪衲聊結緣崑崙石壁蛟龍淵呵禁守護靈物專六根五藴洗不蠲山鬼不肯降太顛内熱正坐飢火煎睡蛇滅盡方安眠君不見溈山禪剛把鐵牛鼻孔穿犯人禾稼痛撻鞭常見迥迥在我前又不見髙公嵬天遣妖魔下玉軿試我楞壁堅不知死灰無復燃我遊諸方三十年出入無界叅人天不羨翬飛紺碧捐金錢不羨髙堂㑹食羅大千只羨當年開山祖師賢送姪隆吉作遂安教諭舊時州置文學掾南宫集英大學選英雄壯志必此爭飯囊郡庠奴隸縣今時學籍難登天青山闕老天厭蟻旋驢磨猶自癡不釋不𤣥良覺窘南州諭缺數百員得即忻忻不得愠他年正録繇此遷視博士員居四緊博士以上梯級危仕至泮宫鑽天令小阮膽大志復狂抜起泥中尤自奮不顧在列嘲好為濫取皋比得家便天上知心愛屋烏尚覺知心相勉勸𢎞文弟子需補員徑合翰林集賢院我欲勸子入翰林却恐逺嫁難為情蛟峯文集巻八
