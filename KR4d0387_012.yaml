body:
  text: 山房先生外集卷四宋方中續輯賀山房先生得孫方士夔晚節歸來緑野堂傳家衣鉢付諸郎喜存千載古罍洗初聽九苞雛鳯凰春早桐枝新擢秀日長棣蕚賸流芳公家好事聨翩在首寄篇詩寫弄璋賀山房先生得宣命盧可庵自從驄馬到清溪净洗江山絶㸃埃霜月髙擎隨地轉春風吹喜自天來皇華禮遣榮花縣宣命恩濃出柏臺海內蒼生望霖雨廟堂正要棟梁材贈山房先生得宣命何昭德飛鳯翩翩下九閽先生出處重斯文不將鐘鼎易朱紱要老桐山守白雲處士一生純是晋逸民千古尚為殷皇家恩意如天大定把三峰乞與君賀山房先生入新居方一夔紫陽從西來孤峰望吳越自昔有佳人髙蹈造理窟雉山走其下清淑鬱未發吾宗紫陽民秀挺鸞鳯骨家學印大程南北斗柄揭爾來卜新居佳氣渺葱鬱天香生桂蘭野性老薇蕨嬉戲獨樂園翛然立清絶我來坐庭隅幽草淡風月圗書有真趣為指掌中訣奉謝山房先生古杭趙春洲驛騎臨門意淡然肯將鐘鼎換林泉碧雲遙望半千里白髮驚嗟十五年鴈挾西風歸楚塞潮隨暮雨泪吳天拙吟不是公題品安得山人姓字傳石峽書院山房先生碑像贊金舂玉應絶學是續𣲖宗紫陽規循白鹿以身衛道障川回瀾大節無虧進退可觀挽山房先生何夢桂東壁無光夜隕星為公痛哭淚沾襟才髙不竟平生志身死空留萬古心聽曲誰能歌白雪知音徒擬鑄黃金傷嗟遲暮邅吾道恨不相從九地深又病入膏肓藥砭難綿綿相憶勸加餐擊姦曾籍青萍劒報德慚無白玉盤樹檟未成年歲暮枯桑猶在海風寒平生書至將盈篋泪灑長箋不忍看祭山房先生文士生天地間要不偶然蓋有數存其盛衰關乎時運消長係乎斯文是皆非人之所能為而委命於天者為之吾固嘗歷數一代之人物上下十數年間凋謝殆盡而奄奄如木之遭霜落落如星之向晨豈果時之不齊而斯文將至於夷泯鄉之碩德偉望今幾何人如吾山房先生者才有用而位不大學未盡試而志不克伸謇迍回乎吾道而重以多故之憂殷雞呼起起而偶值夫龍蛇之厄辰天之降喪吾是以傷夫折足之麟追維曩昔每握手論議至於書問之相聞惟長吁太息為之蒿目而眉顰患難相救骨肉弟昆惟氣同而志合故情至而義敦眷兹交道匪直旦暮不知者謂近託乎婚姻今遽如許吾與誰親天不愸遺一老後死者何足與於斯道而復嗟夫歲月之流駛世故之驚奔靜言寤劈不可重陳疾不及省訃不及奔痼於衰病負咎奚云緘辭絮酒老淚盈襟寄此情血天地鬼神山房先生外集卷四
