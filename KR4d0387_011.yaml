body:
  text: 蛟峰外集巻三宋方中續輯祭蛟峰先生文何夢桂天生哲人千載一期固有負經綸天下之志乃至鬰於數而不得以竟其所施當其鬰而不達不惟人不得以致其力雖天亦不能違自古大聖大賢與夫一世之豪傑不得志以死者何限而卒不得以捄夫時惟公聲名在天下功業在方冊而其蓄大發宏瀦深流溢識者方望其福澤之被天下使匹夫匹婦之不餘遺至有不得以盡如其意者時耶命耶吾不得而知十數年來每一進見但見其憂憂戚戚扼腕而攅眉窮達仕止惟義惟命公豈為一身區區者之私故其語及民事則為之太息而欷欷畏天命悲人窮固聖賢之責而民之痒痾疾痛公忍視之藐焉為手足之痿痺然力不能扶則已何為自鞠自苦以至於斯又况世之所謂孤臣者其慮患之深而操心之危麟折其足而奠楹拽杖㤗山之頺其忽而君子此心固非衆人之所能識而其事則亦知與不知者之所深悲民失所怙士失所師九原不作其將誰歸鳴呼天地無窮事㑹無極愚以是悲吾道之孤竒盖棺事定公全歸而無愧固未知後死者之何居百里絮酒一束生芻公鍳此心尚其來思又邵古香愬靈脩之翕㪚兮曕盖壤之悠悠悵鳯衰而麟踣兮繙林莽為荒丘軻之死蹇無傳兮渺鄒嶧其予愁木鐸瘖瘖而收聲兮説鈴峰起千五百載之寥寥兮微程朱其誰與儼雙峡之撑空兮紫陽是似障梭象之狂瀾兮江漢湯湯彼瞿𥅆之誕幻兮况得侍乎門墻偉勲名之照殺青兮羌吾知其粃糖忽天跳而地踔兮呌蒼梧其何許紀柴桑之甲子兮歳冉冉其云暮痛巔崕之辛苦兮獨抑鬱其誰語使章甫不至薦屨兮夫惟斯文之故吁噓乎㤗山之巖巖兮横目具瞻虎豹倐而逝兮狐狸曷其晝潜將生人之無禄兮胥為愚黔將徃聖之無神兮委鈞髪之綿延不然何奪吾之冡鉅兮遄歸於天矧燕石之䝉繅藉兮青黄乎溝㫁豈徒哭吾之私兮切獨悲此文獻粲蕉荔以為羞兮横流涕之潺湲睇主樓之閴寂兮吾將從夫南陽之阡又鳴呼大賢之生動静太極執道而出如陽之闢時行物生風飛霆撃捲道而入如隂之翕玉韞珠沉聲收影息故其進而道不為之孤退而道不為之屈鳴呼我公正學濂伊儲精奎璧元祐全人三代遺直雉麓西蹲龍峰東萃鬰鬰葱葱環瑰毓徳公生則宅龍峰之阿死則枕雉麓之窟是吾淳數百年之間氣鍾於公在大化中猶旦夕也雖然載道有書死而不亡紀實有銘逺而彌光素車彭彭白斾央央江流嗚咽山氣滄涼生芻薄奠俎于道傍哲人已矣涕泗其滂又耆舊淪謝兮日益以稀嗟若先生兮蒼蒼而不憗遺文昌夜隕兮星斗黯其無輝峽雲慘淡兮空䕶藏山之遺書世之有識兮舉聞訃而悼惜矧丈席之日親兮曷不攬涕而嗟咨慨先生之立朝兮獻納曾不依違叱折姦邪於始萌兮誠為國之蓍龜麾節煌煌於外兮厥聞四馳士詠歸於雩風兮㸃胥驕卒震懾乎霆威蒼生顒顒其霖雨兮倐陵谷之改移數有不可必兮不得以盡其才之所欲為謂科目不足榮兮陋晁董於千載謂富貴不足誇兮退然陋巷簞瓢之癯儒謂正學當續兮由考亭上遡乎濓洛謂古必有塾兮所以造就族黨之與比閭鐸聲一振兮救人心於已死著書立言兮庶幾來世之永貽深衣幅巾兮可優㳺以忘世不皦皦以為潔兮不混混而詭隨鳴呼先生聲名葢世兮功業未鬯厥施文章黼黻乎皇猷兮問學卓為世師心耿耿其憂世兮雖易簀而猶未已抱節以終其身兮而今而後得全以歸鳴呼人孰無死兮先生之死夫何憾而山頺木壞兮實為斯文而痛悲故侍讀尚書方公墓誌銘文及翁公諱逢辰字君錫其先河南人逺祖紘官吳中避新室亂因家於丹陽郡歙之東鄉今淳安縣是也孫儲漢和帝時賢良方正對䇿第一仕至太常洛陽令黟侯忤竇憲棄官去或見其皓鶴自隨呼為仙翁逺孫曰上貴府君唐僖昭時隠徳弗仕教授鄉里其徒號曰静樂先生越十一世生叅謀公力學篤行記問該博鄉人尊敬之號耐軒先生子三人公其長也公天稟卓絶自幼刻苦務學夜誦徹旦諸子百家之書無所不讀而㑹歸于周程朱子之學其所為文家傳人誦士林素以魁彦期之淳祐九年己酉鄉舉以夢魁名預首選明年中省試第一等理宗臨軒策士以公所答敷陳鯁亮擢為進士第一御筆改今名昭異渥也公感激上恩方在期集所聞二豸冠忤宰相鄭清之相繼去國善類摇動適遇雷變遂叩閽上書其略曰伏覩御筆以雷發非時避殿减膳恤刑獄而獨無求言一條天下恠之中外傳聞以廟堂為監謗之穽所貴乎大臣者以道事君不可則止今君嗣未定大臣不能賛之土木方新大臣不能諍之貨臣聚歛大臣不能禁之敵國佯遁大臣無以備之顛而不扶危而不持則具臣而已矣聞大臣屡疏丐閒而未可其請留之者愈堅攻之者愈衆乃所以為大臣甚天下之議非所以愛之也疏奏上優容之初補承事郎僉書平江軍節度判官㕔公事公莅事勤恪提刑潘公以臬事咨决知其逺到深器之吳中有和靖書堂郡請公領學事初講太極將圗説分作五節發眀濓洛藴奥寳祐元年甲寅以秘書省正字召入時海州䘮師淮閫以㨗聞物論沸騰公叩閽上書有曰伏覩御筆以海州之㨗降詔奬諭道路疑之得以謗陛下以曲行賞矣海州之敗三尺童子皆能言之而帥臣抗章來辯徒以一去恐朝廷直欲以敗為勝道路傳播莫不羞之今曲狥其請又詔奬諭豈陛下不知而受其欺耶彼國忠之欺其君為固寵也天下國家之安危彼不恤也今富貴操柄陛下自有而自欺欲何為耶為陛下謀者何不降詔以督勵之曰朝廷好官爵汝為之天下大富貴汝享之今四郊多壘汝欲以敵遺君父將安之乎此詔一下彼敢于言去臣不信也陽城有言脱以延齡為相臣必取白麻壞之學士院果降此詔則祖宗三百年涵養縉紳中豈無陽城乎臣甚為天下國家羞輒痛哭流涕之臣願陛下急收囬御筆猶可解萬世之議揜外國之笑借曰萬世之議未暇恤則四隣笑我何以立國乎公此疏為制閫賈似道發也二年乙夘春除校書郎時上總攬權綱威福有竊弄者儲君尚㓜公懷隠憂上疏有曰當大本猶豫之秋豈無旁睨蜉蝤之撼甫節之燄燄難度其心平勃之屹屹當儲其後又曰天下有貧州郡而無貧太守有貧國家而無貧邸第南司貧而北司之應奉不貧百姓貧而緇黄之窟宅不貧如此類者不可枚舉至於狹小才以濟大貪者於陛下之近親有依凴焉於陛下之宫中有承受焉於陛下之左右有㳺譽焉專以伺陛下下之好惡喜怒以媒其身陛下得之於左右之㳺揚者曰某人能也某人亷也然後出自聖㫁而用之或畀以麾或授以節曰吾自除吏也而不知西園之諧價固有從旁而竊威福者矣又曰京師國家之根本王畿四方之命脉此天下所恃以為國者京有尹畿有漕所以使培護根本愛養命脉也豈願其撥本根戕命脉以便吾之私哉邇年之為是官者失其設官之本意不過為閽豎軰一大承受耳無名宣頭真偽莫詰非時取索隠匿莫稽親宻之地惟恐浸潤之易行嚴邃如天誰敢執拗以取禍仇士良之教其徒曰天子不可令閒暇暇必觀書見儒生又納諌智深慮逺吾屬恩且薄而權輕矣莫若以財貨聲色蠧其心使無暇更及他事然後吾軰可以得志今此曹遑遑汲汲為陛下經度前之藻梲未休後之丹雘又起陛下方以其小心辦事動適吾志而不知此正仇士良之䇿也帥漕兩司疲於應奉之不給帑庫赤立廩如垂罄職此之由萬一畿甸之内有一旦警急不知陛下何所趨辦何所倚仗乎是可不急救兩司之貧乎如將救之願斷自今日止營繕省宣索剗刷兩司不急應辦之空名悉停罷之左右並縁需索之有例者悉閣之掃除蠧冗先自此始然後可以責兩司之培護根本愛養命脉以為緩急之備也三年丙辰夏上疏有曰善處急者不以急而震天下亦不以暇而愚天下夫天下之勢固不可以激尤不可以媮勢急矣吾又示之以急則失之激故不容不暇以壓之此所謂暇豈真暇哉當為皇皇之急不當為悠悠之媮然後可以暴白於天下曰吾所以示不廹之暇者非愚天下也不敢震天下也古之謀人國於江左有為之者矣莫窘於淮淝而談笑於奕棋莫廹於新亭而從容於就席此之謂不以急而震天下外示談笑内必有以神其指授之畧而收轟雷破柱之功陽示從容隂必有以伐其壁後之謀而折其飄風怪雨之勢此之謂不以暇而愚天下夫安則曰安危則曰危迫則曰迫紓則曰紓何為翕張闔闢哉世變日激天下之事不可以直遂故處急則必以暇處暇則必以急不然吾能為晉人之急則天下之憂端未艾也又曰天下者使吾有以自謀可也不可以隣國之存亡為安危使吾有以自備可也不可以敵國之緩急為喜懼以隣之存亡為安危則病於依以敵之緩急為喜懼則病於制善為謀者不依於人善為備者不制於人茍不以我之未及謀未及備者為第一義而遽以彼之存者為安緩者為喜萬一隣敵陽示安枕以紿我而假敵以道臍可噬乎胡不赫然一怒移其揣摩他人者而自謀自備乎進退伸縮無不由我固不必以隣國之存亡覘敵國之緩急也時閹宦導上以土木湖山工役大興公疏又云今與敵對境我無一日謀敵而敵無一日不謀我彼之所築者金城鐡壁我之所築者土妖血山彼之所築者奪我之地為之我之所築者奪民之地為之又極言備邊之事以必爭之規模而奪浮光然後可以全兩淮而保長江以必死之規模而守樊襄然後可以拒光化而全江陵大淮之猶可守可耕者以猶有一綫河也今乃涉河而築浮光光乃吾户内若其屯於斯耕於斯生聚教訓於斯則日夜出騎以撓我淮東西俱不可耕矣雖堅城閉壁而坐為禁制不得動矣為吾之計當勉諭淮閫盡力以爭浮光毋使彼得以久其耕而牢其巢則兩淮猶可安枕也萬一樊襄不牢彼反奪而巢之則江陵孤注尚足恃哉為吾之計當擇荆之猛將責之以必死之規模守樊襄則北可拒光化而南可以全江陵一則思所以奪其地二則思所以爭其民則對壘之勝負决當在此而不在彼矣公此疏真救國之活劑也奈何不見聼用以至於亡人邪天邪時内豎縱横日以滋熾御史洪天錫劾之不行而去公即移書宰相勉其行申屠嘉之事又抗疏援膏上肓下二豎為喻曰䑓臣劾二豎欲為國家早去厲鬼非有膏上肓下之難也而陛下不行其言豈陛下自愛其國反不如愛二豎之甚乎漢唐之季建置天子在閹豎掌握罪大惡極朝廷不能誅之天下必有起而誅之者漢之宦官陳蕃竇武爭之不勝并州之將操戈而殪之唐之宦官宋申錫攻之不勝河中之帥移兵以屠之又曰小人之在君側其操心何所不至其所以不敢動於内者葢有所惮於外若外不足惮則此曺無忌惮之心生無忌惮之心生則無君之惡動矣言極激烈上不恱公遂稱疾求去是時丁大全以臺長用事欲鈎致諸賢公見幾而作謁告徑行丞相董公槐勸公不必逺引公曰丞相且自照管越數月董果罷斥四年丁已除著作左郎䑓論以公不合擅出關寢新命訥齋程公元鳯拜相首以公薦上曰姑與外庸未幾除知寧國府䑓臣以交㳺學舍論罷公自乙夘棄官歸杜門郤掃潜心於易召之不赴開慶元年己未大全罷逐相位無肯當者内地洶洶上以海閫疆起履齋吳公潜踰月入相收召善類以著作郎召明年權尚左郎官是時丁黨雖黜六賊尚存國博徐庚金等相繼上書乞誅六賊以謝天下時上外迫邊警内蔽六賊宣諭呉相不當汲引庚金等議論紛紜呉相榻前抗疏其略有曰强敵入我堂奥奸黨猶在袵席外庭紛紛葢為社稷陛下若以正人不當收召則是君子不足恃六經不足信而孔孟之道可廢萬一宗社傾摇恐天下後世書之曰亡國自臣潜作相始上為之歛容隙由此開先是鄂渚危急似道提師江陵宻奏欲請下流兵權上以問宰相潜奏鄂以上既屬似道鄂以下宜屬趙葵上不從徑以下流兵權併聼似道節制時上與賈宻徃復外廷不得預聞以宰相不知邊報為潜罪夜半片紙忽從中出呉潜除職與郡中外惴惴謂必有後命公上疏畧曰臣聞聖人之好惡是非與天下為公不宜與天下立異好惡是非者心也聖人之心本與人同豈有與天下異者然一人雖至𦕈而九重至尊也萬鈞至重也天下雖至衆實則至微也至賤也以至微至賤之好惡是非而反有時與聖人異焉以常情觀之萬鈞之重九重之尊豈不能與之立異而自為好惡是非以與天下角一勝哉而聖人則曰不敢咈百民以從已之欲明目達聰詢謀咨岳進善有旌敢諫有鼓誹謗有木衢室有問總章有訪謀之卿士庶民謀之邦君御事盤庚之懇惻多方多士之委曲凡一政一事之取舍斷斷焉不敢自决必需民之肯而後為之聖人豈畏天下而徇之者葢天下之所同好而我獨惡之天下之所同非而我獨是之則為人上者其好惡亦難知矣大抵上易知則下親上難知則下畏下親上則上安下畏上則上孤故主道莫惡乎難知莫危乎使天下之畏已又曰窘急而求之一緩而遣之號呼而進之一唯而退之旁觀沮縮何以作人任事之氣上問為誰公捧疏敷奏言辭懇惻又奏臣疏不敢直指惟陛下曲回天怒以安中外上首肯至再下殿納副縉紳六舘莫不傳送而榻前欵宻之言外廷無聞知者鳴呼曲江公不留而天寳之亂起司馬公不存而元祐之治衰正人君子之出處國家社稷之存亡繫焉公此疏葢有見於此矣未幾似道入相䑓臣希旨論公罷職徐國博以書來招公開講於婺之書堂生徒從㳺者數百人景定辛酉除知婺州林光世希權臣意以外䑓劾寢新命公遂即家剏塾以私淑其徒屢年而後成尋除知嘉興府以論罷改知瑞州及考又以論罷去之日一郡如失慈母咸淳元年乙丑度宗登極以司封郎官召辭不允上在東宫久聞公名一見甚喜將大用之除兼國史院編脩官實録院檢討官兼直舍人院上疏乞舉行天聖紹興之詔命朝臣為知縣重其事權當如胡安國之言專以均田稅正版籍均力役勸農桑崇孝悌訓士卒除盗賊為考課之法旨從所奏後沮不行尋除秘書少監再除起居舍人三年丁夘信州軍亂以措置軍糧失宜録事參軍遭其凌辱亂卒白晝持軍器一城洶懼上除公秘閣脩撰江東提刑公聞命就道及境或者來言城中近事勸公勿入城偃旌寂鼓而過公付之一笑到城下即日單騎入州决獄一城肅然於是宻戒能事者舘于信州盡得亂卒姓名宻調諸寨鋭卒擒其渠魁及其餘黨悉置之法而叛卒平王褒嘉之詞曰仁宗朝有若韓琦進士第二人平日循循逮帥真定悍驕挺亂琦獨凝然不動舉士卒而殱焉謂儒者不知兵可乎爾以倫魁司臬㑹上饒有脫巾之變乃能宻伺奸謀卒草薙而禽獮之可謂儒效章章矣公斷獄如神兩造在庭戒吏勿挾持雖田夫樵豎必引至案前曲盡其情每事如此行之不倦故一路無寃民盗賊屏迹公治事少暇必至鄱江書堂與多士講書延見朋友問政問政堂乃公所建也公以教化為急務曰教化行則獄訟簡矣撥田養士招集生徒教人以進學下手處從躬行上起從人倫日用上起悉以朱子之學推廣之明年除江西轉運副使有獻䇿於堂者請以銅錢一當十行之天下似道委公自江西行之公抗言其不便議遂寢市糴翔湧公發米平糶賑濟飢民江西民苦和糴之害申朝省蠲免郡有女妖以左道惑衆隣境數州之民十百成羣踵門徼福者不絶積有年矣公杖而流之由是遂息治事之暇必至東湖宗濂二書院及府庠與士友講論明辯而篤行之漕廨後有蓮池數畆公築屋其上扁曰君子堂取濓溪愛蓮之意公所至以講學為急務士師其道吏畏其威民懷其徳五年己巳郊禮成列爵開國男食邑三百户除權兵部侍郎同脩國史實録院脩撰兼侍讀上日御經筵虛心問道公每事啟沃所以格君心者多矣上眷隆渥問公讀書聚徒之所奎畫昭回賜名石峡書院賛書曰近進士一科文章盛而古意衰卿以儒碩剏家塾以程朱之學淑其徒朕甚嘉之七年辛未典貢舉竣事除吏部侍郎丁母令人憂去國哀毁至服闋除左侍郎辭不就賈相國十六年而公屏居十餘年徳祐初元除公荆湖四川宣撫司叅謀官以父命辭遂顓侍湯劑絶意仕途尋除權户部尚書改禮部尚書皆不拜是年夏丁父憂公力疾負土營塟惟恐不及未幾鄉㓂不靖焚蕩官舍民居公居室雖毁而書塾巋然刼火之外避地來歸命子梁等洒掃文廟脩葺書院廊宇齋序日與生徒講明脩已治人之道若將終身焉葢公嗣徃聖開來哲為己任考之年譜公生於嘉定辛巳九月二十九日午時卒於至元辛夘正月初三日申時遺言以深衣殮不尚異教晚年隠居之日多著孝經解易外傳尚書傳中庸大學註釋凡若干巻刋於家塾公平生得力以格物為窮理之本以篤行為脩已之要故其教人也讀書有法勸戒有條凡登公之門者皆有用之學時士風不振所至頺靡惟公之鄉黨衣冠如故皆公之力也公性和而介胷中無物磊落如青天白日天地元氣聚於公之身渾淪醇厚不見涯涘其接物也不事察察而自不可欺人物魁岸聲如洪鐘至老觀書夜分不寐視世之富貴利達紛華盛麗蔑如也待諸父昆弟子姪悉皆如一待親戚鄰黨皆盡其情一以至誠及物所以人皆心恱而誠服也曽祖汝翼贈宣教郎妣任氏祖謙贈朝㪚郎妣童氏父鎔累封奉直大夫兩淮制置大使司叅謀官妣邵氏封太令人公娶邵氏太令之姪女也累贈令人理家處己待族御下皆有法公遂得以專意於學男子三人長梁前太學率履齋生次棟次杰習儒業女子三人長徳純適前脩職郎無為軍無為縣主簿徐敏中次徳恭適前武學貴謀齋内舍生項雄飛㓜徳温孫男二人合孫徳孫謹卜以至元癸巳三月二十九日乙酉安厝於淳安縣南之安溪於虖昔司馬文正公曰吾與范景仁兄弟也特姓不同耳撫今懷昔豈忍使伐木之音寥寥亡聞廼按事状而繫以銘銘曰猗歟先朝以儒立國道理最大継天立極於穆理皇道久化成觀乎人文理學大眀上章揜茂如日正中九賓臚唱魁首擢公廷䇿萬言具在國史屹立朝端凜凜奏疏排奸指佞責難謂恭堯仁如天黯直亦容麾節所臨仁聲義氣經濟之才公輔之器天步孔艱歸歟石峡著書滿家經傳史冊馳旌之招循墻以避臣心惟一帝臨無二我之於公志合道同熈明啟沃相勉報忠公之云亡孰不流涕千里而遥編示狀志不泯其實迺繫以銘刻之金石炳若丹青蛟峯先生阡表故宋禮部尚書方公歴仕三朝為時名臣宋亡晦迹弗仕學者因其自號稱之曰蛟峰先生如隠者焉在世祖時旁招遺老以待咨訪詔御史中丞崔彧起公於家辭疾不赴以髙夀終今天子稽古圗治誕命儒臣刋定前史以覽觀其得失而有司莫能奉公事状以聞竟不為立傳書已上而溍與公曾孫道壡適同在史館因得公言行之詳乃摭其大要而序次之以授道壡俾刻石為阡表庸備史之闕文謹按方氏睦之淳安人公曾祖汝翼贈宣教郎祖謙贈朝㪚郎父鎔封奉直大夫母邵氏贈太令人公初名夢魁淳祐十年理宗臨軒䇿士覽公所對敷陳鯁亮親擢為進士第一賜名逢辰故公以君錫為字用例補京官僉書平江軍節度判官㕔公事寳祐元年召為秘書省正字升校書郎引疾却官除著作左郎未命除知寧國府未上並以言者罷開慶元年召著作郎蒹權尚左郎官居無何復以言者罷除知婺州以外䑓奏寢新命除知嘉興府未上改知瑞州甫及期亦皆以言者罷咸淳元年召為司封郎官兼國史院編脩官實録院檢討官兼直舍人院累遷秘書少監起居舍人三年除為江南東路提㸃刑獄公事徙江南西路計度轉運副使五年入權兵部侍郎同脩國史實録院同脩撰蒹侍讀七年知貢舉竣事除吏部侍郎丁内憂服闋以侍左侍郎召辭不赴自是不復出徳祐元年除京湖四川宣撫司叅謀官權户部尚書改禮部尚書俱以父疾辭遂丁外憂此公所閱之官也秘閣脩譔公之職也承事郎轉至中奉大夫公之階也淳安縣開國男食邑三百户公之爵也鄭丞相清之秉政御筆以雷變徹樂减膳恤刑獄而獨無求言一條中外傳聞以為廟堂監謗之術及兩察官以忤清之去國公亟扣閽上書力言之且謂所貴乎大臣者以道事君不可則止今君嗣未定不能賛之敵國佯遁無以備之貨臣聚歛土木方新顛而不扶危而不持則具臣而已聞其屢疏丐閒留之者愈堅攻之者愈重此非所以愛之時公猶在期集所而未官也上特優容之賈丞相似道制置兩淮海州䘮師更以捷聞公上疏言海州之事三尺童子皆能言之而閫臣以敗為勝陛下曲徇其意出御筆令學士院降詔奨諭之豈不知而受其欺邪抑已知而姑以揜外觀而自欺邪願陛下急收回御筆以解萬世之議而免外國之笑借曰萬世之議未暇恤鄰敵笑我何以立國乎公之取怒於似道自此始理宗在位日久務總攬權綱政多從中出羣憸乗時弄威福之柄公上疏曰當大本猶豫之秋豈無旁睨蜉蝣之撼甫節之燄燄難度其心平勃之屹屹當儲其後又曰天下有貧州縣而無貧太守有貧國家而無貧邸第南司貧而北司之應奉不貧百姓貧而緇黄之窟宅不貧至於挾小材以濟大貪者近親有凴依焉宫中有承受焉左右有㳺譽焉陛下以得之左右者出自聖斷而用之曰吾自除吏也不知有從旁竊威福者矣又曰京有尹畿有漕所以培護根本愛養命脉邇年居是官者不過為奄䜿軰一大承受耳無名宣頭真偽莫詰非時取索隠匿莫稽仇士良謂天子不可令閒暇若以財貨聲色蠧其心使無暇更及他事然後吾軰可以得志今此曹遑遑汲汲求適吾意者正士良之䇿也帥漕兩司疲於應奉帑庾赤立萬一畿甸之内有一旦警急何所趣辦何所倚仗乎願斷自今日止營繕省宣索兩司不急之應辦悉停之左右並縁需索之有例者悉閣之然後可以救兩司之貧為緩急之備也上頗感悟而土木之功不為之少輟公復因論邊事屢及之有曰善處急者不以急亦不以暇古人謀人國於江左者莫窘於淮淝而談笑奕棋莫迫於新亭而從容就席固不以急也外示談笑而内有以神其指授之畧陽示從容而隂有以伐其壁後之謀所謂暇者豈真暇哉又曰吾有以自謀而不以隣國之安危為安危則不依於人吾有以自備而不以敵國之緩急為喜懼則不制於人茍以彼之存者為安緩者為喜萬一隣敵陽示安枕以紿我而假敵以道臍可噬乎又曰今與敵對境我無一日謀敵而敵無一日不謀我彼所築者金城鐡壁我所築者土妖血山彼所築者奪我地為之我所築者奪民地為之其言切中當時玩細娱而不圗大患之病尋上疏極陳備邊之䇿曰以必爭之規模奪浮光然後可以全兩淮而保長江以必死之規模守樊襄然後可以拒光化而全江陵夫淮之猶可守可耕者以有一綫之河也今渉河而築浮光乃吾户内若屯於斯畊於斯教訓於斯日夜出騎以撓我淮東西俱不可畊矣雖堅城閉壁而坐為禁制不得動矣為吾之計當勉諭淮閫盡力以爭浮光則兩淮猶可安枕也萬一樊襄不牢彼反奪之則江陵孤注尚足恃哉為吾之計當擇荆之猛将責以必死之規模守樊襄則北可拒光化南可全江陵一則思所以奪其地二則思所以爭其民則對壘之勝負决當在此而不在彼矣識者謂公此疏真活國之良劑朝廷不能用以至於亡而公言無不騐重為之太息焉御史洪天錫劾内官盧允升董宋臣不行而去公移書宰相勉以行申屠嘉之事且抗疏援膏肓二豎為喻曰何陛下愛其國不如愛二豎之甚乎漢唐之季建置天子在奄豎掌握罪大惡極朝廷不能誅之天下必有起而誅之者漢之宦官陳蕃竇武爭之不勝并州之將操戈而殪之唐之宦官宋申錫攻之不勝河中之帥移兵而屠之小人之在君側操心何所不至其所以不敢動於内者葢有所惮於外若外不足惮則無忌憚之心生無忌惮之心生而無君之惡動矣言尤激烈上覽之不恱公遂稱疾求去丁大全方以䑓長用事欲鈎致諸賢公見幾而作謁告徑行董丞相槐勸公不必逺引公曰丞相且自照管越數月果為大全所擊而去呉公潜拜左丞相公亦召還㑹國子博士徐庚金等言大全雖去相位而六賊尚存乞誅之以謝天下上諭潜不當汲引庚金等議論紛紜潜於榻前自辯上為之斂容而隙自此開先是鄂渚危急上命似道提師江陵似道奏請下流兵權潜奏鄂以上既屬似道鄂以下當属趙葵上不從徑以下流併聽似道節制凡似道宻奏外廷不得預聞上反以不知邊報為潜罪及䑓臣奏忠王之立人心所屬潜獨不然奸謀叵惻潜遂罷相中外惴惴疑必有後命公上疏曰天下之所同好我獨惡之天下之所同非我獨是之則為人上者亦難知矣大抵上易知則下親上難知則下畏下親則上安下畏則上孤窘廹而求之一緩而遣之號呼而進之一唯而退之旁觀沮縮何以作人任事之氣乎上問為誰公奏臣不敢直指願陛下曲回天怒以安中外上乃首肯而榻前欵宻之言外廷無聞知者既而似道入相希指論公者章連上矣度宗即位公乃還朝上見甚喜欲大用之公乞命朝臣為知縣以重其事權專以均田稅正版籍均力役勸農桑崇孝弟訓士卒除盗賊為考課之法有旨從所奏後沮不行此公之忠讜見於立朝者也信州措置軍糧失宜召亂朝廷以江東臬事付公聞命就道及境或來言城中事勸公偃旗息皷而過公笑不荅即日单騎入州决獄一城肅然宻戒能事者訪得亂卒姓名擒其兇渠逆黨悉置於法事平有詔褒諭比公於韓魏公云公於他獄事莫不盡其情故一路無寃民而盗賊屏迹及將漕江西有獻議於廟堂請以銅錢一當十委公自江西行之公抗言其不便而止請行賑糶以救民飢乞蠲和糴以蘓民病有女妖以左道惑衆鄰郡愚民十百成羣踵門徼福公杖而流之由是遂息此公之績用見於出使者也葢似道柄國十有六年公屏居者十年諌則不行言則不聼而施于有政者又厪厪若此此有志之士所以美其際運之盛而措其設施之未究也公天稟卓絶於書無所不讀而㑹于理學以為歸宿自為幕職官至秉麾持節所至以教化為先務暇日輒從容庠序間授學者以求端用力之方自躬行上起自人倫日用上起婺之東陽有好事者創義學迎致公為之師從㳺者數百人閩人林光世夤縁宦竪而賜出身及為淛東常平使者首劾公不當俯就義學之招婺州之命由是而寝公遂即家建塾以私㳤其徒後以從官侍經帷每事啟沃以格君心度宗眷遇之甚至問公講授之所賜御書扁額曰石峡書院仍賜手詔褒寵之江南新附鄉㓂猖獗官舍民居盡燬而書院巋然刼火之餘葺治既完諸生稍來集公倡明正道以致知力行名其堂以仁義禮智名其齋時所在士風頺靡公所以振起而作新之者成效甚著此則公自任以師道之重期於繼徃聖而開來學者也公所著有孝經解一巻易外傳闕卷尚書釋傳闕卷中庸大學註釋闕巻格物入門一巻行於世公人物魁岸聲如洪鐘磊落如青天白日渾淪醇厚不見涯涘觀書至老不廢視紛華盛麗事蔑如也待諸父昆弟子姪各盡其禮接物以誠而無不恱服不為察察而自莫能欺公卒于至元二十八年正月三日享年七十有一以三十年三月二十九日葬于縣西之安溪娶邵氏封令人再娶朱氏子男三人長梁太學生次棟次杰女三人長適脩職郎無為軍無為縣主簿徐敏中次適武學生項雄飛次適邵元廷孫男四人女三人曽孫男七人女一人仲子棟季子杰入皇朝並以儒起家棟月泉書院山長杰長州縣學教諭然皆恬於進取不至顯位棟之孫煒之子道壡始以至順元年擢進士第今自翰林國史院編脩官出為嘉興路總官府推官階承務郎石峽書院既領於有司而設師弟子員道壡病其痺迫弗稱乃以公之故居廣其居址而新其棟宇弦誦之聲不减於公在時先儒有言道不行百世無善治學不傳千載無真儒公之道雖不行於當時而其學有以傳於後世夫何憾乎溍之曽大父左曹府君實公榜中進士託斯文之雅故於公門四世有年矣今所述乃學士大夫之公言非溍之私言也來者尚有攷焉至正十年正月三日年家生翰林侍講學士中奉大夫知制誥同脩國史同知經筵事黄溍表翰林學士承旨榮禄大夫知制誥兼修國史張起巖篆額榮禄大夫御史中丞許有壬書丹石峽書院蛟峰先生碑像賛何夢桂大原孔孟的𣲖朱張忠恕𢎞毅剛大直方義存出處道繫存亡立言垂訓徳久彌光拜觀先師蛟峰先生歴任嵗月與平生著述有感詩徐持敬靈蛟久化想儀型座上春風十載情青史定書名法從白頭猶有老門生痛心無復丘原起病眼相㸔涕涙横緑鬂功名好孫子遺言一一賴編成輓蛟峰先生詩方一䕫前代衣冠第一人老來鳴道振遺音勲庸臣子平生志書易聖賢千古心士願執經來鹿洞客求挾冊售鷄林飛仙雖去斯文在山閣神光照斗参石峽書院增田記學校養士之地理義以養其心廩粟以養其身在易象以養正䝉養内也需以飲食需養外也此需之所以次蒙井田學校之設先王君師天下之道葢如此石峽書院故侍讀尚書蛟峰先生方公平居講道之所公以魁彦師表後進東南之士多裹糧從之教雖勤未及於養他日公之子梁棟諸弟捐田二頃有畸以成先志然逺在吳㑹歳入租不足贍長此山者率欲興舉徃徃有其志無其時至大己酉秋淳安邑長愛祖丁承事亦既新縣學増學田矣一日謁先聖於書院顧瞻久之慨然曰吾将以縣學成規行之比㑹亷訪分司僉事吳公舉按部莅止有作新意應午時承乏代庖因以為請公即命邑長董其事府檄下亦如之乃禮諭諸生庀工繕脩視昔壮觀士之裕於家者樂以田入凡若干畆春秋之祀廪膳之資脩葺之費胥此焉出多士懽然属應午為之記竊惟道之大原出於天而寄于人明道以淑人師儒之善教也廣田以養士賢大夫之善政也士頻困征役身且不暇養况心乎邑大夫能以庠序教養為心鄉所躪踐者折節而下之鄉所朘削者繼粟而贍之意氣感召不令而從為書院立數千百年方來之規意亦勤矣為士者可不知所以自養乎子程子曰古之人耳之於樂目之於禮左右起居動息皆有所養今皆廢之獨有義理之養心耳遊於斯者必禮畊義種耨之以學涵養其本心以茂明先王之道俾得展其大用顧不偉歟應午既述其始末併以前山長方梁義士徐洪父以下所助田租入之數載于碑隂以諗來者永永無忘邑大夫之功至大三年庚戌正月望日權石峽書院事王應午記重脩石峽書院記唐五代之季天下惟有四書院教法未備也自周程張朱首倡道學而東萊吕氏徃復其間商略考訂殆無餘藴所至皆剏書院聚生徒教養皆備大抵張本道理最大一語鳴乎偉哉惟嚴陵石峽書院故尚書蛟峰方公閒居私淑之所也咸淳辛未公侍讀經闈嘗被賛書有曰近進士一科文章盛而古意衰郷以儒碩剏家塾以程朱之學淑其徒朕甚嘉之賜名石峽書院刻之堅珉列於學宫皇元闕混一以來崇儒重道形於播告至元戊寅淛西按察僉事夾谷之奇聿至嚴陵以書院中更多故漸至頺圮命公之子梁為山長任其經理於是所當興修者次第為之古意復振書院悉用武夷規模置居仁由義復禮近智四齋每旦籖講略說大義長喻是正之正録眀辯之具有程課如六經三史通鑑綱目近思録通書西銘之類並令通習而東序西序各有揭示二十年間備殫勤瘁後之代者視如傳舍教弛而學幾廢至大己酉淳安邑長愛祖丁為人亷能以新學校為已任適亷訪僉事吳公舉相繼廵按興念斯文俾董脩學事於是廟貎齊宇丹雘相輝過者色然莫不起敬如増學田造祭器新聖師從祀像皆其力也今之俗吏視教化為不切而淳之長官能於此乎用心是誠可書予得已於言乎夫學所以傳道受業解惑也茍所傳所授不本於正必流為佛老為刑名為功利學非吾儒之學矣雖欲難疑問答求以正之其惑也滋甚後有作者必當開示塗轍使之一出於正撤其蔽而袪其所甚惑庶幾無愧菁莪樂育人材之心兊澤朋友講習之義大學正心誠意之道承學之士與方氏子若孫實嘉頼之至太庚戌中秋後十日陵陽牟瓛記立蛟峰先生塑像記徐持敬至順三年冬十月朔故侍讀尚書蛟峰先生方公塑像成諸生徐持敬以下四十二人乃舍菜以告曰先生以幅巾深衣像帶縁如爵諭者每謂宋三百年而此郡山川之靈磅礴坱圠僅先生一人出狀元髙科者葢天下無與為比此足為先生榮然未知先生剛直之氣不附時相歸剏書院一以教學為事直與白鹿洞同一氣象發明子朱子義理之學其功至今百餘年且不廢進士人品葢所不論學者來登先生堂誦先生書峡山蒼然峡水泠然與道為體仰之瞻之自有得見先生於目睫間者塑像之設此其立畏之一端耳舊先生有石刻立像今始為塑坐像於是直學應珤適攝院事嘗移縣葺殿堂齋序既備新作櫺星門縣長索羅來任其事繼而令尹劉彭夀簿徐不花相與奨成之惟先生尚其有光於斯文俾諸生益開其志於逺者大者禮成乃丹書刻于石以昭成典賛曰峡山之秀西挾紫陽以聨其峩峡水之長東㑹新安以同其波聖賢之澤有如元氣渾然太和仰瞻先生百世之下不屈不阿立塑像祭文徐持敬惟正氣蟠薄天地間公得之而生自魁天下而為名法從其耿耿不死者空山林下今猶若見之爰立肖像所以立人心之畏也斯文之重百世是依敢告蛟峰外集卷三
